<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Documents</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #fff; color: #222; }

    .page-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 10px;
    }
    .page-topbar h1 { font-size: 20px; font-weight: 700; color: #111; }
    .item-count { font-size: 12.5px; color: #666; margin-top: 3px; }
    .btn-add {
      background: #e07820; color: #fff; border: none;
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      border-radius: 4px; cursor: pointer; white-space: nowrap;
    }
    .btn-add:hover { background: #c96a10; }

    .toolbar {
      background: #3a3a3a; display: flex; align-items: center;
      justify-content: space-between; padding: 7px 14px;
    }
    .toolbar-left { display: flex; align-items: center; gap: 6px; }

    .dropdown { position: relative; display: inline-flex; }
    .btn-group { display: flex; }
    .btn-actions { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none;
      padding: 5px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; border-radius: 3px 0 0 3px;
    }
    .btn-actions:hover { background: #d4ae00; }
    .btn-actions-caret {
      background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15);
      padding: 5px 8px; font-size: 12px; cursor: pointer; border-radius: 0 3px 3px 0;
    }
    .btn-actions-caret:hover { background: #d4ae00; }
    .dd-menu {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
      background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 12px rgba(0,0,0,.2);
      min-width: 180px; padding: 4px 0;
    }
    .dd-menu.show { display: block; }
    .dd-menu a {
      display: block; padding: 8px 14px; color: #444;
      text-decoration: none; font-size: 13px; cursor: pointer;
    }
    .dd-menu a:hover { background: #f5f5f5; }

    .toolbar-tabs { display: flex; gap: 0; margin-left: 4px; }
    .tab-btn {
      padding: 5px 14px; border: none; cursor: pointer;
      font-size: 12.5px; font-weight: 600; font-family: inherit;
      background: #555; color: #bbb;
    }
    .tab-btn:first-child { border-radius: 3px 0 0 3px; }
    .tab-btn:last-child  { border-radius: 0 3px 3px 0; }
    .tab-btn.active { background: #fff; color: #222; }
    .tab-btn:hover:not(.active) { background: #666; }

    .toolbar-right { display: flex; align-items: center; gap: 6px; color: #ccc; font-size: 12.5px; }
    .page-size-input {
      width: 44px; padding: 3px 5px; font-size: 12px; border: 1px solid #666;
      background: #555; color: #fff; text-align: center; border-radius: 2px;
    }
    .pg-btns { display: flex; gap: 2px; }
    .pg-btn {
      background: #555; color: #ccc; border: none; padding: 3px 7px;
      font-size: 11px; cursor: pointer; border-radius: 2px;
    }
    .pg-btn:hover { background: #666; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px; text-align: left; font-size: 12.5px;
      font-weight: 600; color: #555; border-bottom: 1px solid #ddd;
    }
    thead th:first-child { width: 40px; text-align: center; }
    thead th:last-child  { width: 44px; text-align: center; }
    tbody tr { border-bottom: 1px solid #eee; }
    tbody tr:hover { background: #f9f9f9; cursor: pointer; }
    tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }
    tbody td:first-child { text-align: center; }
    tbody td:last-child  { text-align: center; }
    .doc-link { color: #2272c3; text-decoration: none; font-size: 13px; }
    .doc-link:hover { text-decoration: underline; }

    .gear-btn {
      background: none; border: 1px solid #ccc; border-radius: 50%;
      width: 28px; height: 28px; cursor: pointer; font-size: 13px; color: #666;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .gear-btn:hover { background: #f0f0f0; }

    .empty-msg { padding: 32px; text-align: center; color: #888; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="page-topbar">
  <div>
    <span class="showing-count" id="results-count"></span>
    <div class="item-count" id="item-count">0 items in 1 pages</div>
  </div>
  <button class="btn-add" onclick="window.parent.loadPage && window.parent.loadPage('documentsettings')">Add Document</button>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="dropdown">
      <div class="btn-group">
        <button class="btn-actions">Actions</button>
        <button class="btn-actions-caret" onclick="toggleDD(event)">&#9660;</button>
      </div>
      <div class="dd-menu" id="actions-dd">
        <a onclick="setActiveSelected(true)">Activate Selected</a>
        <a onclick="setActiveSelected(false)">Deactivate Selected</a>
        <a onclick="deleteSelected()">Delete Selected</a>
      </div>
    </div>
    <div class="toolbar-tabs">
      <button class="tab-btn active" onclick="setFilter('active',this)">Active</button>
      <button class="tab-btn" onclick="setFilter('inactive',this)">Inactive</button>
      <button class="tab-btn" onclick="setFilter('all',this)">All</button>
    </div>
  </div>
  <div class="toolbar-right">
    Page Size:
    <input class="page-size-input" type="text" value="50"/>
    <div class="pg-btns">
      <button class="pg-btn">&#9664;&#9664;</button>
      <button class="pg-btn">&#9664;</button>
      <button class="pg-btn" style="background:#666;color:#fff;">1</button>
      <button class="pg-btn">&#9654;</button>
      <button class="pg-btn">&#9654;&#9654;</button>
    </div>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"/></th>
      <th>Title</th>
      <th>Type</th>
      <th>Description</th>
      <th>Date Modified</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="docs-tbody"></tbody>
</table>
<div class="empty-msg" id="empty-msg" style="display:none;">No documents found. Click "Add Document" to create one.</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var docs   = [];
  var filter = 'active';

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function toggleDD(e) {
    e.stopPropagation();
    document.getElementById('actions-dd').classList.toggle('show');
  }
  document.addEventListener('click', function(){ document.getElementById('actions-dd').classList.remove('show'); });

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderTable();
  }

  function toggleAll(checked) {
    document.querySelectorAll('#docs-tbody input[type="checkbox"]').forEach(function(cb){ cb.checked = checked; });
  }

  function getSelected() {
    var ids = [];
    document.querySelectorAll('#docs-tbody input[type="checkbox"]:checked').forEach(function(cb){ ids.push(cb.dataset.id); });
    return ids;
  }

  async function deleteSelected() {
    var ids = getSelected();
    if (!ids.length) return;
    if (!confirm('Delete ' + ids.length + ' document(s)?')) return;
    await sb.from('documents').delete().in('id', ids);
    document.getElementById('actions-dd').classList.remove('show');
    loadDocs();
  }

  async function setActiveSelected(active) {
    var ids = getSelected();
    if (!ids.length) return;
    await sb.from('documents').update({ active: active }).in('id', ids);
    document.getElementById('actions-dd').classList.remove('show');
    loadDocs();
  }

  async function loadDocs() {
    var { data, error } = await sb.from('documents').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    docs = data || [];
    renderTable();
  }

  function renderTable() {
    var tbody = document.getElementById('docs-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    var filtered = docs.filter(function(d){
      if (filter === 'active')   return d.active !== false;
      if (filter === 'inactive') return d.active === false;
      return true;
    });
    document.getElementById('item-count').textContent = filtered.length + ' document' + (filtered.length !== 1 ? 's' : '');
    tbody.innerHTML = '';
    if (!filtered.length) { emptyMsg.style.display = ''; return; }
    emptyMsg.style.display = 'none';
    filtered.forEach(function(d) {
      var tr = document.createElement('tr');
      var modified = d.updated_at ? new Date(d.updated_at).toLocaleDateString() : '';
      tr.innerHTML =
        '<td><input type="checkbox" data-id="' + d.id + '" onclick="event.stopPropagation()"/></td>' +
        '<td><a class="doc-link">' + esc(d.name || 'Untitled') + '</a></td>' +
        '<td>' + esc(d.doc_type || '') + '</td>' +
        '<td>' + esc(d.description || '') + '</td>' +
        '<td>' + modified + '</td>' +
        '<td><button class="gear-btn" title="Settings" onclick="event.stopPropagation(); editDoc(' + d.id + ')">&#9881;</button></td>';
      tr.addEventListener('click', function(e){
        if (e.target.type === 'checkbox' || e.target.closest('.gear-btn')) return;
        editDoc(d.id);
      });
      tbody.appendChild(tr);
    });
  }

  function editDoc(id) {
    window.parent.loadPage && window.parent.loadPage('documentsadd?id=' + id);
  }

  loadDocs();
</script>
</body>
</html>
