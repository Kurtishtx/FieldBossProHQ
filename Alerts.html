<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alerts</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #d4cfe0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px 32px 226px;
    }

    h2 { font-size: 20px; font-weight: 800; color: #111; margin-bottom: 28px; }

    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      max-width: 760px;
    }

    .card {
      flex: 1 1 220px;
      max-width: 340px;
      background: #5b2d8e;
      color: #fff;
      border-radius: 10px;
      padding: 28px 24px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      transition: background .2s, transform .15s;
    }
    .card:hover { background: #e07820; transform: translateY(-3px); }

    .card-icon { font-size: 32px; margin-bottom: 12px; }
    .card-name  { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
    .card-desc  { font-size: 13px; color: rgba(255,255,255,.8); line-height: 1.4; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<h2>Alerts</h2>

<div class="card-grid">
  <div class="card" onclick="navigate('scheduledalert')">
    <div class="card-icon">&#128197;</div>
    <div class="card-name">Scheduled Alert</div>
    <div class="card-desc">Sent to clients when a service is scheduled.</div>
  </div>

  <div class="card" onclick="navigate('reschedulealert')">
    <div class="card-icon">&#128260;</div>
    <div class="card-name">Reschedule Alert</div>
    <div class="card-desc">Sent to clients when a service is rescheduled.</div>
  </div>

  <div class="card" onclick="navigate('canceledalert')">
    <div class="card-icon">&#10060;</div>
    <div class="card-name">Canceled Alert</div>
    <div class="card-desc">Sent to clients when a service is canceled.</div>
  </div>

  <div class="card" onclick="navigate('completedalert')">
    <div class="card-icon">&#9989;</div>
    <div class="card-name">Completed Alert</div>
    <div class="card-desc">Sent to clients when a service is completed.</div>
  </div>
</div>

<script>
  function navigate(page) {
    if (window.parent && window.parent.loadPage) {
      window.parent.loadPage(page);
    }
  }
</script>
</body>
</html>
