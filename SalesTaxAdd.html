<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Sales Tax</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f5f5f5; color: #222; }

    .dialog { max-width: 1100px; margin: 30px auto; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,.15); background: #fff; }
    .dialog-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .dialog-header h1 { font-size: 20px; font-weight: 700; color: #111; }
    .close-btn { background: none; border: 1px solid #bbb; padding: 2px 7px; font-size: 13px; cursor: pointer; color: #555; border-radius: 2px; }
    .close-btn:hover { background: #f0f0f0; }

    .dialog-body { padding: 20px 24px 8px; }

    .section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; padding: 16px 0 10px; border-top: 1px solid #eee; margin-top: 8px; }
    .section-label:first-child { border-top: none; padding-top: 0; }

    .field-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .field-row label { width: 160px; font-weight: 700; font-size: 13px; color: #333; flex-shrink: 0; padding-top: 8px; }
    .field-row input[type="text"],
    .field-row input[type="number"],
    .field-row select,
    .field-row textarea {
      flex: 1; width: 100%; border: 1px solid #ccc; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; border-radius: 2px;
    }
    .field-row input:focus, .field-row select:focus, .field-row textarea:focus { border-color: #c47d0a; }
    .field-row textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
    .field-hint { font-size: 12px; color: #999; margin-top: 3px; }

    .dialog-footer { padding: 16px 24px 24px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; margin-top: 16px; }
    .btn-save { background: #c47d0a; color: #fff; border: none; padding: 9px 28px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save:hover { background: #a86808; }
    .btn-save-new { background: #c47d0a; color: #fff; border: none; padding: 9px 20px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save-new:hover { background: #a86808; }
    .btn-cancel { color: #555; font-size: 13px; cursor: pointer; margin-left: 4px; }
    .btn-cancel:hover { text-decoration: underline; }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="dialog">
  <div class="dialog-header">
    <h1 id="page-title">Add Sales Tax</h1>
    <button class="close-btn" onclick="cancel()">&#10005;</button>
  </div>

  <div class="dialog-body">

    <div class="section-label">Tax Info</div>

    <div class="field-row" style="align-items:center;">
      <label style="width:160px;flex-shrink:0;"></label>
      <div style="flex:1;display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="apply-all" style="width:16px;height:16px;cursor:pointer;accent-color:#8a5518;"/>
        <label for="apply-all" style="font-weight:600;color:#8a5518;cursor:pointer;padding-top:0;">Apply to All Clients</label>
      </div>
    </div>

    <div class="field-row">
      <label for="tax-name">Name</label>
      <div style="flex:1;">
        <input type="text" id="tax-name" autocomplete="off" placeholder="e.g. Arlington Tax"/>
      </div>
    </div>

    <div class="field-row">
      <label for="tax-rate">Tax Rate</label>
      <div style="flex:1;">
        <input type="number" id="tax-rate" step="0.000001" min="0" max="1" placeholder=".0825"/>
        <div class="field-hint">Enter as a decimal — e.g. 0.0825 for 8.25%</div>
      </div>
    </div>

  </div>

  <div class="dialog-footer">
    <button class="btn-save" onclick="saveTax(false)">Save</button>
    <button class="btn-save-new" onclick="saveTax(true)">Save &amp; New</button>
    <span class="btn-cancel" onclick="cancel()">Cancel</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var taxId = new URLSearchParams(window.location.search).get('id');
  var existingTax = null;

  function navigate(page) {
    if (window.parent && window.parent.loadPage) {
      window.parent.loadPage(page);
    } else {
      window.location.href = page + '.html';
    }
  }

  async function init() {
    if (taxId) {
      var { data } = await sb.from('sales_taxes').select('*').eq('id', taxId).single();
      if (data) {
        existingTax = data;
        document.getElementById('page-title').textContent = 'Edit Sales Tax';
        document.getElementById('tax-name').value = data.name || '';
        document.getElementById('tax-rate').value = data.tax_rate != null ? data.tax_rate : '';
      }
    }
    document.getElementById('tax-name').focus();
  }

  async function saveTax(andNew) {
    var name = document.getElementById('tax-name').value.trim();
    if (!name) { alert('Please enter a name.'); document.getElementById('tax-name').focus(); return; }
    var rateRaw = document.getElementById('tax-rate').value.trim();
    var tax_rate = rateRaw !== '' ? parseFloat(rateRaw) : 0;

    var now = new Date().toISOString();

    var savedTaxId = null;
    if (existingTax) {
      var { error } = await sb.from('sales_taxes').update({
        name: name, tax_rate: tax_rate, updated_at: now
      }).eq('id', existingTax.id);
      if (error) { alert('Error: ' + error.message); return; }
      savedTaxId = existingTax.id;
    } else {
      var { data: sessionData } = await sb.auth.getSession();
      var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
      var { data: insertData, error } = await sb.from('sales_taxes').insert({
        name: name, tax_rate: tax_rate,
        active: true, user_id: uid
      }).select('id').single();
      if (error) { alert('Error: ' + error.message); return; }
      savedTaxId = insertData ? insertData.id : null;
    }

    if (document.getElementById('apply-all').checked) {
      await applyToAllClients(name, savedTaxId);
      return;
    }

    if (andNew) {
      document.getElementById('tax-name').value = '';
      document.getElementById('tax-rate').value = '';
      document.getElementById('apply-all').checked = false;
      document.getElementById('tax-name').focus();
      existingTax = null;
      taxId = null;
      document.getElementById('page-title').textContent = 'Add Sales Tax';
    } else {
      navigate('salestaxlist');
    }
  }

  async function applyToAllClients(name, taxId) {
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;

    /* update all clients with the tax name */
    var { error: clientErr } = await sb.from('Clients')
      .update({ sales_tax: name })
      .eq('user_id', uid);
    if (clientErr) { alert('Error updating clients: ' + clientErr.message); return; }

    /* update all properties with the tax ID */
    if (taxId) {
      var { error: propErr } = await sb.from('Properties')
        .update({ sales_tax_id: taxId })
        .eq('user_id', uid);
      if (propErr) { alert('Error updating properties: ' + propErr.message); return; }
    }

    /* save as default so new clients/properties get it pre-selected */
    await sb.from('app_preferences').upsert(
      { pref_key: 'default_sales_tax', pref_value: name },
      { onConflict: 'pref_key' }
    );

    navigate('salestaxlist');
  }

  function cancel() {
    navigate('salestaxlist');
  }

  init();
</script>
</body>
</html>
