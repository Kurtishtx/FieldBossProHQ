<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Properties</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #d4cfe0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .page-topbar {
      background: #130520;
      border-bottom: 1px solid #1e0a35;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin: 8px 16px;
      border-radius: 10px;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-icon-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      padding: 6px 11px;
      cursor: pointer;
      font-size: 15px;
      color: rgba(255,255,255,.8);
      line-height: 1;
      transition: background .15s;
    }
    .filter-icon-btn:hover { background: rgba(255,255,255,.18); }

    .property-search {
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13.5px;
      width: 220px;
      font-family: inherit;
      color: #fff;
      background: rgba(255,255,255,.1);
      transition: border-color .15s, box-shadow .15s;
    }
    .property-search::placeholder { color: rgba(255,255,255,.45); }
    .property-search:focus {
      outline: none;
      border-color: #e07820;
      background: rgba(255,255,255,.15);
      box-shadow: 0 0 0 3px rgba(224,120,32,.2);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
        .btn-orange-outline {
      background: #130520;
      border: 2px solid #e07820;
      color: #fff;
      font-weight: 700;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13.5px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-orange-outline:hover { background: #1e0a35; }
        .btn-orange-filled {
      background: #130520;
      border: 2px solid #e07820;
      color: #fff;
      font-weight: 700;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13.5px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-orange-filled:hover { background: #1e0a35; }

    /* ── Map section ── */
    #map-section {
      position: relative;
      height: 491px;
      flex-shrink: 0;
      overflow: hidden;
      border-bottom: 1px solid #bbb;
      margin: 0 16px 8px;
      border-radius: 10px;
    }

    /* Map side icons */
    .map-side-icons {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
      transition: left .2s;
    }
    .map-icon-btn {
      background: #444;
      color: #fff;
      border: none;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
      transition: background .15s;
    }
    .map-icon-btn:hover { background: #1a0828; }

    /* Map/Satellite toggle */
    .map-sat-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }
    .map-sat-toggle button {
      background: none;
      border: none;
      padding: 6px 16px;
      font-size: 12.5px;
      cursor: pointer;
      font-family: inherit;
      color: #888;
      font-weight: 500;
      transition: background .15s, color .15s;
    }
    .map-sat-toggle button.active {
      background: #333;
      color: #fff;
      font-weight: 700;
    }
    .map-sat-toggle button:hover:not(.active) { background: #d4cfe0; color: #333; }

    /* ── Filters bar ── */
    .filters-bar {
      background: #130520;
      color: rgba(255,255,255,.8);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
      letter-spacing: .3px;
      margin: 0 16px;
      border-radius: 8px;
    }
    .filters-bar:hover { background: #1e0a35; }

    .filters-row {
      background: #1a0a30;
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      margin: 2px 16px;
      border-radius: 8px;
    }
    .filter-rule {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-field, .filter-op {
      background: #2a1040;
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      height: 34px;
      cursor: pointer;
    }
    .filter-field { min-width: 160px; }
    .filter-op    { min-width: 170px; }
    .filter-val-wrap { flex: 1; }
    .filter-val-wrap input, .filter-val-wrap select {
      width: 100%;
      background: #2a1040;
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      height: 34px;
    }
    .filter-val-wrap input::placeholder { color: rgba(255,255,255,.4); }
    .filter-remove-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.5);
      border-radius: 4px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .filter-remove-btn:hover { background: rgba(200,0,0,.3); color: #ff8888; border-color: rgba(200,0,0,.4); }
    .filter-actions-row { display: flex; gap: 8px; }
    .btn-filter-action {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 5px;
      padding: 5px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: rgba(255,255,255,.8);
      font-weight: 600;
      transition: background .15s;
    }
    .btn-filter-action:hover { background: rgba(255,255,255,.18); }
    .btn-clear-filters {
      margin-left: auto;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 5px;
      padding: 5px 14px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: rgba(255,255,255,.5);
      transition: background .15s;
    }
    .btn-clear-filters:hover { background: rgba(255,255,255,.13); color: rgba(255,255,255,.8); }

    /* ── Results bar ── */
    .results-bar {
      padding: 6px 24px;
      font-size: 18px;
      font-weight: 700;
      color: #111;
      background: transparent;
      flex-shrink: 0;
      text-align: right;
    }

    /* ── Toolbar ── */
    .toolbar {
      background: #130520;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin: 4px 16px 0;
      border-radius: 10px 10px 0 0;
    }
    .actions-split { display: flex; align-items: stretch; position: relative; }
    .btn-green-main { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none; border-radius: 3px 0 0 3px; padding: 5px 14px; font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer; }
    .btn-green-main:hover { background: #d4ae00; }
    .btn-green-caret { background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15); border-radius: 0 3px 3px 0; padding: 5px 8px; font-size: 12px; cursor: pointer; }
    .btn-green-caret:hover { background: #d4ae00; }

    /* Actions dropdown */
    .actions-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
      z-index: 200;
      min-width: 180px;
      padding: 4px 0;
    }
    .actions-dropdown.open { display: block; }
    .dropdown-header {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      padding: 8px 14px 4px;
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid #eee;
      margin-bottom: 3px;
    }
    .dropdown-item {
      display: block;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 8px 14px;
      font-size: 13.5px;
      font-family: inherit;
      color: #222;
      cursor: pointer;
      transition: background .1s;
    }
    .dropdown-item:hover { background: #f5f5f5; color: #111; }

    .pagination-area {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: rgba(255,255,255,.7);
    }
    .pagination-area input {
      width: 50px;
      padding: 3px 6px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 13px;
      text-align: center;
    }
    .pg-btn {
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.75);
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s;
    }
    .pg-btn:hover { background: rgba(255,255,255,.22); color: #fff; }
    .pg-current {
      background: #f5c800;
      color: #111;
      border: none;
      padding: 4px 9px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
    }
    .btn-columns {
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.75);
      border: 1px solid rgba(255,255,255,.18);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12.5px;
      margin-left: 6px;
      font-family: inherit;
      transition: background .15s;
    }
    .btn-columns:hover { background: rgba(255,255,255,.22); color: #fff; }

    /* ── Filter pills ── */
    .filter-tabs { display:flex; gap:4px; padding:8px 14px; background:#1a0a30; border-bottom:1px solid rgba(255,255,255,.06); flex-wrap:wrap; flex-shrink:0; margin: 0 16px; }
    .ftab { padding:5px 16px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06); font-size:13px; font-family:inherit; cursor:pointer; border-radius:20px; color:rgba(255,255,255,.6); transition:background .15s; }
    .ftab:hover { background:rgba(255,255,255,.12); color:#fff; }
    .ftab.active { background:#e07820; color:#fff; border-color:#e07820; font-weight:700; }

    /* ── Table ── */
    .table-container {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      margin: 0 16px 16px;
      border-radius: 0 0 10px 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    thead th {
      background: #fff;
      border-bottom: 2px solid #ddd;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      font-size: 12.5px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    thead th:first-child { width: 36px; text-align: center; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .1s; }
    tbody tr:hover { background: #fdfbe8; }
    tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }
    tbody td:first-child { text-align: center; }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: #888888;
    }
    .property-link {
      color: #444;
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
    }
    .property-link:hover { text-decoration: underline; color: #111; }
    .star-icon { color: #f0b429; }

    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>

  <link rel="stylesheet" href="theme.css"/>
</head>

<!-- Top bar -->
<div class="page-topbar">

  </div>

<!-- Map section -->

<!-- Results count -->

    <div class="actions-dropdown" id="actions-dropdown">
      <div class="dropdown-header">Actions</div>
      <button class="dropdown-item" onclick="openPropertyModal()">Add Property</button>
      <button class="dropdown-item" onclick="makePropertiesActive(true)">Make Active</button>
      <button class="dropdown-item" onclick="makePropertiesActive(false)">Make Inactive</button>
      <button class="dropdown-item" onclick="deleteSelectedProperties()">Delete</button>

  </div>
  <div id="pagination-bar" style="display:none;align-items:center;gap:6px;font-size:13px;color:#ccc;">
    <button onclick="goPage(-1)" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:4px 10px;cursor:pointer;border-radius:3px;">&#9664;</button>

  <button class="ftab" onclick="setTab(this)">Properties &amp; Former</button>

<!-- Table -->
<div class="table-container">

    <thead>
      <tr>
        <th><input type="checkbox" id="select-all" onchange="toggleAll(this)"/></th>

    <tbody id="property-tbody"></tbody>
  </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var map = null, mapMarkers = [], mapInitialized = false;

  function initMapIfNeeded() {
    if (mapInitialized) return;
    mapInitialized = true;
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 32.725, lng: -97.033 },
      zoom: 9,
      mapTypeId: 'satellite',
      mapTypeControl: true,
      streetViewControl: false,
      fullscreenControl: true
    });
  }

  /* ── Map toggle ── */
  var mapVisible = false;
  function toggleMap() {
    mapVisible = !mapVisible;
    document.getElementById('map-section').style.display = mapVisible ? '' : 'none';
    document.getElementById('map-toggle-btn').textContent = mapVisible ? 'Hide Map' : 'Show Map';
    if (mapVisible) {
      initMapIfNeeded();
      setTimeout(function() {
        google.maps.event.trigger(map, 'resize');
        loadMarkers();
      }, 100);
    }
  }

  /* ── Filters toggle ── */
  var filtersOpen = false;
  function toggleFilters() {
    filtersOpen = !filtersOpen;
    document.getElementById('filters-row').style.display = filtersOpen ? '' : 'none';
    document.getElementById('filters-arrow').innerHTML = filtersOpen ? '&#9650;' : '&#9660;';
    if (filtersOpen && !document.querySelectorAll('.filter-rule').length) addFilterRule();
  }

  /* ── Filter engine ── */
  var availableTags = [];
  var activeFilters = [];

  var FILTER_FIELDS = [
    { v:'city',   l:'City'   },
    { v:'state',  l:'State'  },
    { v:'active', l:'Active' },
    { v:'tags',   l:'Tags'   },
  ];

  function getOperatorOptions(field, selectedOp) {
    var ops = field === 'active'
      ? [{ v:'eq', l:'= Equal To' }, { v:'neq', l:'!= Not Equal To' }]
      : field === 'tags'
        ? [{ v:'contains', l:'Contains' }, { v:'notcontains', l:'Does Not Contain' }]
        : [{ v:'contains', l:'Contains' }, { v:'eq', l:'= Equal To' }, { v:'neq', l:'!= Not Equal To' }, { v:'notcontains', l:'Does Not Contain' }];
    return ops.map(function(o) {
      return '<option value="' + o.v + '"' + (o.v === selectedOp ? ' selected' : '') + '>' + o.l + '</option>';
    }).join('');
  }

  function getValueHtml(field) {
    if (field === 'active') {
      return '<select class="filter-val"><option value="true">Yes</option><option value="false">No</option></select>';
    }
    if (field === 'tags') {
      var opts = availableTags.length
        ? availableTags.map(function(t) { return '<option value="' + t.name.replace(/"/g,'&quot;') + '">' + t.name + '</option>'; }).join('')
        : '<option value="">No tags yet</option>';
      return '<select class="filter-val">' + opts + '</select>';
    }
    return '<input type="text" class="filter-val" placeholder="Enter value..."/>';
  }

  function addFilterRule() {
    var div = document.createElement('div');
    div.className = 'filter-rule';
    var defaultField = FILTER_FIELDS[0].v;
    var fieldOpts = FILTER_FIELDS.map(function(f) {
      return '<option value="' + f.v + '">' + f.l + '</option>';
    }).join('');
    div.innerHTML =
      '<select class="filter-field" onchange="onFieldChange(this)">' + fieldOpts + '</select>' +
      '<select class="filter-op">' + getOperatorOptions(defaultField, 'contains') + '</select>' +
      '<div class="filter-val-wrap">' + getValueHtml(defaultField) + '</div>' +
      '<button class="filter-remove-btn" onclick="this.closest(\'.filter-rule\').remove()">&#215;</button>';
    document.getElementById('filter-rules').appendChild(div);
  }

  function onFieldChange(sel) {
    var rule = sel.closest('.filter-rule');
    var field = sel.value;
    rule.querySelector('.filter-op').innerHTML = getOperatorOptions(field, 'contains');
    rule.querySelector('.filter-val-wrap').innerHTML = getValueHtml(field);
  }

  function applyFilters() {
    var rules = [];
    document.querySelectorAll('.filter-rule').forEach(function(rule) {
      var fieldEl = rule.querySelector('.filter-field');
      var opEl    = rule.querySelector('.filter-op');
      var valEl   = rule.querySelector('.filter-val');
      if (!fieldEl || !opEl || !valEl) return;
      var field = fieldEl.value;
      var op    = opEl.value;
      var val   = valEl.value.trim();
      if (field && val !== '') rules.push({ field: field, op: op, val: val });
    });
    activeFilters = rules;
    loadProperties();
  }

  function clearFilters() {
    activeFilters = [];
    document.getElementById('filter-rules').innerHTML = '';
    addFilterRule();
    renderTable();
  }

  async function loadTags() {
    var uid = await getUid();
    if (!uid) return;
    var { data } = await sb.from('tags').select('id, name').eq('user_id', uid).eq('active', true).order('name');
    availableTags = data || [];
  }

  /* ── Actions dropdown ── */
  function toggleDropdown(e) {
    e.stopPropagation();
    document.getElementById('actions-dropdown').classList.toggle('open');
  }
  document.addEventListener('click', function() {
    document.getElementById('actions-dropdown').classList.remove('open');
  });

  /* ── Filter pills ── */
  function setTab(btn) {
    document.querySelectorAll('.ftab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderTable();
  }

  /* ── Table ── */
  var properties = [];
  var currentPage = 1, totalCount = 0, PAGE_SIZE = 1000;

  function goPage(dir) {
    var totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
    loadProperties();
  }

  var currentUid = null;
  async function getUid() {
    if (currentUid) return currentUid;
    var { data: sess } = await sb.auth.getSession();
    currentUid = sess?.session?.user?.id || null;
    return currentUid;
  }

  async function loadProperties() {
    var uid = await getUid();
    if (!uid) return;
    var { count } = await sb.from('Properties').select('*', { count: 'exact', head: true }).eq('user_id', uid);
    totalCount = count || 0;
    var totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;
    var start = (currentPage - 1) * PAGE_SIZE;
    var { data, error } = await sb.from('Properties').select('*').eq('user_id', uid).range(start, start + PAGE_SIZE - 1);
    if (error) { console.error(error); return; }
    var pgBar = document.getElementById('pagination-bar');
    pgBar.style.display = totalCount > PAGE_SIZE ? 'flex' : 'none';
    document.getElementById('pg-current-num').textContent = currentPage;
    document.getElementById('pg-total-num').textContent = totalPages;
    properties = (data || []).sort(function(a, b) {
      var nameA = (a.name || a.address || '').toLowerCase();
      var nameB = (b.name || b.address || '').toLowerCase();
      return nameA < nameB ? -1 : nameA > nameB ? 1 : 0;
    });
    renderTable();
    loadMarkers();
  }

  function renderTable() {
    var tbody = document.getElementById('property-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    tbody.innerHTML = '';

    var activeTab = (document.querySelector('.ftab.active') || {}).textContent || 'Properties';
    var tagRules    = activeFilters.filter(function(f) { return f.field === 'tags'; });
    var nonTagFilters = activeFilters.filter(function(f) { return f.field !== 'tags'; });
    var filtered = properties.filter(function(p) {
      // Tab filter
      if (activeTab === 'Former Properties') { if (p.active !== false) return false; }
      else if (activeTab === 'Active Properties') { if (p.active === false) return false; }
      else if (activeTab === 'Properties') { if (p.active === false) return false; }
      // 'Properties & Former' and 'All Properties' show everything

      // Tag filter: check property_tags array directly
      if (tagRules.length) {
        var propTags = Array.isArray(p.property_tags) ? p.property_tags : [];
        for (var i = 0; i < tagRules.length; i++) {
          var tr = tagRules[i];
          var hasTag = propTags.indexOf(tr.val) !== -1;
          if (tr.op === 'contains'    && !hasTag) return false;
          if (tr.op === 'notcontains' &&  hasTag) return false;
        }
      }
      return nonTagFilters.every(function(f) {
        var raw = p[f.field];
        var fv = (raw === null || raw === undefined ? '' : String(raw)).toLowerCase();
        var tv = f.val.toLowerCase();
        if (f.op === 'eq')         return fv === tv;
        if (f.op === 'neq')        return fv !== tv;
        if (f.op === 'contains')   return fv.includes(tv);
        if (f.op === 'notcontains') return !fv.includes(tv);
        return true;
      });
    });

    document.getElementById('results-bar').textContent =
      filtered.length + ' ' + (filtered.length === 1 ? 'property' : 'properties');

    if (filtered.length === 0) {
      emptyMsg.style.display = '';
      return;
    }
    emptyMsg.style.display = 'none';
    filtered.forEach(function(p) {
      var tr = document.createElement('tr');
      tr.style.cursor = 'pointer';
      tr.dataset.id = p.id;
      tr.innerHTML =
        '<td><input type="checkbox" onclick="event.stopPropagation()" onchange="if(map)loadMarkers()"/></td>' +
        '<td><a class="property-link" href="dashboard.html#propprofile?id=' + p.id + '" style="cursor:pointer;color:#2272c3;font-weight:600;" onclick="event.stopPropagation();if(!event.ctrlKey&&!event.metaKey){event.preventDefault();goToProperty(\'' + p.id + '\');}">' + (p.name || p.address || '') + '</a></td>' +
        '<td>' + (p.address || '') + '</td>' +
        '<td>' + (p.city || '') + '</td>';
      tr.addEventListener('click', function(e) {
        if (e.target.type === 'checkbox') return;
        goToProperty(p.id);
      });
      tbody.appendChild(tr);
    });
  }

  function goToProperty(id) {
    window.location.href = 'propertiesprofile.html?id=' + id;
  }

  function toggleAll(cb) {
    document.querySelectorAll('#property-tbody input[type="checkbox"]')
      .forEach(function(c) { c.checked = cb.checked; });
    if (map) loadMarkers();
  }

  function loadMarkers() {
    mapMarkers.forEach(function(m) { m.setMap(null); });
    mapMarkers = [];
    if (!map) return;
    var checkedIds = [];
    document.querySelectorAll('#property-tbody tr').forEach(function(tr) {
      var cb = tr.querySelector('input[type="checkbox"]');
      if (cb && cb.checked) checkedIds.push(tr.dataset.id);
    });
    var bounds = new google.maps.LatLngBounds();
    checkedIds.forEach(function(id) {
      var r = properties.find(function(p) { return String(p.id) === id; });
      if (!r || !r.lat || !r.lng) return;
      var pos = { lat: parseFloat(r.lat), lng: parseFloat(r.lng) };
      var marker = new google.maps.Marker({
        position: pos,
        map: map,
        title: r.address || '',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: '#e07820',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2
        }
      });
      var infoWindow = new google.maps.InfoWindow({
        content: '<strong>' + (r.address || '') + '</strong><br>Client: ' + (r.client_name || '')
      });
      marker.addListener('click', function() { infoWindow.open(map, marker); });
      mapMarkers.push(marker);
      bounds.extend(pos);
    });
    if (mapMarkers.length === 1) {
      map.setCenter(mapMarkers[0].getPosition());
      map.setZoom(16);
    } else if (mapMarkers.length > 1) {
      map.fitBounds(bounds);
    }
  }

  loadProperties();
  loadTags();

  function openPropertyModal(id) {
    var src = 'PropertiesAdd.html' + (id ? '?id=' + id : '');
    document.getElementById('prop-modal-iframe').src = src;
    document.getElementById('prop-modal-overlay').style.display = 'flex';
  }

  function closePropertyModal(saved) {
    document.getElementById('prop-modal-overlay').style.display = 'none';
    document.getElementById('prop-modal-iframe').src = '';
    if (saved) loadProperties();
  }

  async function makePropertiesActive(active) {
    document.getElementById('actions-dropdown').classList.remove('open');
    var checkedIds = [];
    document.querySelectorAll('#property-tbody tr').forEach(function(tr) {
      var cb = tr.querySelector('input[type="checkbox"]');
      if (cb && cb.checked) checkedIds.push(tr.dataset.id);
    });
    if (!checkedIds.length) { alert('Check the box next to each property you want to update first.'); return; }
    var CHUNK = 50;
    for (var i = 0; i < checkedIds.length; i += CHUNK) {
      var { error } = await sb.from('Properties').update({ active: active }).in('id', checkedIds.slice(i, i + CHUNK));
      if (error) { alert('Update failed: ' + error.message); return; }
    }
    loadProperties();
  }

  document.getElementById('prop-modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closePropertyModal(false);
  });

  function deleteSelectedProperties() {
    document.getElementById('actions-dropdown').classList.remove('open');
    var checkedIds = [];
    document.querySelectorAll('#property-tbody tr').forEach(function(tr) {
      var cb = tr.querySelector('input[type="checkbox"]');
      if (cb && cb.checked) checkedIds.push(tr.dataset.id);
    });
    if (!checkedIds.length) { alert('Check the box next to each property you want to delete first.'); return; }
    var bar = document.getElementById('delete-confirm-bar');
    document.getElementById('delete-confirm-count').textContent = checkedIds.length;
    bar.dataset.ids = JSON.stringify(checkedIds);
    bar.style.display = 'flex';
  }

  async function confirmDeleteProperties() {
    var bar = document.getElementById('delete-confirm-bar');
    var ids = JSON.parse(bar.dataset.ids || '[]');
    bar.style.display = 'none';
    var CHUNK = 50;
    for (var i = 0; i < ids.length; i += CHUNK) {
      var r1 = await sb.from('Services').delete().in('property_id', ids.slice(i, i + CHUNK));
      if (r1.error) { alert('Error deleting related services: ' + r1.error.message); return; }
    }
    for (var i = 0; i < ids.length; i += CHUNK) {
      var r2 = await sb.from('Properties').delete().in('id', ids.slice(i, i + CHUNK));
      if (r2.error) { alert('Delete failed: ' + r2.error.message); return; }
    }
    loadProperties();
  }
</script>
</body>
</html>
