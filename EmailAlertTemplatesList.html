<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alert Email Set Up</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #ede5d8; font-size: 13px; color: #222; }
    .page-hdr { background: #1e1208; margin: 8px 16px; border-radius: 10px; padding: 10px 24px; }
    .page-hdr p { font-size: 13px; color: rgba(255,255,255,.6); }
    .link-card { margin: 4px 16px 16px; border-radius: 10px; overflow: hidden; background: #fff; }
    .link-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      text-decoration: none;
      background: #fff;
    }
    .link-item:last-child { border-bottom: none; }
    .link-item:hover { background: #f5f3fa; }

    .link-icon {
      width: 42px;
      height: 42px;
      min-width: 42px;
      background: #fdf3e3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #8a5518;
    }

    .link-text .link-name {
      font-size: 15px;
      font-weight: 700;
      color: #8a5518;
      margin-bottom: 3px;
    }
    .link-text .link-desc {
      font-size: 12.5px;
      color: #777;
      line-height: 1.4;
    }

    .link-arrow {
      margin-left: auto;
      color: #8a5518;
      font-size: 18px;
    }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="page-hdr">
  <p>Configure how alert emails look and what information they include.</p>
</div>

<div class="link-card">
  <div class="link-item" onclick="navigate('emailalerttemplatesadd')">
    <div class="link-icon">&#9993;</div>
    <div class="link-text">
      <div class="link-name">Alert Email Template</div>
      <div class="link-desc">Choose and save the email template used when sending alerts to clients.</div>
    </div>
    <div class="link-arrow">&#8250;</div>
  </div>

  <div class="link-item" onclick="navigate('alertemailinfo')">
    <div class="link-icon">&#128196;</div>
    <div class="link-text">
      <div class="link-name">Alert Email Info</div>
      <div class="link-desc">Customize the content, sender details, and additional fields included in alert emails.</div>
    </div>
    <div class="link-arrow">&#8250;</div>
  </div>
</div>

<script>
  function navigate(page) {
    if (window.parent && window.parent.loadPage) {
      window.parent.loadPage(page);
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intro.js@7/introjs.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/intro.js@7/intro.min.js"></script>
<script src="tour.js"></script>
<style>.help-tour-btn{position:fixed;bottom:22px;right:22px;width:42px;height:42px;border-radius:50%;background:#e07820;color:#fff;border:none;font-size:20px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:999;display:flex;align-items:center;justify-content:center;line-height:1;} .help-tour-btn:hover{background:#c96a10;transform:scale(1.08);}</style>
<button class="help-tour-btn" data-tour-page="emailalerttemplateslist" onclick="startTour('emailalerttemplateslist')" title="Page walkthrough">?</button>
</body>
</html>
