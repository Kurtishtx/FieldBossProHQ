<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alert Email Set Up</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; font-size: 13px; color: #222; }

    .page-hdr { padding: 20px 24px 14px; }
    .page-hdr h1 { font-size: 22px; font-weight: 800; color: #111; }
    .page-hdr p { font-size: 13px; color: #777; margin-top: 4px; }

    .divider { border: none; border-top: 1px solid #eee; margin: 0 24px; }

    .link-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      text-decoration: none;
    }
    .link-item:hover { background: #f5f9ff; }

    .link-icon {
      width: 42px;
      height: 42px;
      min-width: 42px;
      background: #e8f0fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #2272c3;
    }

    .link-text .link-name {
      font-size: 15px;
      font-weight: 700;
      color: #2272c3;
      margin-bottom: 3px;
    }
    .link-text .link-desc {
      font-size: 12.5px;
      color: #777;
      line-height: 1.4;
    }

    .link-arrow {
      margin-left: auto;
      color: #2272c3;
      font-size: 18px;
    }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="page-hdr">
  <p>Configure how alert emails look and what information they include.</p>
</div>

<hr class="divider"/>

<div class="link-item" onclick="navigate('emailalerttemplatesadd')">
  <div class="link-icon">&#9993;</div>
  <div class="link-text">
    <div class="link-name">Alert Email Template</div>
    <div class="link-desc">Choose and save the email template used when sending alerts to clients.</div>
  </div>
  <div class="link-arrow">&#8250;</div>
</div>

<div class="link-item" onclick="navigate('alertemailinfo')">
  <div class="link-icon">&#128196;</div>
  <div class="link-text">
    <div class="link-name">Alert Email Info</div>
    <div class="link-desc">Customize the content, sender details, and additional fields included in alert emails.</div>
  </div>
  <div class="link-arrow">&#8250;</div>
</div>

<script>
  function navigate(page) {
    if (window.parent && window.parent.loadPage) {
      window.parent.loadPage(page);
    }
  }
</script>
</body>
</html>
