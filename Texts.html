<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; }

    .layout { display: flex; height: 100vh; }

    /* ── Left panel ── */
    .left-panel {
      width: 280px;
      min-width: 280px;
      background: #787878;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #666;
    }

    .left-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .left-hdr h2 { color: #fff; font-size: 18px; font-weight: 800; }
    .compose-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.75); font-size: 18px; padding: 2px;
    }
    .compose-btn:hover { color: #fff; }

    .convo-list { flex: 1; overflow-y: auto; }
    .convo-list::-webkit-scrollbar { width: 4px; }
    .convo-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 4px; }

    .convo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,.08);
      transition: background .1s;
    }
    .convo-item:hover { background: rgba(255,255,255,.08); }
    .convo-item.active {
      background: #fff;
      border-left: 3px solid #444;
      padding-left: 11px;
    }
    .convo-item.active .convo-name { color: #111; }
    .convo-item.active .convo-sub  { color: #666; }

    .avatar {
      width: 44px; height: 44px; min-width: 44px;
      border-radius: 50%;
      background: #555;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      text-transform: uppercase;
    }
    .convo-item.active .avatar { background: #4a4a4a; }

    .convo-info { overflow: hidden; }
    .convo-name {
      font-size: 13.5px; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .convo-sub { font-size: 11.5px; color: rgba(255,255,255,.6); margin-top: 2px; }
    .convo-preview {
      font-size: 11.5px; color: rgba(255,255,255,.5);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .convo-item.active .convo-preview { color: #888; }

    .empty-convos {
      padding: 40px 20px; text-align: center;
      color: rgba(255,255,255,.4); font-size: 13px; line-height: 1.6;
    }

    /* ── Right panel ── */
    .right-panel {
      flex: 1;
      background: #ebebeb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .right-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; color: #aaa;
    }
    .right-empty .icon { font-size: 48px; }
    .right-empty p { font-size: 14px; }

    .msg-thread-hdr {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex; align-items: center; gap: 12px;
    }
    .thread-avatar {
      width: 38px; height: 38px; min-width: 38px;
      border-radius: 50%; background: #555;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .thread-name { font-size: 15px; font-weight: 700; color: #111; }
    .thread-phone { font-size: 12px; color: #888; margin-top: 2px; }

    .msg-thread {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 0;
    }
    .msg-thread::-webkit-scrollbar { width: 6px; }
    .msg-thread::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .send-box {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid #e0e0e0; background: #fff;
    }
    .send-box input {
      flex: 1; border: 1px solid #ccc; border-radius: 20px;
      padding: 10px 16px; font-size: 14px; font-family: inherit; outline: none;
    }
    .send-box input:focus { border-color: #e07820; }
    .send-box button {
      background: #e07820; color: #fff; border: none; border-radius: 20px;
      padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .send-box button:hover { background: #c96a15; }

    .date-sep {
      display: flex; align-items: center; gap: 14px;
      color: #aaa; font-size: 12px; margin: 18px 0 14px;
    }
    .date-sep::before, .date-sep::after {
      content: ''; flex: 1; height: 1px; background: #d0d0d0;
    }

    .msg-row {
      display: flex; gap: 12px; align-items: flex-start;
      margin-bottom: 20px;
    }
    .msg-bubble-avatar {
      width: 36px; height: 36px; min-width: 36px; border-radius: 50%;
      background: #5b9bd5; display: flex; align-items: center;
      justify-content: center; font-size: 14px; color: #fff; font-weight: 700;
      margin-top: 2px;
    }
    .msg-body-wrap { flex: 1; }
    .msg-time { font-size: 11.5px; color: #aaa; margin-bottom: 6px; }
    .msg-text {
      background: #fff; border-radius: 8px;
      padding: 14px 16px; font-size: 13.5px; color: #222;
      line-height: 1.65; box-shadow: 0 1px 3px rgba(0,0,0,.07);
      white-space: pre-wrap;
    }
    .msg-status {
      font-size: 11px; color: #aaa; margin-top: 5px; text-align: right;
    }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="layout">

  <!-- Left: conversation list -->
  <div class="left-panel">
    <div class="left-hdr">
      <h2>Messages</h2>
      <button class="compose-btn" title="Refresh" onclick="init()">&#8635;</button>
    </div>
    <div class="convo-list" id="convo-list">
      <div class="empty-convos">No messages yet.<br/>Messages will appear here after alerts are sent.</div>
    </div>
  </div>

  <!-- Right: message thread -->
  <div class="right-panel" id="right-panel">
    <div class="right-empty">
      <div class="icon">&#128172;</div>
      <p>Select a conversation</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL      = 'https://knjdbgroiyhvqwrpqzcx.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var allMessages = [];
  var conversations = [];
  var activePhone = null;

  async function init() {
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    if (!uid) return;

    var params = new URLSearchParams(window.location.search);
    var prePhone = params.get('phone');
    var preName  = params.get('name') || '';

    var { data: msgs } = await sb.from('sms_messages')
      .select('*')
      .eq('user_id', uid)
      .order('sent_at', { ascending: true });

    allMessages = msgs || [];
    buildConversations();

    if (prePhone) {
      var formatted = prePhone.length === 10 ? '+1' + prePhone : prePhone.startsWith('+') ? prePhone : '+' + prePhone;
      // Add a new conversation entry if this client has no prior messages
      var existing = conversations.find(function(c) { return c.phone === formatted || c.phone === prePhone; });
      if (!existing) {
        conversations.unshift({ phone: formatted, client_name: preName || formatted, messages: [] });
      }
      activePhone = existing ? existing.phone : formatted;
    }

    renderConvoList();
    if (activePhone) renderThread(activePhone);
  }

  function buildConversations() {
    var map = {};
    allMessages.forEach(function(m) {
      var phone = m.direction === 'outbound' ? m.phone_to : m.phone_from;
      if (!phone) return;
      if (!map[phone]) map[phone] = { phone: phone, client_name: m.client_name || phone, messages: [] };
      if (m.client_name && m.client_name !== phone) map[phone].client_name = m.client_name;
      map[phone].messages.push(m);
    });
    conversations = Object.values(map).sort(function(a, b) {
      var aLast = a.messages[a.messages.length - 1].sent_at;
      var bLast = b.messages[b.messages.length - 1].sent_at;
      return bLast < aLast ? -1 : 1;
    });
  }

  function initials(name) {
    if (!name) return '?';
    var parts = name.replace(',', '').trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return name[0].toUpperCase();
  }

  function formatDisplayName(name) {
    if (!name || name.startsWith('+')) return name || 'Unknown';
    return name;
  }

  function renderConvoList() {
    var list = document.getElementById('convo-list');
    if (!conversations.length) {
      list.innerHTML = '<div class="empty-convos">No messages yet.<br/>Messages will appear here after alerts are sent.</div>';
      return;
    }
    list.innerHTML = '';
    conversations.forEach(function(c) {
      var lastMsg = c.messages[c.messages.length - 1];
      var preview = (lastMsg.body || '').substring(0, 50);
      var div = document.createElement('div');
      div.className = 'convo-item' + (c.phone === activePhone ? ' active' : '');
      div.onclick = function() { selectConvo(c.phone); };
      div.innerHTML =
        '<div class="avatar">' + initials(c.client_name) + '</div>' +
        '<div class="convo-info">' +
          '<div class="convo-name">' + escHtml(formatDisplayName(c.client_name)) + '</div>' +
          '<div class="convo-sub">client</div>' +
          '<div class="convo-preview">' + escHtml(preview) + '</div>' +
        '</div>';
      list.appendChild(div);
    });
  }

  function selectConvo(phone) {
    activePhone = phone;
    renderConvoList();
    renderThread(phone);
  }

  function renderThread(phone) {
    var convo = conversations.find(function(c) { return c.phone === phone; });
    if (!convo) return;

    var right = document.getElementById('right-panel');
    right.innerHTML =
      '<div class="msg-thread-hdr">' +
        '<div class="thread-avatar">' + initials(convo.client_name) + '</div>' +
        '<div>' +
          '<div class="thread-name">' + escHtml(formatDisplayName(convo.client_name)) + '</div>' +
          '<div class="thread-phone">' + escHtml(phone) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="msg-thread" id="msg-thread"></div>' +
      '<div class="send-box">' +
        '<input type="text" id="send-input" placeholder="Send a message to ' + escHtml(formatDisplayName(convo.client_name)) + '" onkeydown="if(event.key===\'Enter\')sendManualText()"/>' +
        '<button onclick="sendManualText()">Send</button>' +
      '</div>';

    var thread = document.getElementById('msg-thread');
    var lastDate = null;

    convo.messages.forEach(function(m) {
      var d = new Date(m.sent_at);
      var dateStr = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      // Format like "May 20th, 2026"
      var day = d.getDate();
      var suffix = day === 1 || day === 21 || day === 31 ? 'st' : day === 2 || day === 22 ? 'nd' : day === 3 || day === 23 ? 'rd' : 'th';
      var niceDate = d.toLocaleDateString('en-US', { month: 'long' }) + ' ' + day + suffix + ', ' + d.getFullYear();

      if (niceDate !== lastDate) {
        var sep = document.createElement('div');
        sep.className = 'date-sep';
        sep.textContent = niceDate;
        thread.appendChild(sep);
        lastDate = niceDate;
      }

      var timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

      var row = document.createElement('div');
      row.className = 'msg-row';
      row.innerHTML =
        '<div class="msg-bubble-avatar">?</div>' +
        '<div class="msg-body-wrap">' +
          '<div class="msg-time">' + timeStr + '</div>' +
          '<div class="msg-text">' + escHtml(m.body || '') + '</div>' +
          '<div class="msg-status">' + escHtml(m.direction === 'inbound' ? 'Received' : (m.twilio_sid ? 'Sent' : 'Sent')) + '</div>' +
        '</div>';
      thread.appendChild(row);
    });

    thread.scrollTop = thread.scrollHeight;
  }

  async function sendManualText() {
    var input = document.getElementById('send-input');
    var msg = (input ? input.value : '').trim();
    if (!msg || !activePhone) return;
    input.value = '';
    input.disabled = true;

    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    if (!uid) { input.disabled = false; return; }

    var { data: voip } = await sb.from('twilio_settings').select('account_sid, auth_token, phone_number').eq('user_id', uid).single();
    if (!voip || !voip.account_sid) { alert('voip.ms not configured in Admin panel.'); input.disabled = false; return; }

    var toClean = activePhone.replace(/^\+/, '');
    var didClean = voip.phone_number.replace(/\D/g, '');
    var url = 'https://voip.ms/api/v1/rest.php?api_username=' + encodeURIComponent(voip.account_sid) +
      '&api_password=' + encodeURIComponent(voip.auth_token) +
      '&method=sendSMS&did=' + didClean + '&dst=' + toClean + '&message=' + encodeURIComponent(msg);

    var res = await fetch(url);
    var json = await res.json();

    var convo = conversations.find(function(c) { return c.phone === activePhone; });
    var clientName = convo ? convo.client_name : activePhone;

    await sb.from('sms_messages').insert({
      user_id: uid, client_name: clientName,
      phone_to: activePhone, phone_from: voip.phone_number,
      body: msg, direction: 'outbound', twilio_sid: null,
      sent_at: new Date().toISOString()
    });

    // Reload messages and re-render
    var { data: msgs } = await sb.from('sms_messages').select('*').eq('user_id', uid).order('sent_at', { ascending: true });
    allMessages = msgs || [];
    buildConversations();
    renderConvoList();
    renderThread(activePhone);
    input.disabled = false;
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
