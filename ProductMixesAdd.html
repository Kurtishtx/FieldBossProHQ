<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Mix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f5f5f5; color: #222; }

    .dialog { max-width: 1100px; margin: 30px auto; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,.15); background: #fff; }
    .dialog-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .dialog-header h1 { font-size: 20px; font-weight: 700; color: #111; }
    .close-btn { background: none; border: 1px solid #bbb; padding: 2px 7px; font-size: 13px; cursor: pointer; color: #555; border-radius: 2px; }
    .close-btn:hover { background: #f0f0f0; }

    .dialog-body { padding: 20px 24px 8px; }

    .section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; padding: 16px 0 10px; border-top: 1px solid #eee; margin-top: 8px; }
    .section-label:first-child { border-top: none; padding-top: 0; }

    .field-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .field-row label { width: 160px; font-weight: 700; font-size: 13px; color: #333; flex-shrink: 0; padding-top: 8px; }
    .field-row input[type="text"],
    .field-row input[type="number"],
    .field-row select {
      flex: 1; width: 100%; border: 1px solid #ccc; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; border-radius: 2px;
    }
    .field-row input:focus, .field-row select:focus { border-color: #e07820; }
    .field-hint { font-size: 12px; color: #999; margin-top: 3px; }

    /* Application Rate row */
    .app-rate-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .app-rate-row input[type="number"] {
      width: 80px; border: 1px solid #ccc; border-radius: 2px; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; text-align: right;
    }
    .app-rate-row input:focus { border-color: #e07820; }
    .app-rate-row select {
      border: 1px solid #ccc; border-radius: 2px; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none;
    }
    .app-rate-row select:focus { border-color: #e07820; }
    .per-label { font-size: 14px; font-weight: 700; color: #333; }

    /* Mix product rows */
    .mix-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .mix-row select { border: 1px solid #ccc; border-radius: 2px; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; }
    .mix-row select:focus { border-color: #e07820; }
    .mix-row input[type="number"] {
      width: 80px; border: 1px solid #ccc; border-radius: 2px; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; text-align: right;
    }
    .mix-row input:focus { border-color: #e07820; }
    .mix-row select.products-select { width: 200px; }
    .del-btn { background: none; border: none; cursor: pointer; color: #c0392b; font-size: 20px; line-height: 1; padding: 0 2px; }
    .del-btn:hover { color: #a93226; }

    .btn-add-product { background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px; padding: 5px 14px; font-size: 13px; font-family: inherit; color: #333; cursor: pointer; margin-top: 6px; }
    .btn-add-product:hover { background: #e4e4e4; }

    .dialog-footer { padding: 16px 24px 24px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; margin-top: 16px; }
    .btn-save { background: #e07820; color: #fff; border: none; padding: 9px 28px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save:hover { background: #c96a10; }
    .btn-save-new { background: #e07820; color: #fff; border: none; padding: 9px 20px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save-new:hover { background: #c96a10; }
    .btn-cancel { color: #555; font-size: 13px; cursor: pointer; margin-left: 4px; }
    .btn-cancel:hover { text-decoration: underline; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="dialog">
  <div class="dialog-header">
    <h1>Add Mix</h1>
    <button class="close-btn" onclick="history.back()">&#10005;</button>
  </div>

  <div class="dialog-body">

    <div class="section-label">Mix Name</div>

    <div class="field-row">
      <label for="mix-name">Name</label>
      <div style="flex:1;">
        <input type="text" id="mix-name" placeholder=""/>
      </div>
    </div>

    <div class="section-label">Application Rate</div>

    <div class="app-rate-row">
      <input type="number" id="app-rate-amount" placeholder="0"/>
      <select id="app-rate-uom" style="width:160px;">
        <option value="">Select UoM</option>
        <option>Cups</option>
        <option>Gallons</option>
        <option>Grams</option>
        <option>Kilograms</option>
        <option>Liters</option>
        <option>Milliliters</option>
        <option>Ounces - Liquid</option>
        <option>Ounces - Weight</option>
        <option>Pints</option>
        <option>Pounds</option>
        <option>Quarts</option>
        <option>Tablespoon</option>
        <option>Teaspoon(s)</option>
      </select>
      <span class="per-label">per</span>
      <input type="number" id="app-rate-per" placeholder="0"/>
      <select id="app-rate-per-uom" style="width:170px;">
        <option value="">Select Area Uom</option>
        <option>Acres</option>
        <option>Gallons</option>
        <option>Linear Feet</option>
        <option>Sq Feet</option>
      </select>
    </div>

    <div class="section-label">Mix Products</div>

    <div id="mix-rows">
      <div class="mix-row">
        <select class="products-select">
          <option value="">Search Products...</option>
        </select>
        <input type="number" class="mix-amount" placeholder="0"/>
        <select class="mix-uom" style="width:150px;">
          <option value="">Select UoM</option>
          <option>Cups</option>
          <option>Gallons</option>
          <option>Grams</option>
          <option>Kilograms</option>
          <option>Liters</option>
          <option>Milliliters</option>
          <option>Ounces - Liquid</option>
          <option>Ounces - Weight</option>
          <option>Pints</option>
          <option>Pounds</option>
          <option>Quarts</option>
          <option>Tablespoon</option>
          <option>Teaspoon(s)</option>
        </select>
        <span class="per-label">per</span>
        <input type="number" class="mix-per" placeholder="0"/>
        <select class="mix-per-uom" style="width:150px;">
          <option value="">Select UoM</option>
          <option>Acres</option>
          <option>Cups</option>
          <option>Gallons</option>
          <option>Grams</option>
          <option>Kilograms</option>
          <option>Linear Feet</option>
          <option>Liters</option>
          <option>Milliliters</option>
          <option>Ounces - Liquid</option>
          <option>Ounces - Weight</option>
          <option>Pints</option>
          <option>Pounds</option>
          <option>Quarts</option>
          <option>Sq Feet</option>
        </select>
        <button class="del-btn" onclick="removeMixRow(this)">&#10005;</button>
      </div>
    </div>
    <button class="btn-add-product" onclick="addMixRow()">Add Product</button>

    <div class="section-label">Application Method</div>

    <div class="field-row">
      <label for="app-method">Method</label>
      <div style="flex:1;">
        <select id="app-method" style="max-width:320px;">
          <option value="">Select Method</option>
          <option>Blower Sprayer</option>
          <option>Cup</option>
          <option>DBH</option>
          <option>FlowZone - Backpack</option>
          <option>Scoop</option>
          <option>Spray - Hand sprayer</option>
          <option>Spray - Truck</option>
          <option>Spreader - Broadcast</option>
          <option>Spreader - Hand</option>
        </select>
      </div>
    </div>

    <div class="section-label">Custom Field</div>

    <div class="field-row">
      <label>Custom Field Selection</label>
      <div style="flex:1;">
        <select style="max-width:320px;">
          <option value="">Select Custom Field</option>
          <option>5 LAWN SQ FT</option>
        </select>
      </div>
    </div>

  </div>

  <div class="dialog-footer">
    <button class="btn-save" onclick="saveMix()">Save</button>
    <button class="btn-save-new" onclick="saveMix(true)">Save &amp; New</button>
    <span class="btn-cancel" onclick="history.back()">Cancel</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var mixId = new URLSearchParams(window.location.search).get('id');
  var existing = null;
  var productOptions = '<option value="">Search Products...</option>';

  async function loadProducts() {
    var { data } = await sb.from('Products').select('id, name').order('name', { ascending: true });
    if (data && data.length) {
      productOptions = '<option value="">Search Products...</option>' +
        data.map(function(p) { return '<option value="' + p.id + '">' + p.name + '</option>'; }).join('');
    }
    document.querySelectorAll('.products-select').forEach(function(sel) {
      sel.innerHTML = productOptions;
    });
  }
  loadProducts();

  var PER_UOM_OPTIONS = '<option value="">Select UoM</option><option>Acres</option><option>Cups</option><option>Gallons</option><option>Grams</option><option>Kilograms</option><option>Linear Feet</option><option>Liters</option><option>Milliliters</option><option>Ounces - Liquid</option><option>Ounces - Weight</option><option>Pints</option><option>Pounds</option><option>Quarts</option><option>Sq Feet</option>';
  var AMOUNT_UOM_OPTIONS = '<option value="">Select UoM</option><option>Cups</option><option>Gallons</option><option>Grams</option><option>Kilograms</option><option>Liters</option><option>Milliliters</option><option>Ounces - Liquid</option><option>Ounces - Weight</option><option>Pints</option><option>Pounds</option><option>Quarts</option><option>Tablespoon</option><option>Teaspoon(s)</option>';

  async function initEdit() {
    if (!mixId) return;
    var { data } = await sb.from('Product Mixes').select('*').eq('id', mixId).single();
    if (!data) return;
    existing = data;
    document.getElementById('mix-name').value = data.name || '';
    if (data.app_rate) {
      var ar = data.app_rate;
      document.getElementById('app-rate-amount').value = ar.amount || '';
      document.getElementById('app-rate-uom').value    = ar.uom || '';
      document.getElementById('app-rate-per').value    = ar.per || '';
      document.getElementById('app-rate-per-uom').value = ar.per_uom || '';
    }
    if (data.app_method) document.getElementById('app-method').value = data.app_method;
    if (data.mix_products && data.mix_products.length) {
      var container = document.getElementById('mix-rows');
      container.innerHTML = '';
      data.mix_products.forEach(function(mp) {
        var row = buildMixRowEl(mp);
        container.appendChild(row);
      });
      document.querySelectorAll('.products-select').forEach(function(sel) { sel.innerHTML = productOptions; });
      data.mix_products.forEach(function(mp, i) {
        var rows = document.querySelectorAll('.mix-row');
        if (rows[i]) {
          rows[i].querySelector('.products-select').value = mp.product_id || '';
          rows[i].querySelector('.mix-amount').value = mp.amount || '';
          rows[i].querySelector('.mix-uom').value = mp.uom || '';
          rows[i].querySelector('.mix-per').value = mp.per || '';
          rows[i].querySelector('.mix-per-uom').value = mp.per_uom || '';
        }
      });
    }
  }
  initEdit();

  function collectMixRows() {
    var rows = [];
    document.querySelectorAll('.mix-row').forEach(function(row) {
      var prodSel = row.querySelector('.products-select');
      var pid = prodSel ? prodSel.value : '';
      var amt = row.querySelector('.mix-amount') ? row.querySelector('.mix-amount').value : '';
      var uom = row.querySelector('.mix-uom') ? row.querySelector('.mix-uom').value : '';
      var per = row.querySelector('.mix-per') ? row.querySelector('.mix-per').value : '';
      var perUom = row.querySelector('.mix-per-uom') ? row.querySelector('.mix-per-uom').value : '';
      if (pid || amt) rows.push({ product_id: pid, amount: parseFloat(amt) || 0, uom: uom, per: parseFloat(per) || 0, per_uom: perUom });
    });
    return rows;
  }

  async function saveMix(andNew) {
    var name = document.getElementById('mix-name').value.trim();
    if (!name) { alert('Please enter a mix name.'); document.getElementById('mix-name').focus(); return; }
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    var record = {
      name: name,
      app_rate: {
        amount: parseFloat(document.getElementById('app-rate-amount').value) || 0,
        uom:    document.getElementById('app-rate-uom').value,
        per:    parseFloat(document.getElementById('app-rate-per').value) || 0,
        per_uom: document.getElementById('app-rate-per-uom').value
      },
      app_method: document.getElementById('app-method').value,
      mix_products: collectMixRows()
    };
    if (existing) {
      var { error } = await sb.from('Product Mixes').update(record).eq('id', existing.id);
    } else {
      record.active  = true;
      record.user_id = uid;
      var { error } = await sb.from('Product Mixes').insert(record);
    }
    if (error) { alert('Error: ' + error.message); return; }
    if (andNew) { document.getElementById('mix-name').value = ''; existing = null; mixId = null; document.getElementById('mix-name').focus(); }
    else { history.back(); }
  }

  function buildMixRowEl(mp) {
    var row = document.createElement('div');
    row.className = 'mix-row';
    row.innerHTML =
      '<select class="products-select">' + productOptions + '</select>' +
      '<input type="number" class="mix-amount" placeholder="0" value="' + (mp ? mp.amount || '' : '') + '"/>' +
      '<select class="mix-uom" style="width:150px;">' + AMOUNT_UOM_OPTIONS + '</select>' +
      '<span class="per-label">per</span>' +
      '<input type="number" class="mix-per" placeholder="0" value="' + (mp ? mp.per || '' : '') + '"/>' +
      '<select class="mix-per-uom" style="width:150px;">' + PER_UOM_OPTIONS + '</select>' +
      '<button class="del-btn" onclick="removeMixRow(this)">&#10005;</button>';
    return row;
  }

  function addMixRow() {
    var row = buildMixRowEl(null);
    document.getElementById('mix-rows').appendChild(row);
    row.querySelector('.products-select').innerHTML = productOptions;
  }

  function removeMixRow(btn) {
    var row = btn.closest('.mix-row');
    if (document.querySelectorAll('.mix-row').length > 1) {
      row.remove();
    }
  }
</script>
</body>
</html>
