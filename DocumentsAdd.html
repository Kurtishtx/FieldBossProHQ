<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; min-height: 100vh; }

    .topbar {
      background: #1a2b3c; color: #fff; padding: 12px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .topbar button {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: #fff; padding: 6px 14px; border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 13px;
    }
    .topbar button:hover { background: rgba(255,255,255,.25); }
    .topbar h1 { font-size: 16px; font-weight: 700; }

    .page { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .page-title { font-size: 22px; font-weight: 800; color: #1a2b3c; margin-bottom: 28px; }

    .templates-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 22px; }
    .template-card {
      background: #fff; border-radius: 8px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      display: flex; flex-direction: column;
    }
    .preview-wrap {
      height: 520px; overflow: hidden; position: relative;
      border-bottom: 1px solid #eee; background: #f8f8f8;
    }
    .preview-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: calc(100% / 0.45);
      height: 1500px;
      border: none; pointer-events: none;
      transform: scale(0.45); transform-origin: top left;
    }
    .card-footer { padding: 16px; text-align: center; }
    .use-btn {
      width: 100%; background: #3d8f5f; color: #fff; border: none;
      padding: 13px; font-size: 14px; font-weight: 700; border-radius: 5px;
      cursor: pointer; font-family: inherit;
    }
    .use-btn:hover { background: #2f7049; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 999;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      background: #fff; border-radius: 8px; padding: 30px 32px;
      width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal-card h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; color: #1a2b3c; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
    .field input[type="text"] {
      width: 100%; border: 1px solid #ccc; border-radius: 4px;
      padding: 9px 11px; font-size: 14px; font-family: inherit; outline: none;
    }
    .field input[type="text"]:focus { border-color: #8a5518; }
    .default-row {
      display: flex; align-items: center; gap: 10px;
      background: #f0f6ff; border: 1px solid #c0d8f5; border-radius: 5px;
      padding: 12px 14px; margin-bottom: 20px; cursor: pointer;
    }
    .default-row input[type="checkbox"] { width: 17px; height: 17px; cursor: pointer; accent-color: #8a5518; }
    .default-row span { font-size: 13px; color: #8a5518; font-weight: 600; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-save {
      flex: 1; background: #3d8f5f; color: #fff; border: none;
      padding: 11px; font-size: 14px; font-weight: 700; border-radius: 5px;
      cursor: pointer; font-family: inherit;
    }
    .btn-save:hover { background: #2f7049; }
    .btn-cancel {
      background: #f0f0f0; color: #555; border: 1px solid #ccc;
      padding: 11px 20px; font-size: 14px; border-radius: 5px;
      cursor: pointer; font-family: inherit;
    }
    .btn-cancel:hover { background: #e4e4e4; }

    /* Current template view */
    .ct-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
    }
    .ct-label { font-size: 22px; font-weight: 800; color: #1a2b3c; }
    .ct-sub { font-size: 13px; color: #777; margin-top: 3px; }
    .ct-actions { display: flex; gap: 10px; }
    .btn-change {
      background: #fff; color: #1a2b3c; border: 2px solid #1a2b3c;
      padding: 9px 20px; font-size: 13px; font-weight: 700; border-radius: 5px;
      cursor: pointer; font-family: inherit;
    }
    .btn-change:hover { background: #f0f0f0; }
    .ct-preview-wrap {
      background: #fff; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12); overflow: hidden;
    }
    .ct-preview-wrap iframe {
      width: 100%; height: 780px; border: none; display: block;
    }
    .ct-sample-note {
      background: #fff8ed; border: 1px solid #f5c57a; border-radius: 6px;
      padding: 10px 16px; font-size: 12.5px; color: #8a5700;
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
  </style>

</head>

async function saveTemplate() {
  var name = document.getElementById('doc-name').value.trim();
  if (!name) { alert('Please enter a document name.'); return; }
  var isDefault = document.getElementById('set-default').checked;

  if (isDefault) {
    await sb.from('documents').update({ is_default: false }).eq('doc_type', 'Invoice');
  }

  var { data: sessionData } = await sb.auth.getSession();
  var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
  var payload = {
    user_id:     uid,
    name:        name,
    doc_type:    'Invoice',
    template_id: selectedTemplate,
    content:     getTemplateContent(selectedTemplate),
    is_default:  isDefault,
    active:      true,
    blocks:      []
  };

  var res = await sb.from('documents').insert(payload).select().single();
  if (res.error) { alert('Error saving: ' + res.error.message); return; }

  closeModal();
  await init();
}

init();
