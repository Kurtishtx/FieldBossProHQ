<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Completed Alert</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; font-size: 13px; color: #222; }
    .page-hdr { padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .page-hdr h1 { font-size: 22px; font-weight: 800; color: #111; }
    .page-hdr p  { font-size: 13px; color: #777; margin-top: 4px; }
    .content { padding: 20px 24px; max-width: 680px; }
    .var-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .var-row label { font-size: 12.5px; font-weight: 600; color: #555; white-space: nowrap; }
    .var-select { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: inherit; color: #333; background: #fafafa; outline: none; cursor: pointer; }
    .var-select:focus { border-color: #2272c3; background: #fff; }
    .insert-btn { padding: 9px 18px; background: #2272c3; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .insert-btn:hover { background: #1a5ea0; }

    .msg-area {
      width: 100%; min-height: 180px; border: 1px solid #ddd;
      border-radius: 8px; padding: 14px; font-size: 14px;
      font-family: 'Segoe UI', Arial, sans-serif; color: #222;
      outline: none; line-height: 1.8; margin-bottom: 6px;
      white-space: pre-wrap; word-break: break-word; cursor: text;
    }
    .msg-area:focus { border-color: #2272c3; }
    .ghost-reason { color: #bbb; font-style: italic; }

    .char-count { text-align: right; font-size: 12px; color: #888; margin-bottom: 18px; font-weight: 600; }
    .char-count.warn { color: #e67e22; }
    .char-count.over { color: #d9534f; }
    .save-btn { padding: 10px 30px; background: #2272c3; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .save-btn:hover { background: #1a5ea0; }
    .save-btn:disabled { background: #90b8e0; cursor: default; }
    .save-btn.saved { background: #28a745; }
    .status-msg { font-size: 12.5px; margin-top: 10px; min-height: 18px; }
    .status-msg.ok  { color: #28a745; }
    .status-msg.err { color: #d9534f; }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>
<div class="page-hdr">
  <p>Message sent to clients when a service is completed.</p>
</div>
<div class="content">
  <div class="var-row">
    <label>Insert Variable</label>
    <select class="var-select" id="var-select">
      <option value="">— choose a variable to insert —</option>
      <optgroup label="Client">
        <option value="[clientname]">[clientname] — Full name</option>
        <option value="[clientfirstname]">[clientfirstname] — First name</option>
        <option value="[clientlastname]">[clientlastname] — Last name</option>
        <option value="[clientphone]">[clientphone] — Phone number</option>
        <option value="[clientemail]">[clientemail] — Email address</option>
      </optgroup>
      <optgroup label="Property">
        <option value="[propertyaddress]">[propertyaddress] — Street address</option>
        <option value="[propertycity]">[propertycity] — City</option>
        <option value="[propertystate]">[propertystate] — State</option>
        <option value="[propertyzip]">[propertyzip] — Zip code</option>
      </optgroup>
      <optgroup label="Service">
        <option value="[completedservices]">[completedservices] — All completed services</option>
        <option value="[scheduledservices]">[scheduledservices] — All scheduled services</option>
        <option value="[scheduledservicesnameoninvoice]">[scheduledservicesnameoninvoice] — Completed - Name on Invoice Services</option>
        <option value="[servicedate]">[servicedate] — Service date</option>
        <option value="[servicetime]">[servicetime] — Service time</option>
        <option value="[servicenotes]">[servicenotes] — Service notes</option>
        <option value="[servicetech]">[servicetech] — Assigned technician</option>
        <option value="[serviceprice]">[serviceprice] — Service price</option>
        <option value="[serviceproducts]">[serviceproducts] — Products applied</option>
      </optgroup>
      <optgroup label="Company">
        <option value="[companyname]">[companyname] — Company name</option>
        <option value="[companyphone]">[companyphone] — Company phone</option>
        <option value="[companyemail]">[companyemail] — Company email</option>
        <option value="[companywebsite]">[companywebsite] — Company website</option>
        <option value="[companyaddress]">[companyaddress] — Company address</option>
      </optgroup>
      <optgroup label="Invoice &amp; Billing">
        <option value="[invoicenumber]">[invoicenumber] — Invoice number</option>
        <option value="[invoiceamount]">[invoiceamount] — Invoice total</option>
        <option value="[invoiceduedate]">[invoiceduedate] — Due date</option>
        <option value="[paymentlink]">[paymentlink] — Online payment link</option>
      </optgroup>
    </select>
    <button class="insert-btn" onclick="insertVar()">Insert</button>
  </div>

  <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
    <button onclick="loadDefault()" style="background:#130520; border:1px solid #130520; color:#fff; font-size:12px; padding:4px 12px; border-radius:4px; cursor:pointer; font-family:inherit;">Reset to Default</button>
  </div>
  <div class="msg-area" id="msg-area" contenteditable="true" oninput="onMsgInput()" onkeydown="enforceMsgLimit(event)"></div>
  <div class="char-count" id="char-count">0 / 160</div>

  <div style="display:flex; align-items:center; gap:10px; margin-bottom:18px; margin-top:4px;">
    <label style="font-size:13px; font-weight:600; color:#555; white-space:nowrap;">Send Time</label>
    <select id="send-time-select" class="var-select" style="max-width:220px;">
      <option value="">Send immediately</option>
      <option value="07:00">7:00 AM</option>
      <option value="07:30">7:30 AM</option>
      <option value="08:00">8:00 AM</option>
      <option value="08:30">8:30 AM</option>
      <option value="09:00">9:00 AM</option>
      <option value="09:30">9:30 AM</option>
      <option value="10:00">10:00 AM</option>
      <option value="10:30">10:30 AM</option>
      <option value="11:00">11:00 AM</option>
      <option value="11:30">11:30 AM</option>
      <option value="12:00">12:00 PM</option>
      <option value="12:30">12:30 PM</option>
      <option value="13:00">1:00 PM</option>
      <option value="13:30">1:30 PM</option>
      <option value="14:00">2:00 PM</option>
      <option value="14:30">2:30 PM</option>
      <option value="15:00">3:00 PM</option>
      <option value="15:30">3:30 PM</option>
      <option value="16:00">4:00 PM</option>
      <option value="16:30">4:30 PM</option>
      <option value="17:00">5:00 PM</option>
      <option value="17:30">5:30 PM</option>
      <option value="18:00">6:00 PM</option>
      <option value="18:30">6:30 PM</option>
      <option value="19:00">7:00 PM</option>
      <option value="19:30">7:30 PM</option>
      <option value="20:00">8:00 PM</option>
      <option value="20:30">8:30 PM</option>
      <option value="21:00">9:00 PM</option>
    </select>
    <span style="font-size:13px; color:#222;">If set, alerts triggered before this time are held and sent at this time.</span>
  </div>

  <button class="save-btn" id="save-btn" onclick="save()">Save</button>
  <div class="status-msg" id="status-msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL      = 'https://knjdbgroiyhvqwrpqzcx.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { autoRefreshToken: true, detectSessionInUrl: false } });
  var ALERT_TYPE = 'completed';
  var DEFAULT_MSG = 'Hi [clientfirstname], we just completed your property.\n\nThank you for your business!\n\n[companyname]';

  function loadSavedText(text) {
    document.getElementById('msg-area').innerText = text;
    updateCount();
  }

  function loadDefault() {
    document.getElementById('msg-area').innerText = DEFAULT_MSG;
    updateCount();
  }

  function enforceMsgLimit(e) {
    var allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End','Tab'];
    if (allowed.indexOf(e.key) >= 0 || e.ctrlKey || e.metaKey) return;
    if (getMsgText().length >= MAX_CHARS) e.preventDefault();
  }

  function onMsgInput() {
    updateCount();
  }

  function getMsgText() {
    return document.getElementById('msg-area').innerText || '';
  }

  var MAX_CHARS = 160;
  function updateCount() {
    var len = getMsgText().length;
    var el = document.getElementById('char-count');
    el.textContent = len + ' / ' + MAX_CHARS;
    el.className = 'char-count' + (len >= MAX_CHARS ? ' over' : len >= 100 ? ' warn' : '');
  }

  function insertVar() {
    var sel = document.getElementById('var-select');
    var val = sel.value;
    if (!val) return;
    document.getElementById('msg-area').focus();
    var selection = window.getSelection();
    if (selection.rangeCount) {
      var range = selection.getRangeAt(0);
      range.deleteContents();
      range.insertNode(document.createTextNode(val));
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
    }
    sel.value = '';
    updateCount();
  }

  async function init() {
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    if (!uid) return;
    var { data } = await sb.from('alert_settings')
      .select('message, send_time')
      .eq('user_id', uid)
      .eq('alert_type', ALERT_TYPE)
      .single();
    if (data && data.message) {
      loadSavedText(data.message);
      if (data.send_time) document.getElementById('send-time-select').value = data.send_time;
    } else {
      loadDefault();
    }
  }

  async function save() {
    var btn = document.getElementById('save-btn');
    var statusEl = document.getElementById('status-msg');
    btn.disabled = true; btn.textContent = 'Saving…';
    statusEl.textContent = ''; statusEl.className = 'status-msg';
    await sb.auth.refreshSession();
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    if (!uid) {
      btn.disabled = false; btn.textContent = 'Save';
      statusEl.textContent = 'Not logged in.'; statusEl.className = 'status-msg err'; return;
    }
    var sendTime = document.getElementById('send-time-select').value;
    var { data: saved, error } = await sb.from('alert_settings').upsert(
      { user_id: uid, alert_type: ALERT_TYPE, message: getMsgText(), send_time: sendTime || null, updated_at: new Date().toISOString() },
      { onConflict: 'user_id,alert_type' }
    ).select();
    btn.disabled = false;
    if (error || !saved || !saved.length) {
      btn.textContent = 'Save';
      statusEl.textContent = 'Error: ' + (error ? error.message : 'Save did not complete — try logging out and back in.'); statusEl.className = 'status-msg err';
    } else {
      btn.textContent = 'Saved ✓'; btn.classList.add('saved');
      statusEl.textContent = 'Alert saved successfully.'; statusEl.className = 'status-msg ok';
      setTimeout(function() { btn.textContent = 'Save'; btn.classList.remove('saved'); }, 2500);
    }
  }

  init();
</script>
</body>
</html>
