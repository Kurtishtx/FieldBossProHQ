<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #fff; color: #222; }

    .page-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px 12px;
    }
    .page-topbar h1 { font-size: 22px; font-weight: 800; color: #111; }
    .btn-add {
      background: #c47d0a; color: #fff; border: none;
      padding: 9px 22px; font-size: 13px; font-weight: 700;
      border-radius: 5px; cursor: pointer;
    }
    .btn-add:hover { background: #a86808; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid #eee; padding: 0 24px; margin-bottom: 0; }
    .tab-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 20px; font-size: 13.5px; font-weight: 600;
      color: #888; cursor: pointer; border-bottom: 3px solid transparent;
      margin-bottom: -2px; background: none; border-top: none; border-left: none; border-right: none;
      transition: color .15s;
    }
    .tab-btn:hover { color: #5b2d8e; }
    .tab-btn.active { color: #5b2d8e; border-bottom-color: #5b2d8e; }
    .tab-icon { font-size: 15px; }

    /* Table */
    .table-wrap { padding: 0 24px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 11px 12px; text-align: left;
      font-size: 11px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: .8px;
      border-bottom: 1px solid #eee;
    }
    tbody tr { border-bottom: 1px solid #f2f2f2; cursor: pointer; }
    tbody tr:hover { background: #fdf8ff; }
    tbody td { padding: 13px 12px; vertical-align: middle; }

    .email-cell { font-weight: 600; font-size: 14px; color: #222; }

    .role-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f0e8ff; color: #5b2d8e;
      padding: 4px 12px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
    }
    .role-badge.office { background: #fff3e0; color: #c47d0a; }
    .role-badge.mobile { background: #e8f4fd; color: #1a6fa0; }

    .edit-link { color: #5b2d8e; font-size: 13px; font-weight: 600; cursor: pointer; }
    .edit-link:hover { color: #c47d0a; text-decoration: underline; }

    .empty-msg { padding: 50px 24px; text-align: center; color: #aaa; font-size: 14px; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:500; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:8px; padding:28px 32px; width:380px; position:relative; box-shadow:0 8px 40px rgba(0,0,0,.3); }
    .modal h2 { font-size:18px; font-weight:700; margin-bottom:20px; color:#111; }
    .modal-close { position:absolute; top:12px; right:14px; background:none; border:1px solid #aaa; width:26px; height:26px; cursor:pointer; font-size:12px; border-radius:4px; }
    .modal-field { margin-bottom:14px; }
    .modal-field label { display:block; font-size:12px; font-weight:700; color:#555; margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }
    .modal-field input { width:100%; border:1px solid #ccc; padding:9px 11px; font-size:13px; font-family:inherit; border-radius:5px; outline:none; }
    .modal-field input:focus { border-color:#5b2d8e; }
    .modal-footer { display:flex; gap:10px; align-items:center; margin-top:20px; }
    .btn-save { background:#5b2d8e; color:#fff; border:none; padding:9px 24px; font-size:14px; font-weight:700; border-radius:5px; cursor:pointer; }
    .btn-save:hover { background:#4a2275; }
    .btn-save:disabled { background:#c0a0e0; cursor:default; }
    .btn-cancel-m { color:#555; font-size:13px; cursor:pointer; }
    .btn-cancel-m:hover { text-decoration:underline; }
    .err-msg { color:#c0392b; font-size:13px; margin-top:8px; min-height:18px; }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="page-topbar">
  <h1>Users</h1>
  <button class="btn-add" onclick="navigate('usersadd')">+ Add User</button>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-full_access" onclick="switchTab('full_access')">
    <span class="tab-icon">&#128081;</span> Full Access
  </button>
  <button class="tab-btn" id="tab-office_assistant" onclick="switchTab('office_assistant')">
    <span class="tab-icon">&#128188;</span> Office Assistant
  </button>
  <button class="tab-btn" id="tab-mobile" onclick="switchTab('mobile')">
    <span class="tab-icon">&#128241;</span> Mobile
  </button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Access Level</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="users-tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty-msg" style="display:none;">No users found.</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <h2 id="modal-title">Add User</h2>
    <div class="modal-field" id="email-field">
      <label>Email Address</label>
      <input type="email" id="modal-email" autocomplete="off"/>
    </div>
    <div class="modal-field">
      <label id="pwd-label">Password</label>
      <input type="password" id="modal-password" autocomplete="new-password"/>
    </div>
    <div class="err-msg" id="modal-err"></div>
    <div class="modal-footer">
      <button class="btn-save" id="modal-save-btn" onclick="saveUser()">Create User</button>
      <span class="btn-cancel-m" onclick="closeModal()">Cancel</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
    { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var allUsers   = [];
  var profiles   = {};
  var activeTab  = 'full_access';
  var editUserId = null;

  function navigate(page, params) {
    var url = params ? page + '?' + params : page;
    if (window.parent && window.parent.loadPage) window.parent.loadPage(url);
  }

  function switchTab(role) {
    activeTab = role;
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('tab-' + role).classList.add('active');
    renderTable();
  }

  function roleBadge(role) {
    if (role === 'full_access')      return '<span class="role-badge">&#128081; Full Access</span>';
    if (role === 'office_assistant') return '<span class="role-badge office">&#128188; Office Assistant</span>';
    if (role === 'mobile')           return '<span class="role-badge mobile">&#128241; Mobile</span>';
    return '<span class="role-badge">' + role + '</span>';
  }

  async function load() {
    var sessionRes = await sb.auth.getSession();
    var ownerId = sessionRes?.data?.session?.user?.id || null;

    var [authRes, profRes] = await Promise.all([
      sb.functions.invoke('manage-users', { body: { action: 'list' } }),
      sb.from('user_profiles').select('*').eq('is_primary_owner', false)
    ]);

    var authUsers = (authRes.data?.users) || [];
    profiles = {};
    (profRes.data || []).forEach(function(p) { profiles[p.id] = p; });

    var profileIds = Object.keys(profiles);
    allUsers = authUsers.filter(function(u) {
      return profileIds.includes(u.id) && u.id !== ownerId;
    });

    renderTable();
  }

  function renderTable() {
    var tbody   = document.getElementById('users-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    tbody.innerHTML = '';

    var filtered = allUsers.filter(function(u) {
      var role = (profiles[u.id] || {}).role || '';
      return role === activeTab;
    });

    if (!filtered.length) { emptyMsg.style.display = ''; return; }
    emptyMsg.style.display = 'none';

    filtered.forEach(function(u) {
      var role = (profiles[u.id] || {}).role || activeTab;
      var tr   = document.createElement('tr');
      tr.innerHTML =
        '<td class="email-cell">' + (u.email || '—') + '</td>' +
        '<td>' + roleBadge(role) + '</td>' +
        '<td style="text-align:right;"><span class="edit-link" onclick="event.stopPropagation();navigate(\'usersadd\',\'id=' + u.id + '\')">Edit</span></td>';
      tr.addEventListener('click', function() { navigate('usersadd', 'id=' + u.id); });
      tbody.appendChild(tr);
    });
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editUserId = null;
  }

  async function saveUser() {
    var btn      = document.getElementById('modal-save-btn');
    var errEl    = document.getElementById('modal-err');
    var email    = document.getElementById('modal-email').value.trim();
    var password = document.getElementById('modal-password').value;

    if (!editUserId && !email) { errEl.textContent = 'Please enter an email address.'; return; }
    if (!password) { errEl.textContent = 'Please enter a password (minimum 6 characters).'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

    btn.disabled = true; btn.textContent = 'Saving…'; errEl.textContent = '';

    var body = editUserId
      ? { action: 'update_password', user_id: editUserId, password: password }
      : { action: 'create', email: email, password: password };

    var { data, error } = await sb.functions.invoke('manage-users', { body: body });
    btn.disabled = false;
    btn.textContent = editUserId ? 'Update Password' : 'Create User';

    if (error || (data && data.error)) {
      errEl.textContent = 'Error: ' + (data?.error || error?.message || 'Unknown error');
      return;
    }
    closeModal();
    load();
  }

  load();
</script>
</body>
</html>
