<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estimate Email Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; font-size: 13px; color: #222; }

    .page-hdr { padding: 20px 24px 14px; }
    .page-hdr h1 { font-size: 22px; font-weight: 800; color: #111; }
    .page-hdr p  { font-size: 13px; color: #777; margin-top: 4px; }
    .divider { border: none; border-top: 1px solid #eee; margin: 0 24px; }

    .link-item {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 24px; border-bottom: 1px solid #eee;
      cursor: pointer; text-decoration: none;
    }
    .link-item:hover { background: #f5f9ff; }
    .link-icon {
      width: 42px; height: 42px; min-width: 42px;
      background: #e8f0fe; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #2272c3;
    }
    .link-text .link-name { font-size: 15px; font-weight: 700; color: #2272c3; margin-bottom: 3px; }
    .link-text .link-desc { font-size: 12.5px; color: #777; line-height: 1.4; }
    .link-arrow { margin-left: auto; color: #2272c3; font-size: 18px; }

    /* Selected template card */
    .tpl-card {
      margin: 18px 24px; border: 1px solid #ddd; border-radius: 6px;
      overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .tpl-card-hdr {
      background: #3a3a3a; color: #fff; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .tpl-card-hdr span { font-size: 14px; font-weight: 700; }
    .btn-change {
      background: #e07820; color: #fff; border: none; border-radius: 4px;
      padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .btn-change:hover { background: #c96a10; }
    .tpl-preview-wrap {
      height: 300px; overflow: hidden; position: relative; background: #111;
    }
    .tpl-preview-wrap iframe {
      width: 600px; height: 800px; border: none;
      transform-origin: top left; pointer-events: none;
    }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="page-hdr">
  <h1>Estimate Email Setup</h1>
  <p>Configure how estimate emails look and what information they include.</p>
</div>

<hr class="divider"/>

<div id="template-section"></div>

<div class="link-item" onclick="navigate('estimateemailinfo')">
  <div class="link-icon">&#9993;</div>
  <div class="link-text">
    <div class="link-name">Estimate Email Info</div>
    <div class="link-desc">Customize the subject, body, sender name, and template variables for estimate emails.</div>
  </div>
  <div class="link-arrow">&#8250;</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g"
  );

  function navigate(page) {
    if (window.parent && window.parent.loadPage) window.parent.loadPage(page);
    else window.location.href = page + '.html';
  }

  async function load() {
    var { data } = await sb.from('email_templates').select('body').eq('key', 'estimate_email').single();
    var section = document.getElementById('template-section');

    if (data && data.body) {
      section.innerHTML =
        '<div class="tpl-card">' +
          '<div class="tpl-card-hdr">' +
            '<span>&#128203; Current Template</span>' +
            '<button class="btn-change" onclick="navigate(\'estimateemailtemplate\')">Change Template</button>' +
          '</div>' +
          '<div class="tpl-preview-wrap" id="preview-wrap"></div>' +
        '</div>';

      var wrap   = document.getElementById('preview-wrap');
      var iframe = document.createElement('iframe');
      iframe.srcdoc = data.body;
      wrap.appendChild(iframe);

      var scale = wrap.offsetWidth / 600;
      iframe.style.transform = 'scale(' + scale + ')';
      iframe.style.width  = '600px';
      iframe.style.height = '800px';

      window.addEventListener('load', function() {
        var s = wrap.offsetWidth / 600;
        iframe.style.transform = 'scale(' + s + ')';
      });
    } else {
      section.innerHTML =
        '<div class="link-item" onclick="navigate(\'estimateemailtemplate\')">' +
          '<div class="link-icon">&#128203;</div>' +
          '<div class="link-text">' +
            '<div class="link-name">Estimate Email Template</div>' +
            '<div class="link-desc">Choose from 3 starter templates for your estimate emails.</div>' +
          '</div>' +
          '<div class="link-arrow">&#8250;</div>' +
        '</div>';
    }
  }

  load();
</script>
</body>
</html>
