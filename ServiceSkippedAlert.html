<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Service Skipped Alert</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; font-size: 13px; color: #222; }
    .page-hdr { padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .page-hdr p  { font-size: 13px; color: #777; margin-top: 4px; }
    .content { padding: 20px 24px; max-width: 680px; }
    .toggle-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 14px 18px; background: #f8f8f8; border-radius: 8px; border: 1px solid #eee; }
    .toggle-label { font-size: 14px; font-weight: 600; color: #111; flex: 1; }
    .toggle-sub   { font-size: 12px; color: #888; margin-top: 2px; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 24px; transition: .2s; }
    .slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #2272c3; }
    input:checked + .slider:before { transform: translateX(20px); }
    .section-label { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 10px; margin-top: 24px; }
    .phone-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .phone-row { display: flex; align-items: center; gap: 10px; }
    .phone-row label { font-size: 12px; color: #888; width: 60px; flex-shrink: 0; }
    .phone-input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: inherit; color: #333; background: #fafafa; outline: none; }
    .phone-input:focus { border-color: #2272c3; background: #fff; }
    .var-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .var-row label { font-size: 12.5px; font-weight: 600; color: #555; white-space: nowrap; }
    .var-select { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: inherit; color: #333; background: #fafafa; outline: none; cursor: pointer; }
    .var-select:focus { border-color: #2272c3; background: #fff; }
    .insert-btn { padding: 9px 18px; background: #2272c3; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .insert-btn:hover { background: #1a5ea0; }
    textarea.msg-area { width: 100%; min-height: 140px; border: 1px solid #ddd; border-radius: 8px; padding: 14px; font-size: 14px; font-family: inherit; color: #222; resize: vertical; outline: none; line-height: 1.6; margin-bottom: 6px; }
    textarea.msg-area:focus { border-color: #2272c3; }
    .char-count { text-align: right; font-size: 12px; color: #888; margin-bottom: 18px; font-weight: 600; }
    .char-count.warn { color: #e67e22; }
    .char-count.over { color: #d9534f; }
    .save-btn { padding: 10px 30px; background: #2272c3; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .save-btn:hover { background: #1a5ea0; }
    .save-btn:disabled { background: #90b8e0; cursor: default; }
    .save-btn.saved { background: #28a745; }
    .status-msg { font-size: 12.5px; margin-top: 10px; min-height: 18px; }
    .status-msg.ok  { color: #28a745; }
    .status-msg.err { color: #d9534f; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>
<div class="page-hdr">
  <p>Alert sent to your team when a service is skipped.</p>
</div>
<div class="content">
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Enable Service Skipped Alert</div>
      <div class="toggle-sub">Automatically send this message to your team when a service is skipped.</div>
    </div>
    <label class="switch"><input type="checkbox" id="enabled-toggle"/><span class="slider"></span></label>
  </div>

  <div class="section-label">Alert Recipients (up to 3 phone numbers)</div>
  <div class="phone-group">
    <div class="phone-row">
      <label>Phone 1</label>
      <input class="phone-input" id="phone1" type="tel" placeholder="8175551234"/>
    </div>
    <div class="phone-row">
      <label>Phone 2</label>
      <input class="phone-input" id="phone2" type="tel" placeholder="8175551234"/>
    </div>
    <div class="phone-row">
      <label>Phone 3</label>
      <input class="phone-input" id="phone3" type="tel" placeholder="8175551234"/>
    </div>
  </div>

  <div class="var-row">
    <label>Insert Variable</label>
    <select class="var-select" id="var-select">
      <option value="">— choose a variable to insert —</option>
      <optgroup label="Property">
        <option value="[propertyaddress]">[propertyaddress] — Street address</option>
        <option value="[propertycity]">[propertycity] — City</option>
        <option value="[propertystate]">[propertystate] — State</option>
        <option value="[propertyzip]">[propertyzip] — Zip code</option>
      </optgroup>
      <optgroup label="Service">
        <option value="[truck]">[truck] — Truck assigned</option>
        <option value="[scheduledservices]">[scheduledservices] — Services skipped</option>
        <option value="[skipnote]">[skipnote] — Skip reason / note</option>
        <option value="[clientname]">[clientname] — Client name</option>
        <option value="[servicedate]">[servicedate] — Service date</option>
      </optgroup>
      <optgroup label="Company">
        <option value="[companyname]">[companyname] — Company name</option>
      </optgroup>
    </select>
    <button class="insert-btn" onclick="insertVar()">Insert</button>
  </div>

  <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
    <button type="button" onclick="resetMsg()" style="background:none; border:1px solid #bbb; color:#555; font-size:12px; padding:4px 12px; border-radius:4px; cursor:pointer; font-family:inherit;">Reset to Default</button>
  </div>
  <div class="msg-area" id="msg-area" contenteditable="true" oninput="updateCount()"></div>
  <div class="char-count" id="char-count">0 / 160</div>

  <button class="save-btn" id="save-btn" onclick="save()">Save</button>
  <div class="status-msg" id="status-msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL      = 'https://knjdbgroiyhvqwrpqzcx.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { autoRefreshToken: true, detectSessionInUrl: false } });
  var ALERT_TYPE = 'skipped';
  var DEFAULT_MSG = '[propertyaddress] on [truck] was skipped.\n\nReason:\n[skipnote]';

  async function init() {
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    if (!uid) return;
    var { data } = await sb.from('alert_settings').select('enabled, message, recipients').eq('user_id', uid).eq('alert_type', ALERT_TYPE).single();
    document.getElementById('msg-area').innerText = (data && data.message) ? data.message : DEFAULT_MSG;
    if (data) {
      document.getElementById('enabled-toggle').checked = !!data.enabled;
      if (data.recipients) {
        var phones = JSON.parse(data.recipients);
        if (phones[0]) document.getElementById('phone1').value = phones[0];
        if (phones[1]) document.getElementById('phone2').value = phones[1];
        if (phones[2]) document.getElementById('phone3').value = phones[2];
      }
    }
    updateCount();
  }

  function insertVar() {
    var sel = document.getElementById('var-select'); var val = sel.value; if (!val) return;
    document.getElementById('msg-area').focus();
    document.execCommand('insertText', false, val);
    sel.value = ''; updateCount();
  }

  function resetMsg() {
    document.getElementById('msg-area').innerText = DEFAULT_MSG;
    updateCount();
  }

  function updateCount() {
    var len = (document.getElementById('msg-area').innerText || '').length;
    var el = document.getElementById('char-count');
    el.textContent = len + ' / 160';
    el.className = 'char-count' + (len > 160 ? ' over' : len > 120 ? ' warn' : '');
  }

  function getPhones() {
    return [
      document.getElementById('phone1').value.replace(/\D/g,''),
      document.getElementById('phone2').value.replace(/\D/g,''),
      document.getElementById('phone3').value.replace(/\D/g,'')
    ].filter(Boolean);
  }

  async function save() {
    var btn = document.getElementById('save-btn');
    var statusEl = document.getElementById('status-msg');
    btn.disabled = true; btn.textContent = 'Saving…';
    statusEl.textContent = ''; statusEl.className = 'status-msg';
    await sb.auth.refreshSession();
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    if (!uid) { btn.disabled = false; btn.textContent = 'Save'; statusEl.textContent = 'Not logged in.'; statusEl.className = 'status-msg err'; return; }
    var phones = getPhones();
    var { data: saved, error } = await sb.from('alert_settings').upsert(
      { user_id: uid, alert_type: ALERT_TYPE, enabled: document.getElementById('enabled-toggle').checked, message: document.getElementById('msg-area').innerText, recipients: JSON.stringify(phones), updated_at: new Date().toISOString() },
      { onConflict: 'user_id,alert_type' }
    ).select();
    btn.disabled = false;
    if (error || !saved || !saved.length) {
      btn.textContent = 'Save';
      statusEl.textContent = 'Error: ' + (error ? error.message : 'Save did not complete.'); statusEl.className = 'status-msg err';
    } else {
      btn.textContent = 'Saved ✓'; btn.classList.add('saved');
      statusEl.textContent = 'Alert saved successfully.'; statusEl.className = 'status-msg ok';
      setTimeout(function() { btn.textContent = 'Save'; btn.classList.remove('saved'); }, 2500);
    }
  }

  init();
</script>
</body>
</html>
