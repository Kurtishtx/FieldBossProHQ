<html>
<head>
  <title>Reset Password — SprayBossPro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ebebeb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      width: 440px;
      max-width: 92vw;
      overflow: hidden;
    }
    .box h1 {
      background: #1a2b3c;
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      padding: 24px 0 20px;
    }
    .fields {
      padding: 32px 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    input {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 13px 14px;
      font-size: 16px;
      font-family: inherit;
      color: #333;
    }
    input:focus { outline: none; border-color: #f5c800; box-shadow: 0 0 0 2px rgba(245,200,0,.2); }
    button {
      width: 100%;
      background: #e07820;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #c96a15; }
    #msg { text-align: center; font-size: 14px; font-weight: 600; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Set New Password</h1>
    <div class="fields">
      <input id="new-password" type="password" placeholder="New Password">
      <input id="confirm-password" type="password" placeholder="Confirm New Password">
      <button onclick="doReset()">Update Password</button>
      <div id="msg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = supabase.createClient(
      "https://knjdbgroiyhvqwrpqzcx.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g"
    );

    async function doReset() {
      var pass = document.getElementById('new-password').value;
      var confirm = document.getElementById('confirm-password').value;
      var msg = document.getElementById('msg');
      msg.style.display = 'block';

      if (!pass || pass.length < 6) {
        msg.style.color = '#cc2222';
        msg.textContent = 'Password must be at least 6 characters.';
        return;
      }
      if (pass !== confirm) {
        msg.style.color = '#cc2222';
        msg.textContent = 'Passwords do not match.';
        return;
      }

      var { error } = await client.auth.updateUser({ password: pass });
      if (error) {
        msg.style.color = '#cc2222';
        msg.textContent = error.message;
      } else {
        msg.style.color = '#2a7a2a';
        msg.textContent = 'Password updated! Redirecting...';
        setTimeout(() => window.location.href = 'index.html', 2000);
      }
    }
  </script>
</body>
</html>
