<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estimate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f7f7f7; color: #222; }

    .page-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:#fff; border-bottom:1px solid #eee; }
    .page-header h1 { font-size:20px; font-weight:800; color:#111; }
    .header-actions { display:flex; gap:8px; align-items:center; }
    .btn-draft  { background:#fff; color:#555; border:1px solid #bbb; padding:8px 18px; font-size:13px; font-weight:600; border-radius:4px; cursor:pointer; }
    .btn-draft:hover { background:#f5f5f5; }
    .btn-send   { background:#2272c3; color:#fff; border:none; padding:8px 20px; font-size:13px; font-weight:700; border-radius:4px; cursor:pointer; }
    .btn-send:hover { background:#1a5ea0; }
    .btn-convert { background:#27a567; color:#fff; border:none; padding:8px 20px; font-size:13px; font-weight:700; border-radius:4px; cursor:pointer; }
    .btn-convert:hover { background:#1e8050; }
    .btn-delete { background:none; border:1px solid #c0392b; color:#c0392b; padding:7px 14px; font-size:13px; border-radius:4px; cursor:pointer; }
    .btn-delete:hover { background:#fdecea; }
    .btn-back { background:none; border:none; color:#2272c3; font-size:13px; cursor:pointer; padding:0; }
    .btn-back:hover { text-decoration:underline; }

    .status-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:700; }
    .status-draft    { background:#f0f0f0; color:#666; }
    .status-sent     { background:#d1ecf1; color:#0c5460; }
    .status-accepted { background:#d4edda; color:#155724; }
    .status-declined { background:#f8d7da; color:#721c24; }
    .status-expired  { background:#fff3cd; color:#856404; }

    .body-wrap { max-width:900px; margin:24px auto; padding:0 20px; }

    .card { background:#fff; border:1px solid #e0e0e0; border-radius:6px; margin-bottom:16px; }
    .card-hdr { padding:14px 18px; border-bottom:1px solid #eee; font-size:13px; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:.5px; }
    .card-body { padding:18px; }

    .field-row { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
    .field-row label { width:110px; font-size:13px; color:#666; flex-shrink:0; }
    .field-row input[type="text"], .field-row input[type="date"], .field-row select {
      flex:1; border:1px solid #ccc; padding:7px 10px; font-size:13px; font-family:inherit; border-radius:3px; outline:none;
    }
    .field-row input:focus, .field-row select:focus { border-color:#e07820; }
    .field-row textarea { flex:1; border:1px solid #ccc; padding:7px 10px; font-size:13px; font-family:inherit; border-radius:3px; outline:none; min-height:80px; resize:vertical; }
    .field-row textarea:focus { border-color:#e07820; }

    /* Line items table */
    .svc-table { width:100%; border-collapse:collapse; }
    .svc-table thead th { background:#130520; color:#fff; padding:8px 10px; font-size:12px; font-weight:700; text-align:left; }
    .svc-table thead th:last-child { text-align:right; }
    .svc-table tbody td { padding:6px 8px; border-bottom:1px solid #eee; vertical-align:middle; }
    .svc-table input[type="text"], .svc-table input[type="number"] {
      width:100%; border:1px solid #ddd; padding:5px 7px; font-size:13px; font-family:inherit; border-radius:2px; outline:none;
    }
    .svc-table select { width:100%; border:1px solid #ddd; padding:5px 7px; font-size:13px; font-family:inherit; border-radius:2px; outline:none; background:#fff; }
    .svc-table input:focus, .svc-table select:focus { border-color:#e07820; }
    .li-details-input { width:100%; border:1px solid #ddd; padding:4px 7px; font-size:12px; font-family:inherit; border-radius:2px; outline:none; margin-top:4px; color:#555; }
    .li-details-input:focus { border-color:#e07820; }
    .del-btn { background:none; border:none; color:#c0392b; font-size:16px; cursor:pointer; padding:0 4px; line-height:1; }
    .del-btn:hover { color:#a93226; }
    .btn-add-line { background:none; border:1px dashed #bbb; color:#555; padding:7px 16px; font-size:13px; cursor:pointer; border-radius:3px; margin-top:10px; }
    .btn-add-line:hover { background:#f5f5f5; }

    .totals-box { background:#f9f9f9; border:1px solid #eee; border-radius:4px; padding:14px 18px; }
    .totals-row { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
    .totals-row.grand { font-size:16px; font-weight:800; border-top:2px solid #ccc; margin-top:6px; padding-top:8px; }

    /* Line item picker */
    .lp-wrap { display:none; position:fixed; background:#fff; border:1px solid #ccc; border-radius:4px; box-shadow:0 4px 20px rgba(0,0,0,.25); z-index:10000; width:300px; max-height:380px; overflow:hidden; flex-direction:column; }
    .lp-wrap.open { display:flex; }
    .lp-search { padding:9px 12px; border:none; border-bottom:1px solid #eee; font-size:13px; font-family:inherit; outline:none; width:100%; }
    .lp-scroll { overflow-y:auto; flex:1; }
    .lp-section { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#888; padding:7px 12px 4px; background:#f9f9f9; border-bottom:1px solid #eee; }
    .lp-item { padding:8px 12px; cursor:pointer; border-bottom:1px solid #f5f5f5; }
    .lp-item:hover { background:#fff5ec; }
    .lp-name { font-weight:600; font-size:13px; color:#222; }
    .lp-price { font-size:12px; color:#e07820; margin-top:1px; }
    .lp-blank { padding:8px 12px; cursor:pointer; border-bottom:2px solid #eee; color:#888; font-size:13px; }
    .lp-blank:hover { background:#f5f5f5; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="page-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <button class="btn-back" onclick="goBack()">&#8592; Estimates</button>
    <h1 id="page-title">New Estimate</h1>
    <span class="status-badge status-draft" id="status-badge">Draft</span>
  </div>
  <div class="header-actions">
    <button class="btn-convert" id="btn-convert" style="display:none;" onclick="convertToServices()">&#10003; Convert to Services</button>
    <button class="btn-delete" id="btn-delete" style="display:none;" onclick="deleteEstimate()">Delete</button>
    <button class="btn-draft" onclick="save('draft')">Save Draft</button>
    <button class="btn-send" onclick="save('sent')">Send Estimate</button>
  </div>
</div>

<div class="body-wrap">

  <!-- Client & Property -->
  <div class="card">
    <div class="card-hdr">Client & Property</div>
    <div class="card-body">
      <div class="field-row">
        <label>Type</label>
        <select id="source-type" onchange="onSourceTypeChange()" style="max-width:200px;">
          <option value="">— select type —</option>
          <option value="lead">Leads</option>
          <option value="client">Clients</option>
          <option value="property">Properties</option>
        </select>
      </div>
      <div class="field-row" id="source-row" style="display:none;">
        <label id="source-label">Select</label>
        <select id="property-select" onchange="onPropertyChange()">
          <option value="">—</option>
        </select>
      </div>
      <div class="field-row">
        <label>Name</label>
        <input type="text" id="client-name" readonly style="background:#f9f9f9;"/>
      </div>
      <div class="field-row">
        <label>Address</label>
        <input type="text" id="address" readonly style="background:#f9f9f9;"/>
      </div>
    </div>
  </div>

  <!-- Estimate Details -->
  <div class="card">
    <div class="card-hdr">Details</div>
    <div class="card-body">
      <div class="field-row">
        <label>Expiry Date</label>
        <input type="date" id="expiry-date" style="max-width:200px;"/>
      </div>
      <div class="field-row">
        <label>Notes</label>
        <textarea id="notes" placeholder="Optional notes for the client..."></textarea>
      </div>
    </div>
  </div>

  <!-- Line Items -->
  <div class="card">
    <div class="card-hdr">Services / Line Items</div>
    <div class="card-body">
      <table class="svc-table">
        <thead>
          <tr>
            <th style="width:28px;"></th>
            <th>Service / Description</th>
            <th style="width:80px;">Qty</th>
            <th style="width:110px;">Rate</th>
            <th style="width:110px;text-align:right;">Total</th>
          </tr>
        </thead>
        <tbody id="line-tbody"></tbody>
      </table>
      <button class="btn-add-line" onclick="addLine()">+ Add Line</button>
      <button class="btn-add-line" onclick="openTemplateModal()" style="margin-left:8px;border-color:#e07820;color:#e07820;">&#128196; Load Template</button>

      <div style="display:flex;justify-content:flex-end;margin-top:16px;">
        <div class="totals-box" style="min-width:260px;">
          <div class="totals-row"><span>Subtotal</span><span id="tot-sub">$0.00</span></div>
          <div class="totals-row grand"><span>Total</span><span id="tot-total">$0.00</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status (edit mode only) -->
  <div class="card" id="status-card" style="display:none;">
    <div class="card-hdr">Status</div>
    <div class="card-body">
      <div class="field-row">
        <label>Status</label>
        <select id="status-select" onchange="onStatusChange()">
          <option value="draft">Draft</option>
          <option value="sent">Sent</option>
          <option value="accepted">Accepted</option>
          <option value="declined">Declined</option>
          <option value="expired">Expired</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Bottom save bar -->
  <div style="position:sticky; bottom:0; background:#fff; border-top:2px solid #eee; padding:12px 20px; display:flex; justify-content:flex-end; gap:8px; z-index:100;">
    <button class="btn-draft" onclick="save('draft')">Save Draft</button>
    <button class="btn-send" onclick="save('sent')">Send Estimate</button>
  </div>

</div><!-- /body-wrap -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g';
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    SUPABASE_ANON_KEY,
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var editId = null;
  var propData = {};
  var currentAreaTreated = {};

  function fmt(n) { return '$' + (parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }

  function goBack() {
    if (window.parent && window.parent.loadPage) window.parent.loadPage('estimateslist');
    else window.location.href = 'EstimatesList.html';
  }

  /* ── Two-dropdown system ── */
  var allLeads = [], allClients = [], allPropsData = [];

  async function loadProperties() {
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;

    var [leadsRes, clientsRes, propsRes] = await Promise.all([
      sb.from('Leads').select('id, name, email, cell, phone, address, city, state, zip').eq('user_id', uid).eq('closed', false).order('name'),
      sb.from('Clients').select('id, name, first_name, last_name, email, phone, address, city, state, zip').eq('user_id', uid).order('name'),
      sb.from('Properties').select('id, address, city, state, zip, customer_id, area_treated').eq('user_id', uid).order('address'),
    ]);

    allLeads   = leadsRes.data   || [];
    allClients = clientsRes.data || [];
    allPropsData = propsRes.data || [];

    // Load client names for properties
    var clientIds = [...new Set(allPropsData.map(function(p){ return p.customer_id; }).filter(Boolean))];
    if (clientIds.length) {
      var { data: cls } = await sb.from('Clients').select('id, name, first_name, last_name, email').in('id', clientIds);
      (cls||[]).forEach(function(c){
        allPropsData.forEach(function(p){ if (p.customer_id === c.id) p._client = c; });
      });
    }

    // Store all records in propData keyed by prefixed id
    allLeads.forEach(function(l) {
      propData['lead_' + l.id] = { _type:'lead', name: l.name || '', email: l.email || '', address: [l.address, l.city, l.state, l.zip].filter(Boolean).join(', '), lead_id: l.id, area_treated: {} };
    });
    allClients.forEach(function(c) {
      var name = c.name || [c.last_name, c.first_name].filter(Boolean).join(', ');
      propData['client_' + c.id] = { _type:'client', name: name, email: c.email || '', address: [c.address, c.city, c.state, c.zip].filter(Boolean).join(', '), customer_id: c.id, area_treated: {} };
    });
    allPropsData.forEach(function(p) {
      var cl = p._client || {};
      var name = cl.name || [cl.last_name, cl.first_name].filter(Boolean).join(', ') || '';
      propData['prop_' + p.id] = { _type:'property', name: name, email: cl.email || '', address: [p.address, p.city, p.state, p.zip].filter(Boolean).join(', '), property_id: p.id, customer_id: p.customer_id, area_treated: p.area_treated || {} };
    });
  }

  function onSourceTypeChange() {
    var type = document.getElementById('source-type').value;
    var sel  = document.getElementById('property-select');
    var row  = document.getElementById('source-row');
    var lbl  = document.getElementById('source-label');

    document.getElementById('client-name').value = '';
    document.getElementById('address').value = '';
    currentAreaTreated = {};

    if (!type) { row.style.display = 'none'; return; }
    row.style.display = '';
    sel.innerHTML = '<option value="">— select —</option>';

    var records = type === 'lead' ? allLeads : type === 'client' ? allClients : allPropsData;
    var labels  = { lead: 'Lead', client: 'Client', property: 'Property' };
    lbl.textContent = labels[type];

    var opts = [];
    records.forEach(function(r) {
      var key, label;
      if (type === 'lead') {
        key   = 'lead_' + r.id;
        label = (r.name || '') + (r.address ? ' — ' + [r.address, r.city, r.state, r.zip].filter(Boolean).join(', ') : '');
      } else if (type === 'client') {
        var name = r.name || [r.last_name, r.first_name].filter(Boolean).join(', ');
        key   = 'client_' + r.id;
        label = name + (r.address ? ' — ' + [r.address, r.city, r.state, r.zip].filter(Boolean).join(', ') : '');
      } else {
        var cl = r._client || {};
        var cname = cl.name || [cl.last_name, cl.first_name].filter(Boolean).join(', ') || '';
        key   = 'prop_' + r.id;
        label = (cname || r.address || '') + (cname && r.address ? ' — ' + [r.address, r.city, r.state, r.zip].filter(Boolean).join(', ') : '');
      }
      opts.push({ key: key, label: label });
    });

    opts.sort(function(a, b) { return a.label.toLowerCase().localeCompare(b.label.toLowerCase()); });
    opts.forEach(function(o) {
      var opt = document.createElement('option');
      opt.value = o.key;
      opt.textContent = o.label;
      sel.appendChild(opt);
    });
  }

  function onPropertyChange() {
    var key = document.getElementById('property-select').value;
    var d   = propData[key];
    if (d) {
      document.getElementById('client-name').value = d.name || '';
      document.getElementById('address').value     = d.address || '';
      currentAreaTreated = d.area_treated || {};
    } else {
      document.getElementById('client-name').value = '';
      document.getElementById('address').value     = '';
      currentAreaTreated = {};
    }
  }

  var estimateCatalog = [];
  var packageCatalog  = [];

  async function loadEstimateServicesCatalog() {
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;

    var [svcRes, pkgRes] = await Promise.all([
      sb.from('Services').select('id, name, amount').is('property_id', null).eq('active', true).order('name'),
      sb.from('Packages').select('id, name, description, price').eq('user_id', uid).order('name'),
    ]);
    estimateCatalog = svcRes.data || [];
    packageCatalog  = pkgRes.data || [];
  }

  /* ── Line items ── */
  function buildLineOpts(selectedDesc) {
    var opts = '<option value="">— select service / package —</option>';
    if (estimateCatalog.length) {
      opts += '<optgroup label="Services">';
      estimateCatalog.forEach(function(s) {
        opts += '<option value="' + (s.name||'').replace(/"/g,'&quot;') + '" data-rate="' + (parseFloat(s.amount)||0) + '"' + (selectedDesc === s.name ? ' selected' : '') + '>' + (s.name||'') + '</option>';
      });
      opts += '</optgroup>';
    }
    if (packageCatalog.length) {
      opts += '<optgroup label="Packages">';
      packageCatalog.forEach(function(p) {
        opts += '<option value="' + (p.name||'').replace(/"/g,'&quot;') + '" data-rate="' + (parseFloat(p.price)||0) + '"' + (selectedDesc === p.name ? ' selected' : '') + '>' + (p.name||'') + '</option>';
      });
      opts += '</optgroup>';
    }
    return opts;
  }

  function addLine(desc, qty, rate, details) {
    var tbody = document.getElementById('line-tbody');
    var safeDetails = (details || '').replace(/"/g, '&quot;');
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td style="vertical-align:top;padding-top:10px;"><button class="del-btn" onclick="removeLine(this)">&#10005;</button></td>' +
      '<td>' +
        '<select class="li-desc" onchange="onLineDescChange(this)" style="width:100%;">' + buildLineOpts(desc||'') + '</select>' +
        '<input type="text" class="li-details-input li-details" placeholder="Description..." value="' + safeDetails + '"/>' +
      '</td>' +
      '<td style="vertical-align:top;"><input type="number" class="li-qty" value="' + (qty||1) + '" min="0" step="1" oninput="calcTotals()" style="text-align:right;margin-top:1px;"/></td>' +
      '<td style="vertical-align:top;"><input type="number" class="li-rate" value="' + (rate||'') + '" min="0" step="0.01" oninput="calcTotals()" style="text-align:right;margin-top:1px;"/></td>' +
      '<td class="li-total" style="text-align:right;font-weight:600;padding-right:12px;vertical-align:top;padding-top:10px;">$0.00</td>';
    tbody.appendChild(tr);
    calcTotals();
  }

  function onLineDescChange(sel) {
    var opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.value) return;
    var tr = sel.closest('tr');
    tr.querySelector('.li-rate').value = (parseFloat(opt.getAttribute('data-rate')) || 0).toFixed(2);
    calcTotals();
  }

  function calcPriceFromMatrix(matrix, areaSqFt) {
    if (!matrix || !matrix.length || !areaSqFt) return null;
    var tier = null;
    for (var i = 0; i < matrix.length; i++) {
      if (areaSqFt >= matrix[i].from && (areaSqFt <= matrix[i].to || matrix[i].to === 0)) {
        tier = matrix[i]; break;
      }
    }
    if (!tier) tier = matrix[matrix.length - 1];
    if (!tier) return null;
    var price = parseFloat(tier.rate) || 0;
    if (tier.overage_every > 0 && areaSqFt > tier.overage_over) {
      var excess = areaSqFt - tier.overage_over;
      var units  = Math.ceil(excess / tier.overage_every);
      price += units * (parseFloat(tier.overage_price) || 0);
    }
    return price;
  }

  function onCatalogPick(sel) {
    var opt = sel.options[sel.selectedIndex];
    if (!opt.value) return;
    var val = opt.value;
    var svc = val.startsWith('pkg_')
      ? packageCatalog.find(function(p) { return 'pkg_' + p.id === val; })
      : estimateCatalog.find(function(s) { return 'svc_' + s.id === val; });
    if (!svc) return;
    var tr = sel.closest('tr');
    tr.querySelector('.li-details').value = svc.description || '';

    var calculatedPrice = null;
    if (svc.area_treated && svc.price_matrix && svc.price_matrix.length) {
      var areaSqFt = parseFloat(currentAreaTreated[svc.area_treated]) || 0;
      if (areaSqFt > 0) {
        calculatedPrice = calcPriceFromMatrix(svc.price_matrix, areaSqFt);
        var areaLabels = { lawn_care:'Lawn', lawn_insect:'Lawn Insect', flower_beds:'Flower Beds', mosquito:'Mosquito', mosquito_linear_ft:'Mosquito Linear Ft', pest_control:'Pest Control', pest_control_linear_ft:'Pest Control Linear Ft' };
        var areaLabel = areaLabels[svc.area_treated] || svc.area_treated;
        tr.querySelector('.li-details').value = (svc.description || '') + (svc.description ? '\n' : '') + '(' + areaSqFt.toLocaleString() + ' ' + areaLabel + ' sq ft)';
      }
    }

    tr.querySelector('.li-rate').value = calculatedPrice !== null ? calculatedPrice.toFixed(2) : (svc.amount || svc.price || svc.default_price || '0.00');
    calcTotals();
  }

  function removeLine(btn) {
    btn.closest('tr').remove();
    calcTotals();
  }

  function calcTotals() {
    var sub = 0;
    document.querySelectorAll('#line-tbody tr').forEach(function(tr) {
      var qty  = parseFloat(tr.querySelector('.li-qty')?.value) || 0;
      var rate = parseFloat(tr.querySelector('.li-rate')?.value) || 0;
      var total = qty * rate;
      sub += total;
      var td = tr.querySelector('.li-total');
      if (td) td.textContent = fmt(total);
    });
    document.getElementById('tot-sub').textContent   = fmt(sub);
    document.getElementById('tot-total').textContent = fmt(sub);
  }

  function getLineItems() {
    var items = [];
    document.querySelectorAll('#line-tbody tr').forEach(function(tr) {
      var desc    = (tr.querySelector('.li-desc')?.value || '').trim();
      var details = (tr.querySelector('.li-details')?.value || '').trim();
      var qty     = parseFloat(tr.querySelector('.li-qty')?.value)  || 0;
      var rate    = parseFloat(tr.querySelector('.li-rate')?.value) || 0;
      items.push({ description: desc, details: details, qty: qty, rate: rate, total: qty * rate });
    });
    return items;
  }

  function getTotal() {
    return getLineItems().reduce(function(s, i) { return s + i.total; }, 0);
  }

  /* ── Status ── */
  function onStatusChange() {
    var status = document.getElementById('status-select').value;
    updateStatusBadge(status);
    document.getElementById('btn-convert').style.display = status === 'accepted' ? '' : 'none';
  }

  function updateStatusBadge(status) {
    var badge = document.getElementById('status-badge');
    badge.className = 'status-badge status-' + status;
    badge.textContent = status.charAt(0).toUpperCase() + status.slice(1);
  }

  /* ── Save ── */
  async function save(statusOverride) {
    var key = document.getElementById('property-select').value;
    if (!key) { alert('Please select a lead, client, or property.'); return; }
    var p = propData[key];
    var items = getLineItems();
    var status = statusOverride || document.getElementById('status-select').value || 'draft';

    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    var payload = {
      user_id:      uid,
      property_id:  p ? (p.property_id || null) : null,
      customer_id:  p ? (p.customer_id || p.lead_id || null) : null,
      client_name:  p ? (p.name || '') : '',
      address:      document.getElementById('address').value,
      status:       status,
      line_items:   items,
      amount:       getTotal(),
      notes:        document.getElementById('notes').value.trim() || null,
      expiry_date:  document.getElementById('expiry-date').value || null,
      updated_at:   new Date().toISOString(),
    };

    var error, savedData;
    if (editId) {
      var res = await sb.from('estimates').update(payload).eq('id', editId).select().single();
      error = res.error; savedData = res.data;
    } else {
      var res = await sb.from('estimates').insert(payload).select().single();
      error = res.error; savedData = res.data;
    }
    if (error) { alert('Error: ' + error.message); return; }

    if (statusOverride === 'sent' && savedData) {
      var token = sessionData && sessionData.session ? sessionData.session.access_token : '';
      var emailFetch = await fetch('https://knjdbgroiyhvqwrpqzcx.supabase.co/functions/v1/send-estimate-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ estimate_id: savedData.id })
      });
      var emailJson = await emailFetch.json();
      if (!emailFetch.ok) {
        alert('Estimate saved but email failed: ' + (emailJson.error || 'Unknown error'));
      } else {
        alert('Estimate sent! The client will receive an email with a link to view and accept.');
        sendEstimateAlert(savedData.id, uid);
      }
    }

    goBack();
  }

  async function sendEstimateAlert(estimateId, uid) {
    if (!uid) return;
    try {
      var { data: toggleRow } = await sb.from('alert_toggles').select('sms_enabled').eq('user_id', uid).eq('alert_type', 'estimate_sent').single();
      if (!toggleRow || !toggleRow.sms_enabled) return;
      var { data: alertRow } = await sb.from('alert_settings').select('enabled, message').eq('user_id', uid).eq('alert_type', 'estimate_sent').single();
      if (!alertRow || !alertRow.enabled || !alertRow.message) return;
      fetch('https://knjdbgroiyhvqwrpqzcx.supabase.co/functions/v1/send-sms-alert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY },
        body: JSON.stringify({ alert_type: 'estimate_sent', estimate_id: estimateId, user_id: uid, alert_message: alertRow.message })
      }).catch(function(e) { console.error('Estimate SMS alert error:', e); });
    } catch(e) { console.error('Estimate SMS alert error:', e); }
  }

  /* ── Convert to Services ── */
  async function convertToServices() {
    if (!editId) return;
    var items = getLineItems();
    if (!items.length) { alert('No line items to convert.'); return; }
    var key      = document.getElementById('property-select').value;
    var p        = propData[key];
    var clientName = p ? (p.name || '') : '';
    var address    = document.getElementById('address').value;

    var { data: convertSession } = await sb.auth.getSession();
    var convertUid = convertSession && convertSession.session ? convertSession.session.user.id : null;
    var serviceInserts = items.map(function(item) {
      return {
        user_id:       convertUid,
        property_id:   p ? (p.property_id || null) : null,
        customer_id:   p ? (p.customer_id || null) : null,
        client_name:   clientName,
        address:       address,
        service:       item.description,
        amount:        item.total,
        status:        'pending',
        dispatched:    false,
        job_type:      'one_time',
        service_lines: [item],
      };
    });

    var { error } = await sb.from('Services').insert(serviceInserts);
    if (error) { alert('Error: ' + error.message); return; }

    // For any line items linked to a package, also create the full package services
    var pkgInserts = [];
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var svc  = estimateCatalog.find(function(s) { return s.name === item.description; });
      if (!svc || !svc.package_id) continue;

      var { data: pkgRows } = await sb.from('package_services').select('*').eq('package_id', svc.package_id).order('id');
      if (!pkgRows || !pkgRows.length) continue;

      var rateEach = pkgRows.length > 1 ? (item.total / pkgRows.length) : item.total;
      pkgRows.forEach(function(r) {
        pkgInserts.push({
          user_id:            convertUid,
          property_id:        propId,
          customer_id:        p ? p.customer_id : null,
          client_name:        clientName,
          address:            address,
          service:            r.service_name || '',
          amount:             parseFloat(rateEach.toFixed(2)),
          min_days:           r.min_days     || 0,
          package_service_id: r.id,
          start_date:         r.start_date   || null,
          end_date:           r.end_date     || null,
          dispatched:         false,
          status:             'pending',
        });
      });
    }
    if (pkgInserts.length) {
      var { error: pkgErr } = await sb.from('Services').insert(pkgInserts);
      if (pkgErr) { alert('Warning: package services could not be created: ' + pkgErr.message); }
    }

    await sb.from('estimates').update({ status: 'accepted' }).eq('id', editId);
    var pkgCount = pkgInserts.length;
    alert(serviceInserts.length + ' service' + (serviceInserts.length > 1 ? 's' : '') + ' added to the Waiting List.' + (pkgCount ? '\n' + pkgCount + ' package service(s) also created for this property.' : ''));
    goBack();
  }

  /* ── Delete ── */
  async function deleteEstimate() {
    if (!editId) return;
    if (!confirm('Delete this estimate?')) return;
    var { error } = await sb.from('estimates').delete().eq('id', editId);
    if (error) { alert('Error: ' + error.message); return; }
    goBack();
  }

  /* ── Init ── */
  async function init() {
    await Promise.all([loadProperties(), loadEstimateServicesCatalog()]);
    var params = new URLSearchParams(window.location.search);
    editId = params.get('id') || null;

    // Pre-select property if coming from property profile
    var pid = params.get('property_id');
    if (pid) {
      document.getElementById('source-type').value = 'property';
      onSourceTypeChange();
      document.getElementById('property-select').value = 'prop_' + pid;
      onPropertyChange();
    }

    if (editId) {
      document.getElementById('page-title').textContent = 'Edit Estimate';
      document.getElementById('btn-delete').style.display = '';
      document.getElementById('status-card').style.display = '';

      var { data, error } = await sb.from('estimates').select('*').eq('id', editId).single();
      if (error || !data) { alert('Estimate not found.'); goBack(); return; }

      // Restore source type and record dropdown
      var restoredKey = '';
      if (data.property_id) {
        restoredKey = 'prop_' + data.property_id;
        document.getElementById('source-type').value = 'property';
      } else if (data.customer_id) {
        var isLead = allLeads.some(function(l) { return l.id === data.customer_id; });
        if (isLead) {
          restoredKey = 'lead_' + data.customer_id;
          document.getElementById('source-type').value = 'lead';
        } else {
          restoredKey = 'client_' + data.customer_id;
          document.getElementById('source-type').value = 'client';
        }
      }
      if (restoredKey) {
        onSourceTypeChange();
        document.getElementById('property-select').value = restoredKey;
        onPropertyChange();
      }

      document.getElementById('expiry-date').value   = data.expiry_date || '';
      document.getElementById('notes').value         = data.notes || '';
      document.getElementById('status-select').value = data.status || 'draft';
      updateStatusBadge(data.status || 'draft');
      if (data.status === 'accepted') document.getElementById('btn-convert').style.display = '';

      (data.line_items || []).forEach(function(item) {
        addLine(item.description, item.qty, item.rate, item.details);
      });
    } else {
      // Default expiry date to 30 days from today
      var exp = new Date();
      exp.setDate(exp.getDate() + 30);
      document.getElementById('expiry-date').value = exp.toISOString().split('T')[0];
    }
  }

  init();

  /* ── Estimate Templates ── */
  function openTemplateModal() {
    var overlay = document.getElementById('tmpl-modal-overlay');
    overlay.style.display = 'flex';
    loadTemplateList();
  }
  function closeTemplateModal() {
    document.getElementById('tmpl-modal-overlay').style.display = 'none';
  }
  async function loadTemplateList() {
    var container = document.getElementById('tmpl-modal-list');
    container.innerHTML = '<div style="padding:16px;color:#aaa;">Loading...</div>';
    var { data, error } = await sb.from('estimate_templates').select('*').order('name');
    if (error || !data || !data.length) {
      container.innerHTML = '<div style="padding:16px;color:#aaa;font-style:italic;">' + (error ? error.message : 'No templates yet. Create one under Estimate Email Setup → Estimate Templates.') + '</div>';
      return;
    }
    container.innerHTML = data.map(function(t) {
      var items = Array.isArray(t.items) ? t.items : [];
      var preview = items.slice(0, 3).map(function(it) { return it.description; }).join(', ') + (items.length > 3 ? '…' : '');
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #eee;cursor:pointer;" onmouseover="this.style.background=\'#fff5ec\'" onmouseout="this.style.background=\'\'" onclick="applyTemplate(\'' + t.id + '\')">' +
        '<div>' +
          '<div style="font-weight:700;font-size:14px;color:#111;">' + (t.name || 'Untitled') + '</div>' +
          '<div style="font-size:12px;color:#888;margin-top:2px;">' + items.length + ' item' + (items.length === 1 ? '' : 's') + (preview ? ' &nbsp;·&nbsp; ' + preview : '') + '</div>' +
        '</div>' +
        '<span style="color:#e07820;font-weight:700;font-size:13px;">Use ›</span>' +
      '</div>';
    }).join('');
  }
  async function applyTemplate(id) {
    var { data } = await sb.from('estimate_templates').select('*').eq('id', id).single();
    if (!data) return;
    var items = Array.isArray(data.items) ? data.items : [];
    if (!items.length) { closeTemplateModal(); return; }
    var tbody = document.getElementById('line-tbody');
    if (tbody.children.length > 0) {
      if (!confirm('Replace current line items with template "' + data.name + '"?')) return;
      tbody.innerHTML = '';
    }
    items.forEach(function(it) { addLine(it.description, it.qty, it.rate, it.details); });
    closeTemplateModal();
  }
</script>

<!-- Template picker modal -->
<div id="tmpl-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1200;align-items:center;justify-content:center;" onclick="if(event.target===this)closeTemplateModal()">
  <div style="background:#fff;width:96vw;max-width:560px;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.35);overflow:hidden;display:flex;flex-direction:column;max-height:80vh;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#130520;color:#fff;">
      <span style="font-size:16px;font-weight:700;">Load Estimate Template</span>
      <button onclick="closeTemplateModal()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;">&#10005;</button>
    </div>
    <div id="tmpl-modal-list" style="overflow-y:auto;flex:1;"></div>
  </div>
</div>
