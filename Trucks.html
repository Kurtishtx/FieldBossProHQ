<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trucks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #fff; color: #222; }

    .page-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 10px;
    }
    .page-topbar-left h1 { font-size: 20px; font-weight: 700; color: #111; }
    .page-topbar-left .item-count { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 3px; }
    .btn-add {
      background: #130520 !important; color: #fff !important; border: 2px solid #e07820 !important;
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      border-radius: 6px; cursor: pointer; white-space: nowrap;
    }
    .btn-add:hover { background: #1e0a35 !important; }

    .toolbar {
      background: #130520; display: flex; align-items: center;
      padding: 7px 14px; gap: 6px;
    }
    .btn-actions { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none;
      padding: 5px 14px; font-size: 13px; font-weight: 700;
      border-radius: 3px 0 0 3px; cursor: pointer;
    }
    .btn-actions:hover { background: #d4ae00; }
    .btn-actions-caret {
      background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15);
      border-radius: 0 3px 3px 0;
      padding: 5px 8px; font-size: 12px; cursor: pointer;
    }
    .btn-actions-caret:hover { background: #d4ae00; }

    .dropdown { position: relative; display: inline-flex; }
    .dd-menu {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
      background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 12px rgba(0,0,0,.2);
      min-width: 180px; padding: 4px 0;
    }
    .dd-menu.show { display: block; }
    .dd-menu a {
      display: block; padding: 8px 14px; color: #444;
      text-decoration: none; font-size: 13px; cursor: pointer;
    }
    .dd-menu a:hover { background: #f5f5f5; }

    .toolbar-tabs { display: flex; gap: 0; margin-left: 4px; }
    .tab-btn {
      padding: 5px 16px; border: none; cursor: pointer;
      font-size: 12.5px; font-weight: 600; font-family: inherit;
      background: #555; color: #bbb;
    }
    .tab-btn:first-child { border-radius: 3px 0 0 3px; }
    .tab-btn:last-child  { border-radius: 0 3px 3px 0; }
    .tab-btn.active { background: #fff; color: #222; }
    .tab-btn:hover:not(.active) { background: #666; }

    .table-wrap { background: #fff; margin: 0 16px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px; text-align: left; font-size: 12px;
      font-weight: 700; color: #fff; border-bottom: 2px solid #7a7098;
      background: #8e83aa; text-transform: uppercase; letter-spacing: .4px;
    }
    thead th:first-child { width: 40px; text-align: center; }
    tbody tr { border-bottom: 1px solid #eee; cursor: pointer; background: #fff; }
    tbody tr:hover { background: #f5f3fa; }
    tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }
    tbody td:first-child { text-align: center; }
    .name-link { color: #2272c3; text-decoration: underline; font-size: 13px; }

    .empty-msg { padding: 32px; text-align: center; color: #888; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="page-topbar">
  <div class="page-topbar-left">
    <div class="item-count" id="item-count">0 items</div>
  </div>
  <button class="btn-add" onclick="window.location.href='TrucksAdd.html'">Add Truck</button>
</div>

<div class="toolbar">
  <div class="dropdown">
    <button class="btn-actions">Actions</button>
    <button class="btn-actions-caret" onclick="toggleDD(event)">&#9660;</button>
    <div class="dd-menu" id="actions-dd">
      <a onclick="setActiveSelected(true)">Activate Selected</a>
      <a onclick="setActiveSelected(false)">Deactivate Selected</a>
      <a onclick="deleteSelected()">Delete Selected</a>
    </div>
  </div>
  <div class="toolbar-tabs">
    <button class="tab-btn active" onclick="setFilter('active',this)">Active</button>
    <button class="tab-btn" onclick="setFilter('inactive',this)">Inactive</button>
    <button class="tab-btn" onclick="setFilter('all',this)">All</button>
  </div>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"/></th>
      <th>Name</th>
      <th>Active</th>
      <th>Date Added</th>
    </tr>
  </thead>
  <tbody id="trucks-tbody"></tbody>
</table>
<div class="empty-msg" id="empty-msg" style="display:none;">No trucks found.</div>
</div>
<div style="height:28px; background:#130520; margin:0 16px 16px; border-radius:0 0 8px 8px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var trucks = [];
  var filter = 'active';

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function toggleDD(e) {
    e.stopPropagation();
    document.getElementById('actions-dd').classList.toggle('show');
  }
  document.addEventListener('click', function() { document.getElementById('actions-dd').classList.remove('show'); });

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderTable();
  }

  function toggleAll(checked) {
    document.querySelectorAll('#trucks-tbody input[type="checkbox"]').forEach(function(cb) { cb.checked = checked; });
  }

  function getSelected() {
    var ids = [];
    document.querySelectorAll('#trucks-tbody input[type="checkbox"]:checked').forEach(function(cb) { ids.push(cb.dataset.id); });
    return ids;
  }

  async function deleteSelected() {
    var ids = getSelected();
    if (!ids.length) return;
    if (!confirm('Delete ' + ids.length + ' truck(s)?')) return;
    var { error } = await sb.from('trucks').delete().in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    trucks = trucks.filter(function(t) { return !ids.includes(String(t.id)); });
    renderTable();
  }

  async function setActiveSelected(active) {
    var ids = getSelected();
    if (!ids.length) return;
    var { error } = await sb.from('trucks').update({ active: active }).in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    trucks.forEach(function(t) { if (ids.includes(String(t.id))) t.active = active; });
    renderTable();
  }

  function renderTable() {
    var tbody = document.getElementById('trucks-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    var filtered = trucks.filter(function(t) {
      if (filter === 'active')   return t.active !== false;
      if (filter === 'inactive') return t.active === false;
      return true;
    });
    document.getElementById('item-count').textContent = filtered.length + ' item' + (filtered.length !== 1 ? 's' : '');
    tbody.innerHTML = '';
    if (!filtered.length) { emptyMsg.style.display = ''; return; }
    emptyMsg.style.display = 'none';
    filtered.forEach(function(t) {
      var tr = document.createElement('tr');
      var added = t.created_at ? new Date(t.created_at).toLocaleDateString() : '';
      tr.innerHTML =
        '<td><input type="checkbox" data-id="' + t.id + '" onclick="event.stopPropagation()"/></td>' +
        '<td><span class="name-link">' + esc(t.name) + '</span></td>' +
        '<td>' + (t.active !== false ? 'Active' : 'Inactive') + '</td>' +
        '<td>' + added + '</td>';
      tr.addEventListener('click', function(e) {
        if (e.target.type === 'checkbox') return;
        window.location.href = 'TrucksAdd.html?id=' + t.id;
      });
      tbody.appendChild(tr);
    });
  }

  async function loadTrucks() {
    var { data, error } = await sb.from('trucks').select('*').order('name', { ascending: true });
    if (error) { console.error(error); return; }
    trucks = data || [];
    renderTable();
  }

  loadTrucks();
</script>
</body>
</html>
