<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estimate Template</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f7f7f7; color: #222; }
    .page-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:#fff; border-bottom:1px solid #eee; }
    .page-header h1 { font-size:20px; font-weight:800; color:#111; }
    .btn-back { background:none; border:none; color:#2272c3; font-size:13px; cursor:pointer; padding:0; }
    .btn-back:hover { text-decoration:underline; }
    .btn-save { background:#e07820; color:#fff; border:none; padding:8px 22px; font-size:13px; font-weight:700; border-radius:4px; cursor:pointer; }
    .btn-save:hover { background:#c96a10; }
    .body-wrap { max-width:900px; margin:24px auto; padding:0 20px; }
    .card { background:#fff; border:1px solid #e0e0e0; border-radius:6px; margin-bottom:16px; }
    .card-hdr { padding:14px 18px; border-bottom:1px solid #eee; font-size:13px; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:.5px; }
    .card-body { padding:18px; }
    .card-body label { display:block; font-size:13px; color:#666; margin-bottom:6px; }
    .card-body input[type="text"] { width:100%; border:1px solid #ccc; padding:7px 10px; font-size:13px; font-family:inherit; border-radius:3px; outline:none; }
    .card-body input[type="text"]:focus { border-color:#e07820; }
    .svc-table { width:100%; border-collapse:collapse; }
    .svc-table thead th { background:#130520; color:#fff; padding:8px 10px; font-size:12px; font-weight:700; text-align:left; }
    .svc-table thead th:last-child { text-align:right; }
    .svc-table tbody td { padding:6px 8px; border-bottom:1px solid #eee; vertical-align:middle; }
    .svc-table input[type="text"], .svc-table input[type="number"] { width:100%; border:1px solid #ddd; padding:5px 7px; font-size:13px; font-family:inherit; border-radius:2px; outline:none; }
    .svc-table input[type="number"] { text-align:right; }
    .svc-table input:focus { border-color:#e07820; }
    .btn-add-line { background:none; border:1px dashed #bbb; color:#555; padding:7px 16px; font-size:13px; cursor:pointer; border-radius:3px; margin-top:10px; }
    .btn-add-line:hover { background:#f5f5f5; }
    .del-btn { background:none; border:none; color:#c0392b; font-size:16px; cursor:pointer; padding:0 4px; line-height:1; }
    .del-btn:hover { color:#a93226; }
    .totals-box { background:#f9f9f9; border:1px solid #eee; border-radius:4px; padding:14px 18px; }
    .totals-row { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
    .totals-row.grand { font-size:16px; font-weight:800; border-top:2px solid #ccc; margin-top:6px; padding-top:8px; }
    .save-msg { margin-top:10px; color:#27a567; font-size:13px; text-align:center; }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="page-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <button class="btn-back" onclick="goBack(event)">&#8592; Templates</button>
    <h1 id="page-title">New Estimate Template</h1>
  </div>
  <button class="btn-save" onclick="saveTemplate()">Save Template</button>
</div>

<div class="body-wrap">

  <div class="card">
    <div class="card-hdr">Template Name</div>
    <div class="card-body">
      <input type="text" id="tmpl-name" placeholder="e.g. Full Service Bundle, Lawn + Mosquito..." autocomplete="off"/>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr">Services / Line Items</div>
    <div class="card-body">
      <table class="svc-table">
        <thead>
          <tr>
            <th style="width:28px;"></th>
            <th>Service / Description</th>
            <th style="width:80px;">Qty</th>
            <th style="width:110px;">Rate</th>
            <th style="width:110px;text-align:right;">Total</th>
          </tr>
        </thead>
        <tbody id="items-tbody"></tbody>
      </table>
      <button class="btn-add-line" onclick="addRow()">+ Add Item</button>
      <button class="btn-add-line" onclick="saveTemplate()" style="margin-left:8px;border-color:#e07820;color:#e07820;">Save Template</button>

      <div style="display:flex;justify-content:flex-end;margin-top:16px;">
        <div class="totals-box" style="min-width:260px;">
          <div class="totals-row"><span>Subtotal</span><span id="grand-total">$0.00</span></div>
          <div class="totals-row grand"><span>Total</span><span id="grand-total-2">$0.00</span></div>
        </div>
      </div>
      <div class="save-msg" id="save-msg"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    'https://knjdbgroiyhvqwrpqzcx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g',
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var editId   = null;
  var catalog  = [];

  var params = new URLSearchParams(window.location.search);
  editId = params.get('id') || null;
  if (editId) document.getElementById('page-title').textContent = 'Edit Estimate Template';

  function goBack() {
    if (window.parent && window.parent.loadPage) window.parent.loadPage('estimatetemplateslist');
    else window.location.href = 'EstimateTemplatesList.html';
  }

  /* ── Catalog from estimate_services + Services ── */
  async function loadCatalog() {
    var { data: svcs } = await sb.from('estimate_services').select('id, name, price').order('name');
    catalog = svcs || [];
    if (editId) await loadTemplate();
  }

  function catalogOptions(selectedName) {
    var opts = '<option value="">-- pick or type below --</option>';
    opts += catalog.map(function(s) {
      var sel = selectedName === s.name ? ' selected' : '';
      return '<option value="' + s.id + '" data-name="' + esc(s.name) + '" data-price="' + (s.price || 0) + '"' + sel + '>' + esc(s.name) + '</option>';
    }).join('');
    return opts;
  }

  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function addRow(desc, qty, rate) {
    var tbody = document.getElementById('items-tbody');
    var safeDesc = (desc || '').replace(/"/g, '&quot;');
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><button class="del-btn" onclick="deleteRow(this)">&#10005;</button></td>' +
      '<td><input type="text" class="li-desc" placeholder="Service or description..." value="' + safeDesc + '" style="width:100%;"/></td>' +
      '<td><input type="number" class="li-qty" min="0" step="1" value="' + (qty || 1) + '" oninput="recalcRow(this)" style="text-align:right;"/></td>' +
      '<td><input type="number" class="li-rate" min="0" step="0.01" value="' + (rate || '') + '" oninput="recalcRow(this)" style="text-align:right;"/></td>' +
      '<td class="row-total" style="text-align:right;font-weight:600;padding-right:12px;">$' + ((parseFloat(qty) || 0) * (parseFloat(rate) || 0)).toFixed(2) + '</td>';
    tbody.appendChild(tr);
    updateTotal();
  }

  function recalcRow(input) {
    var tr   = input.closest('tr');
    var qty  = parseFloat(tr.querySelector('.li-qty').value)  || 0;
    var rate = parseFloat(tr.querySelector('.li-rate').value) || 0;
    tr.querySelector('.row-total').textContent = '$' + (qty * rate).toFixed(2);
    updateTotal();
  }

  function deleteRow(btn) {
    btn.closest('tr').remove();
    updateTotal();
  }

  function updateTotal() {
    var total = 0;
    document.querySelectorAll('#items-tbody tr').forEach(function(tr) {
      var qty  = parseFloat(tr.querySelector('.li-qty')?.value)  || 0;
      var rate = parseFloat(tr.querySelector('.li-rate')?.value) || 0;
      total += qty * rate;
    });
    var fmt = '$' + total.toFixed(2);
    document.getElementById('grand-total').textContent   = fmt;
    document.getElementById('grand-total-2').textContent = fmt;
  }

  function getItems() {
    var items = [];
    document.querySelectorAll('#items-tbody tr').forEach(function(tr) {
      var desc = (tr.querySelector('.li-desc')?.value || '').trim();
      var qty  = parseFloat(tr.querySelector('.li-qty')?.value)  || 1;
      var rate = parseFloat(tr.querySelector('.li-rate')?.value) || 0;
      if (desc) items.push({ description: desc, qty: qty, rate: rate });
    });
    return items;
  }

  async function loadTemplate() {
    var { data } = await sb.from('estimate_templates').select('*').eq('id', editId).single();
    if (!data) return;
    document.getElementById('tmpl-name').value = data.name || '';
    var items = Array.isArray(data.items) ? data.items : [];
    items.forEach(function(it) { addRow(it.description, it.qty, it.rate); });
  }

  async function saveTemplate() {
    var name = document.getElementById('tmpl-name').value.trim();
    if (!name) { alert('Please enter a template name.'); document.getElementById('tmpl-name').focus(); return; }
    var items = getItems();
    var { data: sess } = await sb.auth.getSession();
    var uid = sess?.session?.user?.id || null;
    var payload = { name: name, items: items, user_id: uid };
    var error;
    if (editId) {
      var res = await sb.from('estimate_templates').update(payload).eq('id', editId);
      error = res.error;
    } else {
      var res = await sb.from('estimate_templates').insert(payload);
      error = res.error;
      if (!error && res.data && res.data[0]) editId = res.data[0].id;
    }
    if (error) { alert('Save failed: ' + error.message); return; }
    var msg = document.getElementById('save-msg');
    msg.textContent = 'Template saved!';
    setTimeout(function() { msg.textContent = ''; }, 2000);
  }

  loadCatalog();
</script>
</body>
</html>
