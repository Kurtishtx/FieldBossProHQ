<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estimate Template</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #ebebeb; font-size: 13px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 10px 16px; background: #fff; border-bottom: 1px solid #ccc;
    }
    .topbar h1 { font-size: 18px; font-weight: 700; color: #111; }
    .back-link {
      color: #e07820; text-decoration: none; font-size: 13px; font-weight: 600;
      border: 1px solid #e07820; border-radius: 4px; padding: 3px 10px;
    }
    .back-link:hover { background: #fff5ec; }
    .topbar-right { display: flex; gap: 8px; align-items: center; }
    .btn-save {
      background: #e07820; color: #fff; border: none; border-radius: 4px;
      padding: 8px 22px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .btn-save:hover { background: #c96a10; }
    .page { max-width: 900px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 20px; margin-bottom: 14px; }
    .card label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; }
    .card input[type="text"] {
      width: 100%; border: 1px solid #ccc; border-radius: 3px;
      padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none;
    }
    .card input[type="text"]:focus { border-color: #e07820; }
    .sec-hdr {
      background: #3a3a3a; color: #fff; padding: 8px 12px;
      font-size: 13px; font-weight: 600; border-radius: 4px 4px 0 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .items-table {
      width: 100%; border-collapse: collapse;
      background: #fff; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; overflow: hidden;
    }
    .items-table th {
      background: #f5f5f5; padding: 8px 10px; text-align: left;
      font-size: 12px; font-weight: 700; color: #555; border-bottom: 1px solid #ddd;
    }
    .items-table th.right { text-align: right; }
    .items-table td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .items-table tr:last-child td { border-bottom: none; }
    .items-table input[type="text"],
    .items-table input[type="number"] {
      width: 100%; border: 1px solid #ddd; border-radius: 3px;
      padding: 5px 7px; font-size: 12.5px; font-family: inherit; outline: none;
    }
    .items-table input:focus { border-color: #e07820; }
    .items-table select {
      width: 100%; border: 1px solid #ddd; border-radius: 3px;
      padding: 5px 7px; font-size: 12.5px; font-family: inherit; outline: none;
      background: #fff;
    }
    .items-table select:focus { border-color: #e07820; }
    .items-table input[type="number"] { text-align: right; }
    .btn-add-line {
      background: #3a3a3a; color: #fff; border: none; border-radius: 3px;
      padding: 7px 18px; font-size: 13px; cursor: pointer; margin: 10px 0 0;
    }
    .btn-add-line:hover { background: #222; }
    .btn-del-row {
      background: none; border: none; color: #cc2222;
      font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .btn-del-row:hover { color: #a00; }
    .row-total { text-align: right; font-weight: 600; font-size: 12.5px; min-width: 70px; }
    .totals-wrap { display: flex; justify-content: flex-end; padding: 12px 0 4px; }
    .totals-box { min-width: 220px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
    .totals-row {
      display: flex; justify-content: space-between;
      padding: 7px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0;
    }
    .totals-row:last-child { border-bottom: none; }
    .totals-row.grand { font-weight: 700; font-size: 14px; background: #f9f9f9; }
    .save-msg { margin-top: 10px; color: #27a567; font-size: 13px; text-align: center; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <a class="back-link" href="#" onclick="goBack(event)">&#8592; Templates</a>
    <h1 id="page-title">New Estimate Template</h1>
  </div>
  <div class="topbar-right">
    <button class="btn-save" onclick="saveTemplate()">Save Template</button>
  </div>
</div>

<div class="page">

  <div class="card">
    <label for="tmpl-name">Template Name</label>
    <input type="text" id="tmpl-name" placeholder="e.g. Full Service Bundle, Lawn + Mosquito..." autocomplete="off"/>
  </div>

  <div class="sec-hdr">
    <span>Line Items</span>
  </div>
  <table class="items-table">
    <thead>
      <tr>
        <th style="width:40%;">Service / Description</th>
        <th style="width:10%;">Qty</th>
        <th style="width:13%;" class="right">Rate</th>
        <th style="width:13%;" class="right">Total</th>
        <th style="width:24%;"></th>
      </tr>
    </thead>
    <tbody id="items-tbody"></tbody>
  </table>
  <button class="btn-add-line" onclick="addRow()">+ Add Item</button>

  <div class="totals-wrap">
    <div class="totals-box">
      <div class="totals-row grand"><span>Total</span><span id="grand-total">$0.00</span></div>
    </div>
  </div>

  <div class="save-msg" id="save-msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    'https://knjdbgroiyhvqwrpqzcx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g'
  );

  var editId   = null;
  var catalog  = [];

  var params = new URLSearchParams(window.location.search);
  editId = params.get('id') || null;
  if (editId) document.getElementById('page-title').textContent = 'Edit Estimate Template';

  function goBack(e) {
    e.preventDefault();
    if (window.parent && window.parent.loadPage) window.parent.loadPage('estimatetemplateslist');
    else window.location.href = 'EstimateTemplatesList.html';
  }

  /* ── Catalog from estimate_services + Services ── */
  async function loadCatalog() {
    var { data: svcs } = await sb.from('estimate_services').select('id, name, price').order('name');
    catalog = svcs || [];
    if (editId) await loadTemplate();
    else addRow();
  }

  function catalogOptions(selectedName) {
    var opts = '<option value="">-- pick or type below --</option>';
    opts += catalog.map(function(s) {
      var sel = selectedName === s.name ? ' selected' : '';
      return '<option value="' + s.id + '" data-name="' + esc(s.name) + '" data-price="' + (s.price || 0) + '"' + sel + '>' + esc(s.name) + '</option>';
    }).join('');
    return opts;
  }

  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function addRow(desc, qty, rate, details) {
    var tbody = document.getElementById('items-tbody');
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' +
        '<select onchange="onCatalogPick(this)" style="margin-bottom:4px;">' + catalogOptions(desc) + '</select>' +
        '<input type="text" class="li-desc" placeholder="Description" value="' + esc(desc || '') + '"/>' +
        '<input type="text" class="li-details" placeholder="Details (optional)" value="' + esc(details || '') + '" style="margin-top:3px;font-size:11.5px;color:#777;"/>' +
      '</td>' +
      '<td><input type="number" class="li-qty" min="0" step="1" value="' + (qty || 1) + '" oninput="recalcRow(this)"/></td>' +
      '<td><input type="number" class="li-rate" min="0" step="0.01" value="' + (rate || '') + '" oninput="recalcRow(this)"/></td>' +
      '<td class="row-total">$' + ((parseFloat(qty) || 0) * (parseFloat(rate) || 0)).toFixed(2) + '</td>' +
      '<td style="text-align:center;"><button class="btn-del-row" onclick="deleteRow(this)">&#10006;</button></td>';
    tbody.appendChild(tr);
    updateTotal();
  }

  function onCatalogPick(sel) {
    var tr = sel.closest('tr');
    var opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.value) return;
    tr.querySelector('.li-desc').value  = opt.dataset.name || opt.text;
    tr.querySelector('.li-rate').value  = opt.dataset.price || '';
    recalcRow(tr.querySelector('.li-rate'));
  }

  function recalcRow(input) {
    var tr   = input.closest('tr');
    var qty  = parseFloat(tr.querySelector('.li-qty').value)  || 0;
    var rate = parseFloat(tr.querySelector('.li-rate').value) || 0;
    tr.querySelector('.row-total').textContent = '$' + (qty * rate).toFixed(2);
    updateTotal();
  }

  function deleteRow(btn) {
    btn.closest('tr').remove();
    updateTotal();
  }

  function updateTotal() {
    var total = 0;
    document.querySelectorAll('#items-tbody tr').forEach(function(tr) {
      var qty  = parseFloat(tr.querySelector('.li-qty')?.value)  || 0;
      var rate = parseFloat(tr.querySelector('.li-rate')?.value) || 0;
      total += qty * rate;
    });
    document.getElementById('grand-total').textContent = '$' + total.toFixed(2);
  }

  function getItems() {
    var items = [];
    document.querySelectorAll('#items-tbody tr').forEach(function(tr) {
      var desc    = tr.querySelector('.li-desc')?.value.trim()    || '';
      var details = tr.querySelector('.li-details')?.value.trim() || '';
      var qty     = parseFloat(tr.querySelector('.li-qty')?.value)  || 1;
      var rate    = parseFloat(tr.querySelector('.li-rate')?.value) || 0;
      if (desc) items.push({ description: desc, details: details, qty: qty, rate: rate });
    });
    return items;
  }

  async function loadTemplate() {
    var { data } = await sb.from('estimate_templates').select('*').eq('id', editId).single();
    if (!data) return;
    document.getElementById('tmpl-name').value = data.name || '';
    var items = Array.isArray(data.items) ? data.items : [];
    if (items.length) {
      items.forEach(function(it) { addRow(it.description, it.qty, it.rate, it.details); });
    } else {
      addRow();
    }
  }

  async function saveTemplate() {
    var name = document.getElementById('tmpl-name').value.trim();
    if (!name) { alert('Please enter a template name.'); document.getElementById('tmpl-name').focus(); return; }
    var items = getItems();
    var { data: sess } = await sb.auth.getSession();
    var uid = sess?.session?.user?.id || null;
    var payload = { name: name, items: items, user_id: uid };
    var error;
    if (editId) {
      var res = await sb.from('estimate_templates').update(payload).eq('id', editId);
      error = res.error;
    } else {
      var res = await sb.from('estimate_templates').insert(payload);
      error = res.error;
      if (!error && res.data && res.data[0]) editId = res.data[0].id;
    }
    if (error) { alert('Save failed: ' + error.message); return; }
    var msg = document.getElementById('save-msg');
    msg.textContent = 'Template saved!';
    setTimeout(function() { msg.textContent = ''; }, 2000);
  }

  loadCatalog();
</script>
</body>
</html>
