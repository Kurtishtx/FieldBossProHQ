<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clients</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #d4cfe0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .page-topbar {
      background: #130520;
      border-bottom: 1px solid #1e0a35;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin: 8px 16px;
      border-radius: 10px;
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; }
    .filter-icon-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      padding: 6px 11px;
      cursor: pointer;
      font-size: 15px;
      color: rgba(255,255,255,.8);
      line-height: 1;
      transition: background .15s;
    }
    .filter-icon-btn:hover { background: rgba(255,255,255,.18); }

    .client-search {
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13.5px;
      width: 220px;
      font-family: inherit;
      color: #fff;
      background: rgba(255,255,255,.1);
      transition: border-color .15s, box-shadow .15s;
    }
    .client-search::placeholder { color: rgba(255,255,255,.45); }
    .client-search:focus {
      outline: none;
      border-color: #e07820;
      background: rgba(255,255,255,.15);
      box-shadow: 0 0 0 3px rgba(224,120,32,.2);
    }

    .topbar-right { display: flex; align-items: center; gap: 10px; }
        .btn-orange-outline {
      background: #111;
      border: 3px solid #e07820;
      color: #fff;
      font-weight: 700;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13.5px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-orange-outline:hover { background: #1a0828; }
        .btn-orange-filled {
      background: #e07820;
      border: 3px solid #111;
      color: #fff;
      font-weight: 700;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13.5px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn-orange-filled:hover { background: #c96a15; border-color: #111; }

    /* ── Filters bar (BLACK) ── */
    .filters-bar {
      background: #130520;
      color: rgba(255,255,255,.8);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
      letter-spacing: .3px;
      margin: 0 16px;
      border-radius: 8px;
    }
    .filters-bar:hover { background: #1e0a35; }

    .filters-row {
      background: #1a0a30;
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin: 2px 16px;
      border-radius: 8px;
    }
    .btn-filter-action {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 5px;
      padding: 5px 14px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: rgba(255,255,255,.8);
      font-weight: 500;
      transition: background .15s;
    }
    .btn-filter-action:hover { background: rgba(255,255,255,.18); }
    .btn-clear-filters {
      margin-left: auto;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 5px;
      padding: 5px 14px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: rgba(255,255,255,.6);
      transition: background .15s;
    }
    .btn-clear-filters:hover { background: rgba(255,255,255,.15); }

    /* ── Results bar ── */
    .results-bar {
      padding: 6px 24px;
      font-size: 18px;
      font-weight: 700;
      color: #111;
      background: transparent;
      flex-shrink: 0;
      text-align: right;
    }

    /* ── Toolbar ── */
    .toolbar {
      background: #130520;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin: 4px 16px 0;
      border-radius: 10px 10px 0 0;
    }
    .actions-split { display: flex; align-items: stretch; position: relative; }
    .btn-green-main { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none; border-radius: 3px 0 0 3px; padding: 5px 14px; font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer; }
    .btn-green-main:hover { background: #d4ae00; }
    .btn-green-caret { background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15); border-radius: 0 3px 3px 0; padding: 5px 8px; font-size: 12px; cursor: pointer; }
    .btn-green-caret:hover { background: #d4ae00; }

    .actions-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
      z-index: 200;
      min-width: 180px;
      padding: 4px 0;
    }
    .actions-dropdown.open { display: block; }
    .dropdown-header {
      font-size: 11px;
      font-weight: 700;
      color: #888;
      padding: 8px 14px 4px;
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid #eee;
      margin-bottom: 3px;
    }
    .dropdown-item {
      display: block;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 8px 14px;
      font-size: 13.5px;
      font-family: inherit;
      color: #222;
      cursor: pointer;
      transition: background .1s;
    }
    .dropdown-item:hover { background: #f5f5f5; color: #111; }

    .pagination-area {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: rgba(255,255,255,.7);
    }
    .pagination-area input {
      width: 50px;
      padding: 3px 6px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 13px;
      text-align: center;
    }
    .pg-btn {
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.75);
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s;
    }
    .pg-btn:hover { background: rgba(255,255,255,.22); color: #fff; }
    .pg-current {
      background: #f5c800;
      color: #111;
      border: none;
      padding: 4px 9px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
    }
    .btn-columns {
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.75);
      border: 1px solid rgba(255,255,255,.18);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12.5px;
      margin-left: 6px;
      font-family: inherit;
      transition: background .15s;
    }
    .btn-columns:hover { background: rgba(255,255,255,.22); color: #fff; }

    /* ── Filter pills ── */
    .filter-tabs { display:flex; gap:4px; padding:8px 14px; background:#1a0a30; border-bottom:1px solid rgba(255,255,255,.06); flex-wrap:wrap; flex-shrink:0; margin:0 16px; }
    .ftab { padding:5px 16px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.06); font-size:13px; font-family:inherit; cursor:pointer; border-radius:20px; color:rgba(255,255,255,.6); transition:background .15s; }
    .ftab:hover { background:rgba(255,255,255,.12); color:#fff; }
    .ftab.active { background:#e07820; color:#fff; border-color:#e07820; font-weight:700; }

    /* ── Table ── */
    .table-container {
      flex: 1;
      overflow-y: auto;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    thead th {
      background: #fff;
      border-bottom: 2px solid #ddd;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      font-size: 12.5px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    thead th:first-child { width: 36px; text-align: center; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .1s; }
    tbody tr:hover { background: #fdfbe8; }
    tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }
    tbody td:first-child { text-align: center; }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: #888888;
    }
    .client-link {
      color: #2272c3;
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
    }
    .client-link:hover { text-decoration: underline; color: #1a5ea0; }
    .star-icon { color: #f0b429; }

    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div id="status-banner" style="display:none;padding:10px 20px;color:#fff;font-weight:600;font-size:13px;"></div>
<div id="delete-confirm-bar" style="display:none;align-items:center;gap:12px;padding:10px 20px;background:#130520;color:#fff;font-size:13px;">
  <span>Delete <strong id="delete-confirm-count">0</strong> client(s) and all their properties? This cannot be undone.</span>
  <button onclick="confirmDelete()" style="background:#c0392b;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-weight:700;">Yes, Delete</button>
  <button onclick="document.getElementById('delete-confirm-bar').style.display='none'" style="background:none;border:1px solid #999;padding:6px 14px;border-radius:4px;cursor:pointer;">Cancel</button>
</div>

<!-- Top bar -->
<div class="page-topbar">
  <div class="topbar-left">
  </div>
  <div class="topbar-right">
    <button class="btn-orange-filled" onclick="window.location.href='ClientAdd.html'">Add Client</button>
  </div>
</div>

<!-- Filters bar -->
<div class="filters-bar" onclick="toggleFilters()">
  <span>&#9783; Filters</span>
  <span id="filters-arrow">&#9660;</span>
</div>
<div class="filters-row" id="filters-row" style="display:none">
  <button class="btn-filter-action">Search</button>
  <button class="btn-filter-action">Add Filter</button>
  <button class="btn-clear-filters">Clear Filters</button>
</div>

<!-- Results count -->
<div class="results-bar" id="results-bar">0 items in 1 pages</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="actions-split">
    <button class="btn-green-main">Actions</button>
    <button class="btn-green-caret" onclick="toggleDropdown(event)">&#9660;</button>
    <div class="actions-dropdown" id="actions-dropdown">
      <div class="dropdown-header">Actions</div>
      <button class="dropdown-item" onclick="window.location.href='ClientAdd.html'">Add Client</button>
      <button class="dropdown-item" onclick="makeClientsActive(true)">Make Active</button>
      <button class="dropdown-item" onclick="makeClientsActive(false)">Make Inactive</button>
      <button class="dropdown-item" onclick="deleteSelected()">Delete</button>
    </div>
  </div>
  <div id="pagination-bar" style="display:none;align-items:center;gap:6px;font-size:13px;color:#ccc;">
    <button onclick="goPage(-1)" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:4px 10px;cursor:pointer;border-radius:3px;">&#9664;</button>
    <span>Page <strong id="pg-current-num" style="color:#e8c000;">1</strong> of <strong id="pg-total-num" style="color:#fff;">1</strong></span>
    <button onclick="goPage(1)" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:4px 10px;cursor:pointer;border-radius:3px;">&#9654;</button>
  </div>
</div>

<!-- Filter pills -->
<div class="filter-tabs">
  <button class="ftab active" onclick="setTab(this)">Clients</button>
  <button class="ftab" onclick="setTab(this)">Former Clients</button>
  <button class="ftab" onclick="setTab(this)">Clients &amp; Former Clients</button>
</div>

<!-- Table -->
<div class="table-container">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="select-all" onchange="toggleAll(this)"/></th>
        <th>Client Name</th>
        <th>Client Since</th>
        <th>Number of Properties</th>
      </tr>
    </thead>
    <tbody id="client-tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty-msg">No clients found.</div>
</div>
<div style="height:28px;background:#130520;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sbClient = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  function toggleDropdown(e) {
    e.stopPropagation();
    document.getElementById('actions-dropdown').classList.toggle('open');
  }
  document.addEventListener('click', function() {
    document.getElementById('actions-dropdown').classList.remove('open');
  });

  var filtersOpen = false;
  function toggleFilters() {
    filtersOpen = !filtersOpen;
    document.getElementById('filters-row').style.display = filtersOpen ? '' : 'none';
    document.getElementById('filters-arrow').innerHTML = filtersOpen ? '&#9650;' : '&#9660;';
  }

  function setTab(btn) {
    document.querySelectorAll('.ftab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderTable();
  }

  var clients = [];
  var propCounts = {};
  var currentPage = 1;
  var totalCount = 0;
  var PAGE_SIZE = 1000;

  async function loadClients() {
    var { count } = await sbClient.from('Clients').select('*', { count: 'exact', head: true });
    totalCount = count || 0;
    var totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    var start = (currentPage - 1) * PAGE_SIZE;
    var end   = start + PAGE_SIZE - 1;
    var { data, error } = await sbClient.from('Clients').select('*').order('name', { ascending: true }).range(start, end);
    if (error) { console.error(error); return; }
    clients = data || [];

    var pgBar = document.getElementById('pagination-bar');
    pgBar.style.display = totalCount > PAGE_SIZE ? 'flex' : 'none';
    document.getElementById('pg-current-num').textContent = currentPage;
    document.getElementById('pg-total-num').textContent = totalPages;

    var { data: props } = await sbClient.from('Properties').select('customer_id');
    propCounts = {};
    (props || []).forEach(function(p) {
      if (p.customer_id) propCounts[p.customer_id] = (propCounts[p.customer_id] || 0) + 1;
    });

    renderTable();
  }

  function goPage(dir) {
    var totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
    loadClients();
  }

  function renderTable() {
    var searchEl = document.querySelector('.client-search');
    var search = searchEl ? searchEl.value.trim().toLowerCase() : '';
    var tbody = document.getElementById('client-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    tbody.innerHTML = '';
    var filtered = search ? clients.filter(function(c) {
      return (c.name || '').toLowerCase().includes(search) || (c.address || '').toLowerCase().includes(search);
    }) : clients;
    var pageEnd = Math.min(currentPage * PAGE_SIZE, totalCount);
    document.getElementById('results-bar').textContent = pageEnd + ' / ' + totalCount + ' clients';
    if (filtered.length === 0) { emptyMsg.style.display = ''; return; }
    emptyMsg.style.display = 'none';
    filtered.forEach(function(c) {
      var since = c.created_at ? new Date(c.created_at).toLocaleDateString() : '';
      var numProps = propCounts[c.id] || 0;
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><input type="checkbox" data-id="' + c.id + '"/></td>' +
        '<td><a class="client-link" onclick="openClient(\'' + c.id + '\')">' + (c.name || '') + '</a></td>' +
        '<td>' + since + '</td>' +
        '<td>' + numProps + '</td>';
      tr.querySelector('input[type="checkbox"]').addEventListener('change', function() {});
      tbody.appendChild(tr);
    });
  }

  function openClient(id) {
    window.location.href = 'ClientProfile.html?id=' + id;
  }

  function toggleAll(cb) {
    document.querySelectorAll('#client-tbody input[type="checkbox"]').forEach(function(c) {
      c.checked = cb.checked;
      c.dispatchEvent(new Event('change'));
    });
  }

  function getSelectedIds() {
    return Array.from(document.querySelectorAll('#client-tbody input[type="checkbox"]:checked'))
      .map(function(cb) { return cb.getAttribute('data-id'); });
  }

  function deleteSelected() {
    var ids = getSelectedIds();
    if (!ids.length) { showBanner('warning', 'Check the box next to each client you want to delete first.'); return; }
    document.getElementById('actions-dropdown').classList.remove('open');
    showDeleteConfirm(ids);
  }

  function showDeleteConfirm(ids) {
    var bar = document.getElementById('delete-confirm-bar');
    document.getElementById('delete-confirm-count').textContent = ids.length;
    bar.style.display = 'flex';
    bar.dataset.ids = JSON.stringify(ids);
  }

  async function confirmDelete() {
    var bar = document.getElementById('delete-confirm-bar');
    var ids = JSON.parse(bar.dataset.ids || '[]');
    bar.style.display = 'none';

    var CHUNK = 50;
    for (var i = 0; i < ids.length; i += CHUNK) {
      var chunk = ids.slice(i, i + CHUNK);
      var r1 = await sbClient.from('Properties').delete().in('customer_id', chunk);
      if (r1.error) { showBanner('error', 'Error deleting properties: ' + r1.error.message); return; }
    }

    for (var i = 0; i < ids.length; i += CHUNK) {
      var chunk = ids.slice(i, i + CHUNK);
      var r2 = await sbClient.from('Clients').delete().in('id', chunk);
      if (r2.error) { showBanner('error', 'Error deleting clients: ' + r2.error.message); return; }
    }

    window.location.reload();
  }

  function showBanner(type, msg) {
    var bar = document.getElementById('status-banner');
    bar.textContent = msg;
    bar.style.background = type === 'error' ? '#c0392b' : '#e07820';
    bar.style.display = 'block';
    setTimeout(function() { bar.style.display = 'none'; }, 4000);
  }

  async function makeClientsActive(active) {
    document.getElementById('actions-dropdown').classList.remove('open');
    var ids = getSelectedIds();
    if (!ids.length) { showBanner('warning', 'Check the box next to each client you want to update first.'); return; }
    var CHUNK = 50;
    for (var i = 0; i < ids.length; i += CHUNK) {
      var { error } = await sbClient.from('Clients').update({ active: active }).in('id', ids.slice(i, i + CHUNK));
      if (error) { showBanner('error', 'Update failed: ' + error.message); return; }
    }
    loadClients();
  }

  var clientSearchEl = document.querySelector('.client-search');
  if (clientSearchEl) clientSearchEl.addEventListener('input', renderTable);

  loadClients();
</script>
</body>
</html>
