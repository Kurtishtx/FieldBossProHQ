<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Billing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; font-size: 13px; color: #222; }

    .page-hdr { padding: 20px 24px 14px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
    .back-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12.5px;
      cursor: pointer;
      color: #555;
    }
    .back-btn:hover { background: #f5f5f5; }
    .page-hdr h1 { font-size: 22px; font-weight: 800; color: #111; }

    .coming-soon {
      padding: 60px 24px;
      text-align: center;
      color: #aaa;
      font-size: 15px;
    }
    .coming-soon span { font-size: 40px; display: block; margin-bottom: 16px; }
  </style>
</head>
<body>

<div class="page-hdr">
  <button class="back-btn" onclick="nav('admin')">&#8592; Back</button>
  <h1>Billing</h1>
</div>

<div class="coming-soon">
  <span>&#128179;</span>
  Invoice and charge SprayBossPro customers — coming soon.
</div>

<script>
  function nav(page) {
    if (window.parent && window.parent.loadPage) {
      window.parent.loadPage(page);
    } else {
      window.location.href = page + '.html';
    }
  }
</script>
</body>
</html>
