<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chemical Instruction Emails</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #fff; color: #222; }

    .page-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 10px;
    }
    .topbar-left h1 { font-size: 20px; font-weight: 700; color: #111; }
    .topbar-left .item-count { font-size: 12px; color: #888; margin-top: 2px; }
    .btn-add {
      background: #e07820; color: #fff; border: none;
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      border-radius: 4px; cursor: pointer; white-space: nowrap;
    }
    .btn-add:hover { background: #c96a10; }

    .toolbar {
      background: #130520; display: flex; align-items: center;
      padding: 7px 14px; gap: 6px; flex-wrap: wrap;
    }
    .dropdown { position: relative; display: inline-flex; }
    .btn-group { display: flex; }
    .btn-actions { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none;
      padding: 5px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; border-radius: 3px 0 0 3px;
    }
    .btn-actions:hover { background: #d4ae00; }
    .btn-actions-caret {
      background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15);
      padding: 5px 8px; font-size: 12px; cursor: pointer; border-radius: 0 3px 3px 0;
    }
    .btn-actions-caret:hover { background: #d4ae00; }
    .dd-menu {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
      background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 12px rgba(0,0,0,.2);
      min-width: 180px; padding: 4px 0;
    }
    .dd-menu.show { display: block; }
    .dd-menu a {
      display: block; padding: 8px 14px; color: #444;
      text-decoration: none; font-size: 13px; cursor: pointer;
    }
    .dd-menu a:hover { background: #f5f5f5; }

    .toolbar-tabs { display: flex; gap: 0; }
    .tab-btn {
      padding: 5px 14px; border: none; cursor: pointer;
      font-size: 12.5px; font-weight: 600; font-family: inherit;
      background: #555; color: #bbb;
    }
    .tab-btn:first-child { border-radius: 3px 0 0 3px; }
    .tab-btn:last-child  { border-radius: 0 3px 3px 0; }
    .tab-btn.active { background: #fff; color: #222; }
    .tab-btn:hover:not(.active) { background: #666; }

    .view-tabs { display: flex; gap: 4px; margin-left: 8px; }
    .view-tab {
      padding: 5px 14px; border: 1px solid #666; cursor: pointer;
      font-size: 12.5px; font-weight: 600; font-family: inherit;
      background: #555; color: #bbb; border-radius: 3px;
    }
    .view-tab.active { background: #fff; color: #222; border-color: #fff; }
    .view-tab:hover:not(.active) { background: #666; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px; text-align: left; font-size: 12.5px;
      font-weight: 600; color: #555; border-bottom: 1px solid #ddd;
    }
    thead th:first-child { width: 40px; text-align: center; }
    thead th.col-date { width: 140px; }
    tbody tr { border-bottom: 1px solid #eee; cursor: pointer; }
    tbody tr:hover { background: #f9f9f9; }
    tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }
    tbody td:first-child { text-align: center; }
    .item-link { color: #2272c3; text-decoration: none; font-size: 13px; }
    .item-link:hover { text-decoration: underline; }

    .empty-msg { padding: 32px; text-align: center; color: #888; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="page-topbar">
  <div class="topbar-left">
    <span class="showing-count" id="results-count"></span>
    <div class="item-count" id="item-count">0 items</div>
  </div>
  <button class="btn-add" id="add-btn" onclick="clickAdd()">Add Client Instruction Emails</button>
</div>

<div class="toolbar">
  <div class="dropdown">
    <div class="btn-group">
      <button class="btn-actions">Actions</button>
      <button class="btn-actions-caret" onclick="toggleDD(event)">&#9660;</button>
    </div>
    <div class="dd-menu" id="actions-dd">
      <a onclick="setActiveSelected(true)">Activate Selected</a>
      <a onclick="setActiveSelected(false)">Deactivate Selected</a>
      <a onclick="deleteSelected()">Delete Selected</a>
    </div>
  </div>
  <div class="toolbar-tabs">
    <button class="tab-btn active" onclick="setFilter('active',this)">Active</button>
    <button class="tab-btn" onclick="setFilter('inactive',this)">Inactive</button>
    <button class="tab-btn" onclick="setFilter('all',this)">All</button>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" onclick="setEmailType('client',this)">Client Instruction Emails</button>
    <button class="view-tab" onclick="setEmailType('recommendation',this)">Recommendation Instruction Emails</button>
    <button class="view-tab" onclick="setEmailType('upsale',this)">Upsale Instruction Emails</button>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"/></th>
      <th>Name</th>
      <th>Email Type</th>
      <th class="col-date">Date Created</th>
      <th class="col-date">Date Modified</th>
    </tr>
  </thead>
  <tbody id="main-tbody"></tbody>
</table>
<div class="empty-msg" id="empty-msg">No records to display.</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var emails = [];
  var filter = 'active';
  var emailType = 'client';

  var typeLabels = { client: 'Client', recommendation: 'Recommendation', upsale: 'Upsale' };
  var addBtnLabels = {
    client: 'Add Client Instruction Emails',
    recommendation: 'Add Recommendation Instruction Emails',
    upsale: 'Add Upsale Instruction Emails'
  };

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function toggleDD(e) {
    e.stopPropagation();
    document.getElementById('actions-dd').classList.toggle('show');
  }
  document.addEventListener('click', function(){ document.getElementById('actions-dd').classList.remove('show'); });

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.toolbar-tabs .tab-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    render();
  }

  function setEmailType(t, btn) {
    emailType = t;
    document.querySelectorAll('.view-tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('add-btn').textContent = addBtnLabels[t];
    render();
  }

  function clickAdd() {
    window.location.href = 'ChemicalEmailsAdd.html?type=' + emailType;
  }

  function toggleAll(checked) {
    document.querySelectorAll('#main-tbody input[type="checkbox"]').forEach(function(cb){ cb.checked = checked; });
  }

  function getSelected() {
    var ids = [];
    document.querySelectorAll('#main-tbody input[type="checkbox"]:checked').forEach(function(cb){ ids.push(cb.dataset.id); });
    return ids;
  }

  async function deleteSelected() {
    var ids = getSelected();
    if (!ids.length) return;
    if (!confirm('Delete ' + ids.length + ' email(s)?')) return;
    var { error } = await sb.from('chemical_emails').delete().in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    emails = emails.filter(function(e){ return !ids.includes(e.id); });
    render();
  }

  async function setActiveSelected(active) {
    var ids = getSelected();
    if (!ids.length) return;
    var { error } = await sb.from('chemical_emails').update({ active: active }).in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    emails.forEach(function(e){ if (ids.includes(e.id)) e.active = active; });
    render();
  }

  function render() {
    var tbody = document.getElementById('main-tbody');
    var empty = document.getElementById('empty-msg');
    var filtered = emails.filter(function(e){
      if (e.emailType !== emailType) return false;
      if (filter === 'active')   return e.active !== false;
      if (filter === 'inactive') return e.active === false;
      return true;
    });
    tbody.innerHTML = '';
    document.getElementById('item-count').textContent = filtered.length + ' item' + (filtered.length === 1 ? '' : 's');
    if (!filtered.length) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    filtered.forEach(function(e) {
      var tr = document.createElement('tr');
      var created  = e.created_at ? new Date(e.created_at).toLocaleDateString() : '';
      tr.innerHTML =
        '<td><input type="checkbox" data-id="' + e.id + '" onclick="event.stopPropagation()"/></td>' +
        '<td><span class="item-link">' + esc(e.name) + '</span></td>' +
        '<td>' + esc(typeLabels[e.subject] || e.subject || '') + '</td>' +
        '<td>' + created + '</td>' +
        '<td>' + created + '</td>';
      tr.addEventListener('click', function(ev){
        if (ev.target.type === 'checkbox') return;
        window.location.href = 'ChemicalEmailsAdd.html?id=' + e.id;
      });
      tbody.appendChild(tr);
    });
  }

  async function loadEmails() {
    var { data, error } = await sb.from('chemical_emails').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    emails = data || [];
    render();
  }

  loadEmails();
</script>
</body>
</html>
