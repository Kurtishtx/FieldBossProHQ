<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payments</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #d4cfe0; color: #222; }

    /* -- Page header -- */
    .page-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 10px; background:#130520; margin:8px 16px; border-radius:10px; }
    .showing-count { font-size:13px; color:rgba(255,255,255,.6); }
    .btn-orange-filled {
      background: #130520; color: #fff; border: 2px solid #e07820;
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      border-radius: 6px; cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .btn-orange-filled:hover { background: #1e0a35; }

    /* -- Filter pills -- */
    .tabs-bar {
      display: flex; gap: 4px; padding: 8px 20px;
      flex-wrap: wrap; background: #1a0a30; margin: 0 16px; border-radius: 8px;
    }
    .tab-btn {
      padding: 5px 16px; border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06);
      font-size: 13px; cursor: pointer; border-radius: 20px;
      color: rgba(255,255,255,.6); font-family: inherit; font-weight: 400;
      white-space: nowrap;
    }
    .tab-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
    .tab-btn.active { background: #e07820; color: #fff; border-color: #e07820; font-weight: 700; }

    /* -- Toolbar -- */
    .toolbar { background: #130520; display:flex; align-items:center; padding:7px 14px; gap:6px; justify-content:space-between; overflow:visible; margin:2px 16px 0; border-radius:8px 8px 0 0; }
    .toolbar-left { display:flex; align-items:center; gap:6px; position:relative; overflow:visible; }
    .btn-green-main { background:#e8c000; color:#000; border:2px solid #fff; border-right:none; border-radius:3px 0 0 3px; padding:5px 14px; font-size:13px; font-family:inherit; font-weight:700; cursor:pointer; }
    .btn-green-main:hover { background:#d4ae00; }
    .btn-green-caret { background:#e8c000; color:#000; border:2px solid #fff; border-left:1px solid rgba(0,0,0,.15); border-radius:0 3px 3px 0; padding:5px 9px; font-size:11px; cursor:pointer; }
    .btn-green-caret:hover { background:#d4ae00; }
    .refresh-btn { background:#555; color:#ccc; border:none; border-radius:3px; padding:5px 8px; font-size:15px; cursor:pointer; line-height:1; }
    .refresh-btn:hover { background:#666; color:#fff; }

    /* Actions dropdown */
    .actions-dropdown { display:none; position:fixed; background:#fff; border:1px solid #ccc; border-radius:4px; box-shadow:0 4px 16px rgba(0,0,0,.3); z-index:9999; min-width:200px; padding:4px 0; }
    .actions-dropdown.open { display:block; }
    .dropdown-header { font-size:13px; font-weight:700; color:#222; padding:7px 16px 5px; border-bottom:1px solid #eee; margin-bottom:3px; }
    .dropdown-item { display:block; width:100%; background:none; border:none; text-align:left; padding:7px 16px; font-size:13px; font-family:inherit; color:#333; cursor:pointer; }
    .dropdown-item:hover { background:#f5f5f5; }

    /* Pagination */
    .pagination-area { display:flex; align-items:center; gap:5px; font-size:13px; color:#ccc; }
    .pagination-area input { width:46px; padding:3px 6px; border:1px solid rgba(255,255,255,.25); border-radius:3px; background:rgba(255,255,255,.12); color:#fff; font-size:13px; text-align:center; }
    .pg-btn { background:rgba(255,255,255,.12); color:rgba(255,255,255,.7); border:none; padding:4px 7px; border-radius:3px; cursor:pointer; font-size:12px; }
    .pg-btn:hover { background:rgba(255,255,255,.2); }
    .pg-current { background:#f5c800; color:#111; border:none; padding:4px 9px; border-radius:3px; font-size:12px; font-weight:700; }

    /* -- Table -- */
    .table-container { background:#fff; margin:0 16px; }
    table { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
    thead th { background:#e8e4f0; border-bottom:2px solid #c5bfd8; padding:12px 16px; text-align:left; font-size:12px; font-weight:700; color:#3a2a55; white-space:nowrap; cursor:pointer; user-select:none; text-transform:uppercase; letter-spacing:.4px; }
    thead th:first-child { text-align:center; cursor:default; }
    thead th .sort-icon { color:#bbb; font-size:10px; margin-left:3px; }
    thead th .sort-asc  { color:#e07820; font-size:10px; margin-left:3px; }
    tbody tr { border-bottom:1px solid #eee; }
    tbody tr:hover { background:#f5f3fa; }
    tbody td { padding:12px 16px; color:#333; vertical-align:middle; }
    tbody td:first-child { text-align:center; }

    input[type="checkbox"] { width:14px; height:14px; cursor:pointer; accent-color:#888888; }

    .client-addr { font-size:12px; color:#777; margin-top:2px; }
    .money { text-align:right; }

    .empty-msg { text-align:center; color:#aaa; padding:60px 20px; font-size:14px; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<!-- Page header -->
<div class="page-header">
  <span class="showing-count" id="showing-count">(Showing 0 of 0)</span>
  <button class="btn-orange-filled">Add Payment</button>
</div>

<!-- Tabs -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="setTab(this,'last30')">Last 30 Days</button>
  <button class="tab-btn" onclick="setTab(this,'all')">All Payments</button>
  <button class="tab-btn" onclick="setTab(this,'deleted')">Deleted</button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-left">
    <div style="display:flex;position:relative;">
      <button class="btn-green-main">Actions</button>
      <button class="btn-green-caret" onclick="toggleDropdown(event)">&#9660;</button>
    </div>
    <button class="refresh-btn" title="Refresh" onclick="loadPayments()">&#8635;</button>
  </div>
  <div class="pagination-area">
    Page Size: <input type="text" value="100" id="page-size" style="width:48px;text-align:center;"/>
    <button class="pg-btn">|&lt;</button>
    <button class="pg-btn">&lt;</button>
    <button class="pg-current">1</button>
    <button class="pg-btn">&gt;</button>
    <button class="pg-btn">&gt;|</button>
  </div>
</div>

<!-- Table -->
<div class="table-container">
  <table>
    <thead>
      <tr>
        <th style="width:4%;"><input type="checkbox" id="select-all" onchange="toggleAll(this)"/></th>
        <th style="width:12%;">Date <span class="sort-asc">&#8593;</span></th>
        <th style="width:24%;">Client <span class="sort-icon">&#8597;</span></th>
        <th style="width:12%;text-align:right;">Amount <span class="sort-icon">&#8597;</span></th>
        <th style="width:12%;text-align:right;">Unused <span class="sort-icon">&#8597;</span></th>
        <th style="width:12%;text-align:right;">Refunded <span class="sort-icon">&#8597;</span></th>
        <th style="width:12%;">Reference # <span class="sort-icon">&#8597;</span></th>
        <th style="width:12%;">Method <span class="sort-icon">&#8597;</span></th>
      </tr>
    </thead>
    <thead>
      <tr style="background:#1a0828;">
        <td colspan="3" style="background:#1a0828;padding:10px 16px;"></td>
        <td id="total-amount"    style="color:#fff;font-weight:700;padding:10px 16px;background:#1a0828;text-align:right;">$0.00</td>
        <td id="total-unused"   style="color:#fff;font-weight:700;padding:10px 16px;background:#1a0828;text-align:right;">$0.00</td>
        <td id="total-refunded" style="color:#fff;font-weight:700;padding:10px 16px;background:#1a0828;text-align:right;">$0.00</td>
        <td colspan="2" style="background:#1a0828;padding:10px 16px;"></td>
      </tr>
    </thead>
    <tbody id="payment-tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty-msg">No payments found.</div>
</div>
<div style="height:28px; background:#130520; margin:0 16px 16px; border-radius:0 0 8px 8px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  /* -- Dropdown (body-level, fixed) -- */
  function toggleDropdown(e) {
    e.stopPropagation();
    var dd = document.getElementById('actions-dropdown');
    if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }
    var group = e.currentTarget.closest('div');
    var rect  = group.getBoundingClientRect();
    dd.style.top  = (rect.bottom + 4) + 'px';
    dd.style.left = rect.left + 'px';
    dd.classList.add('open');
  }
  document.addEventListener('click', function() {
    document.getElementById('actions-dropdown').classList.remove('open');
  });

  /* -- Tabs -- */
  var currentTab = 'last30';
  function setTab(btn, tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentTab = tab;
    renderTable();
  }

  function daysAgo(n) {
    var d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString().split('T')[0];
  }

  /* -- Data -- */
  var payments = [];

  async function loadPayments() {
    var { data, error } = await sb.from('Payments').select('*').order('date', { ascending: false });
    if (error) { console.error(error); return; }
    payments = data || [];
    renderTable();
  }

  /* -- Helpers -- */
  function fmt(v) { return '$' + (parseFloat(v) || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

  function updateTotals(rows) {
    var amt = 0, unused = 0, refunded = 0;
    rows.forEach(function(p) {
      amt      += parseFloat(p.amount)       || 0;
      unused   += parseFloat(p.unused_amt)   || 0;
      refunded += parseFloat(p.refunded_amt) || 0;
    });
    document.getElementById('total-amount').textContent    = fmt(amt);
    document.getElementById('total-unused').textContent    = fmt(unused);
    document.getElementById('total-refunded').textContent  = fmt(refunded);
  }

  /* -- Render -- */
  function renderTable() {
    var tbody    = document.getElementById('payment-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    tbody.innerHTML = '';

    var filtered = payments.filter(function(p) {
      if (currentTab === 'deleted') return !!p.deleted;
      if (currentTab === 'last30')  return !p.deleted && p.date && p.date >= daysAgo(30);
      return !p.deleted;
    });

    document.getElementById('showing-count').textContent =
      '(Showing ' + filtered.length + ' of ' + payments.length + ')';

    updateTotals(filtered);

    if (filtered.length === 0) { emptyMsg.style.display = ''; return; }
    emptyMsg.style.display = 'none';

    filtered.forEach(function(p) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><input type="checkbox" class="row-cb" data-id="' + p.id + '"/></td>' +
        '<td>' + (p.date || '') + '</td>' +
        '<td>' +
          '<div>' + (p.client_name || '') + '</div>' +
          '<div class="client-addr">' + (p.address || '') + '</div>' +
        '</td>' +
        '<td class="money">' + fmt(p.amount) + '</td>' +
        '<td class="money">' + fmt(p.unused_amt) + '</td>' +
        '<td class="money">' + fmt(p.refunded_amt) + '</td>' +
        '<td>' + (p.reference_num || '') + '</td>' +
        '<td>' + (p.payment_method || '') + '</td>';
      tbody.appendChild(tr);
    });
  }

  function toggleAll(cb) {
    document.querySelectorAll('#payment-tbody input[type="checkbox"]')
      .forEach(function(c) { c.checked = cb.checked; });
  }

  function getSelectedIds() {
    return Array.from(document.querySelectorAll('#payment-tbody input[type="checkbox"].row-cb:checked'))
      .map(function(cb) { return cb.getAttribute('data-id'); });
  }

  async function deleteSelectedPayments() {
    document.getElementById('actions-dropdown').classList.remove('open');
    var ids = getSelectedIds();
    if (!ids.length) { alert('Check the box next to each payment to delete first.'); return; }
    if (!confirm('Delete ' + ids.length + ' payment(s)?')) return;
    var { error } = await sb.from('Payments').update({ deleted: true }).in('id', ids);
    if (error) { alert('Delete failed: ' + error.message); return; }
    loadPayments();
  }

  function exportPayments() {
    document.getElementById('actions-dropdown').classList.remove('open');
    var rows = [['Date','Client','Address','Amount','Unused Amt','Refunded Amt','Reference #','Payment Method']];
    payments.forEach(function(p) {
      rows.push([p.date||'', p.client_name||'', p.address||'',
        p.amount||0, p.unused_amt||0, p.refunded_amt||0,
        p.reference_num||'', p.payment_method||'']);
    });
    var csv = rows.map(function(r) {
      return r.map(function(v) { return '"' + String(v).replace(/"/g,'""') + '"'; }).join(',');
    }).join('\n');
    var a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'payments.csv';
    a.click();
  }

  loadPayments();
</script>

<!-- Actions dropdown at body level to avoid clipping -->
<div class="actions-dropdown" id="actions-dropdown" onclick="event.stopPropagation()">
  <div class="dropdown-header">Actions</div>
  <button class="dropdown-item" onclick="alert('Add Payment coming soon.')">Add Payment</button>
  <button class="dropdown-item" onclick="deleteSelectedPayments()">Delete</button>
  <button class="dropdown-item" onclick="exportPayments()">Export</button>
</div>
</body>
</html>
