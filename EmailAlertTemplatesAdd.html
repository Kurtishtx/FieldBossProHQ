<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Alert Template</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; font-size: 13px; color: #222; }

    .dialog { max-width: 820px; margin: 30px auto; background: #fff; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
    .dialog-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .dialog-header h1 { font-size: 20px; font-weight: 800; color: #111; }
    .close-btn { background: none; border: 1px solid #bbb; padding: 3px 9px; font-size: 13px; cursor: pointer; color: #555; border-radius: 3px; }
    .close-btn:hover { background: #f0f0f0; }

    .dialog-body { display: flex; gap: 0; }

    /* Left — edit form */
    .form-col { flex: 1; padding: 24px; border-right: 1px solid #eee; }
    .field-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .field-input { width: 100%; border: 1px solid #ccc; border-radius: 4px; padding: 9px 12px; font-size: 13px; font-family: inherit; outline: none; color: #111; }
    .field-input:focus { border-color: #5b2d8e; }
    .field-group { margin-bottom: 18px; }
    textarea.field-input { min-height: 140px; resize: vertical; line-height: 1.6; }
    .err-msg { color: #c0392b; font-size: 12px; margin-top: 6px; min-height: 16px; }

    /* Right — preview */
    .preview-col { width: 340px; flex-shrink: 0; padding: 24px; background: #fafafa; }
    .preview-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
    .email-preview {
      background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 24px 20px;
      font-family: Arial, sans-serif; font-size: 13.5px; color: #222; line-height: 1.7;
    }
    .ep-logo { text-align: center; margin-bottom: 10px; font-size: 28px; }
    .ep-company { text-align: center; font-size: 16px; font-weight: 800; color: #130520; margin-bottom: 18px; }
    .ep-body { color: #333; margin-bottom: 22px; white-space: pre-wrap; }
    .ep-thanks { color: #555; }
    .ep-footer { margin-top: 6px; font-weight: 700; color: #130520; }

    .dialog-footer { padding: 16px 24px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; }
    .btn-save { background: #e07820; color: #fff; border: none; padding: 9px 28px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save:hover { background: #c96a10; }
    .btn-save:disabled { background: #e8a870; cursor: default; }
    .btn-cancel { color: #555; font-size: 13px; cursor: pointer; margin-left: 4px; }
    .btn-cancel:hover { text-decoration: underline; }
    .btn-delete { margin-left: auto; background: none; border: 1px solid #c0392b; color: #c0392b; padding: 7px 16px; font-size: 13px; border-radius: 4px; cursor: pointer; }
    .btn-delete:hover { background: #fdecea; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="dialog">
  <div class="dialog-header">
    <h1 id="page-title">Add Email Alert Template</h1>
    <button class="close-btn" onclick="cancel()">&#10005;</button>
  </div>

  <div class="dialog-body">

    <!-- Edit form -->
    <div class="form-col">
      <div class="field-group">
        <div class="field-label">Template Name</div>
        <input type="text" id="tpl-name" class="field-input" placeholder="e.g. Service Reminder" oninput="updatePreview()"/>
      </div>
      <div class="field-group">
        <div class="field-label">Alert Message</div>
        <textarea id="tpl-body" class="field-input" placeholder="Type the message body that will appear in the email…" oninput="updatePreview()"></textarea>
      </div>
      <div class="err-msg" id="err-msg"></div>
    </div>

    <!-- Preview -->
    <div class="preview-col">
      <div class="preview-label">Preview</div>
      <div class="email-preview">
        <div class="ep-logo">🌿</div>
        <div class="ep-company" id="prev-company">[Company Name]</div>
        <div class="ep-body" id="prev-body">Your alert message will appear here.</div>
        <div class="ep-thanks">Thank you,</div>
        <div class="ep-footer" id="prev-footer">[Company Name]</div>
      </div>
    </div>

  </div>

  <div class="dialog-footer">
    <button class="btn-save" id="save-btn" onclick="save()">Save Template</button>
    <span class="btn-cancel" onclick="cancel()">Cancel</span>
    <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteTemplate()">Delete</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var sb = supabase.createClient(
    'https://knjdbgroiyhvqwrpqzcx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g',
    { auth: { autoRefreshToken: true, detectSessionInUrl: false } }
  );

  var editId = null;
  var companyName = '[Company Name]';

  function updatePreview() {
    var body = document.getElementById('tpl-body').value || 'Your alert message will appear here.';
    document.getElementById('prev-body').textContent = body;
  }

  async function init() {
    // Load company name for preview
    var { data: sess } = await sb.auth.getSession();
    var uid = sess?.session?.user?.id;
    if (uid) {
      var { data: co } = await sb.from('company_info').select('company_name').eq('user_id', uid).single();
      if (co?.company_name) {
        companyName = co.company_name;
        document.getElementById('prev-company').textContent = companyName;
        document.getElementById('prev-footer').textContent = companyName;
      }
    }

    var params = new URLSearchParams(window.location.search);
    editId = params.get('id') || null;
    if (editId) {
      document.getElementById('page-title').textContent = 'Edit Email Alert Template';
      document.getElementById('save-btn').textContent   = 'Save Changes';
      document.getElementById('btn-delete').style.display = '';
      var { data } = await sb.from('email_alert_templates').select('*').eq('id', editId).single();
      if (data) {
        document.getElementById('tpl-name').value = data.name || '';
        document.getElementById('tpl-body').value = data.body || '';
        updatePreview();
      }
    }
  }

  async function save() {
    var btn = document.getElementById('save-btn');
    var errEl = document.getElementById('err-msg');
    errEl.textContent = '';

    var name = document.getElementById('tpl-name').value.trim();
    var body = document.getElementById('tpl-body').value.trim();
    if (!name) { errEl.textContent = 'Please enter a template name.'; return; }
    if (!body) { errEl.textContent = 'Please enter an alert message.'; return; }

    btn.disabled = true; btn.textContent = 'Saving…';

    var { data: sess } = await sb.auth.getSession();
    var uid = sess?.session?.user?.id;
    if (!uid) { errEl.textContent = 'Not logged in.'; btn.disabled = false; btn.textContent = editId ? 'Save Changes' : 'Save Template'; return; }

    var row = { user_id: uid, name: name, body: body };
    var error;
    if (editId) {
      var res = await sb.from('email_alert_templates').update(row).eq('id', editId);
      error = res.error;
    } else {
      var res = await sb.from('email_alert_templates').insert(row);
      error = res.error;
    }

    btn.disabled = false;
    btn.textContent = editId ? 'Save Changes' : 'Save Template';

    if (error) { errEl.textContent = 'Error: ' + error.message; return; }
    cancel();
  }

  async function deleteTemplate() {
    var name = document.getElementById('tpl-name').value;
    if (!confirm('Delete template "' + name + '"?')) return;
    var { error } = await sb.from('email_alert_templates').delete().eq('id', editId);
    if (error) { alert('Error: ' + error.message); return; }
    cancel();
  }

  function cancel() {
    if (window.parent && window.parent.loadPage) window.parent.loadPage('emailalerttemplateslist');
    else window.location.href = 'EmailAlertTemplatesList.html';
  }

  init();
</script>
</body>
</html>
