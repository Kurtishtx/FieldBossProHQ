  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; font-size: 13px; color: #222; }

    .topbar {
      background: #0d1b2a; color: #fff;
      display: flex; align-items: center; gap: 14px;
      padding: 0 20px; height: 52px;
      position: sticky; top: 0; z-index: 100;
    }
    .btn-back { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); color: #fff; border-radius: 5px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
    .btn-back:hover { background: rgba(255,255,255,.2); }
    .topbar-title { font-size: 16px; font-weight: 700; }

    #picker-step { padding: 28px 24px; }
    .picker-hdr { margin-bottom: 22px; }
    .picker-hdr h2 { font-size: 20px; font-weight: 800; color: #111; margin-bottom: 4px; }
    .picker-hdr p  { font-size: 13px; color: #777; }

    .palette-section { margin-bottom: 30px; }
    .palette-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; color: #555;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 12px;
    }
    .palette-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

    .template-grid { display: flex; gap: 20px; flex-wrap: wrap; }

    .tmpl-card {
      flex: 0 0 220px; border: 2px solid #ddd; border-radius: 10px;
      overflow: hidden; cursor: pointer; background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    .tmpl-card:hover { border-color: #5b2d8e; box-shadow: 0 4px 16px rgba(91,45,142,.2); }
    .tmpl-card.active { border-color: #5b2d8e; box-shadow: 0 4px 16px rgba(91,45,142,.25); }

    .tmpl-preview { height: 280px; overflow: hidden; pointer-events: none; position: relative; }
    .tmpl-scale { transform-origin: top left; transform: scale(.55); width: 182%; }

    .tmpl-label { padding: 10px 14px; font-size: 13px; font-weight: 700; color: #333; border-top: 1px solid #eee; background: #fafafa; text-align: center; }

    #preview-step { display: none; }

    .preview-header {
      background: #fff; border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .preview-header h2 { font-size: 20px; font-weight: 800; color: #111; }
    .preview-header p  { font-size: 12.5px; color: #777; margin-top: 3px; }
    .btn-change { background: #fff; border: 1.5px solid #333; color: #222; border-radius: 5px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-change:hover { background: #f5f5f5; }

    .info-bar { background: #fffbea; border: 1px solid #f5e48e; border-radius: 5px; margin: 14px 24px 0; padding: 9px 14px; font-size: 12.5px; color: #7a6000; }

    .preview-wrap { margin: 16px 24px 30px; }
    .preview-outer { max-width: 600px; margin: 0 auto; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.12); }

    .save-row { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin: 0 24px 20px; }
    .btn-save { background: #e07820; color: #fff; border: none; border-radius: 4px; padding: 10px 28px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-save:hover { background: #c96a10; }
    .save-msg { font-size: 13px; color: #2e7d32; font-weight: 600; display: none; }
    .save-msg.show { display: inline; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="topbar">
  <button class="btn-back" onclick="goBack()">&#8592; Back</button>
  <span class="topbar-title">Alert Email Template</span>
</div>

<div id="picker-step">
  <div class="picker-hdr">
    <h2>Choose an Alert Email Layout</h2>
    <p>Select the design for your alert email</p>
  </div>
  <div id="picker-groups"></div>
</div>

<div id="preview-step">
  <div class="preview-header">
    <div>
      <h2>Your Alert Email Template</h2>
      <p>Showing with your saved business info filled in</p>
    </div>
    <button class="btn-change" onclick="changeTemplate()">&#8592; Change Template</button>
  </div>
  <div class="info-bar">&#9432; Client and alert fields show sample data — real values fill in when an actual alert is sent.</div>
  <div class="preview-wrap">
    <div class="preview-outer" id="preview-outer"></div>
  </div>
  <div class="save-row">
    <span class="save-msg" id="save-msg">&#10003; Saved!</span>
    <button class="btn-save" onclick="saveStyle()">Save Template</button>
  </div>
</div>

      : 'border-top:1px solid ' + border + ';';
    return '<div style="background:' + c.fbg + ';' + bdr + 'padding:18px 30px;text-align:center;">' +
      '<div style="font-size:13px;font-weight:700;color:' + c.ftx + ';">Thank you for your business!</div>' +
    '</div>';
  }

  function miniHtml(styleId) {
    var li  = styleToLayout(styleId);
    var pi  = styleToPalette(styleId);
    var pal = PALETTES[pi];
    var layout = LAYOUTS[li];
    var c = pal[layout];

    if (layout === 'simple') {
      return '<div style="background:#fff;font-family:Arial,sans-serif;">' +
        '<div style="text-align:center;padding:28px 20px 6px;font-size:14px;color:#aaa;font-style:italic;">[logo]</div>' +
        '<div style="text-align:center;font-size:14px;font-weight:700;color:' + c.co + ';padding-bottom:18px;font-style:italic;">[companyname]</div>' +
        '<div style="height:2px;background:' + c.div + ';margin:0 30px 20px;"></div>' +
        '<div style="padding:0 30px 20px;font-size:14px;color:#aaa;line-height:1.7;font-style:italic;">[alert text]</div>' +
        tyDiv(c, c.fbd, false) +
      '</div>';
    }
    if (layout === 'darkpro') {
      return '<div style="background:' + c.wbg + ';font-family:Arial,sans-serif;">' +
        '<div style="background:' + c.hbg + ';padding:26px 20px 18px;text-align:center;border-bottom:2px solid ' + c.hacc + ';">' +
          '<div style="font-size:14px;color:#aaa;margin-bottom:8px;font-style:italic;">[logo]</div>' +
          '<div style="font-size:14px;font-weight:700;color:' + c.co + ';font-style:italic;">[companyname]</div>' +
        '</div>' +
        '<div style="padding:26px 30px;font-size:14px;color:#aaa;line-height:1.7;font-style:italic;">[alert text]</div>' +
        tyDiv(c, c.fbd, true) +
      '</div>';
    }
    if (layout === 'brand') {
      return '<div style="background:#fff;font-family:Arial,sans-serif;">' +
        '<div style="background:linear-gradient(135deg,' + c.hg1 + ',' + c.hg2 + ');padding:28px 20px 20px;text-align:center;">' +
          '<div style="font-size:14px;color:rgba(255,255,255,.6);margin-bottom:8px;font-style:italic;">[logo]</div>' +
          '<div style="font-size:14px;font-weight:700;color:#fff;font-style:italic;">[companyname]</div>' +
        '</div>' +
        '<div style="padding:28px 30px 20px;font-size:14px;color:#aaa;line-height:1.7;font-style:italic;">[alert text]</div>' +
        tyDiv(c, c.fbd, false) +
      '</div>';
    }
    if (layout === 'namebanner') {
      return '<div style="background:#fff;font-family:Arial,sans-serif;">' +
        '<div style="background:' + c.hbg + ';padding:32px 20px;text-align:center;">' +
          '<div style="font-size:20px;font-weight:800;color:' + c.co + ';letter-spacing:.02em;font-style:italic;">[companyname — full width]</div>' +
        '</div>' +
        '<div style="padding:26px 30px;font-size:14px;color:#aaa;line-height:1.7;font-style:italic;">[alert text]</div>' +
        tyDiv(c, c.fbd, false) +
      '</div>';
    }
    // banner
    return '<div style="background:' + c.wbg + ';font-family:Arial,sans-serif;">' +
      '<div style="background:' + c.hbg + ';padding:22px 16px;text-align:center;border-bottom:2px solid ' + c.hacc + ';">' +
        '<div style="font-size:14px;color:#aaa;font-style:italic;">[logo — full width]</div>' +
      '</div>' +
      '<div style="padding:26px 30px;font-size:14px;color:#aaa;line-height:1.7;font-style:italic;">[alert text]</div>' +
      tyDiv(c, c.fbd, true) +
    '</div>';
  }

  function buildGrid() {
    var container = document.getElementById('picker-groups');
    for (var pi = 0; pi < PALETTES.length; pi++) {
      var pal = PALETTES[pi];
      var section = document.createElement('div');
      section.className = 'palette-section';
      var labelEl = document.createElement('div');
      labelEl.className = 'palette-label';
      labelEl.innerHTML = '<span class="palette-dot" style="background:' + pal.dot + ';"></span>' + pal.label;
      section.appendChild(labelEl);
      var grid = document.createElement('div');
      grid.className = 'template-grid';
      for (var li = 0; li < LAYOUTS.length; li++) {
        var styleId = pi >= 9 ? (46 + (pi - 9) * 5 + li) : li < 4 ? (pi * 4 + li + 1) : (37 + pi);
        var card = document.createElement('div');
        card.className = 'tmpl-card';
        card.setAttribute('data-style', String(styleId));
        card.onclick = (function(id) { return function() { selectStyle(id); }; })(styleId);
        card.innerHTML =
          '<div class="tmpl-preview"><div class="tmpl-scale">' + miniHtml(styleId) + '</div></div>' +
          '<div class="tmpl-label">' + LAYOUT_NAMES[li] + '</div>';
        grid.appendChild(card);
      }
      section.appendChild(grid);
      container.appendChild(section);
    }
  }

  var chosenStyle = 0;
  var info = {};

  function goBack() {
    if (window.parent && window.parent.loadPage) window.parent.loadPage('emailalerttemplateslist');
    else window.location.href = 'EmailAlertTemplatesList.html';
  }

  function selectStyle(n) {
    chosenStyle = n;
    document.getElementById('picker-step').style.display = 'none';
    document.getElementById('preview-step').style.display = 'block';
    renderPreview();
  }

  function changeTemplate() {
    document.getElementById('preview-step').style.display = 'none';
    document.getElementById('picker-step').style.display = 'block';
  }

  function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function renderPreview() {
    var li     = styleToLayout(chosenStyle);
    var pi     = styleToPalette(chosenStyle);
    var pal    = PALETTES[pi];
    var layout = LAYOUTS[li];
    var c      = pal[layout];

    var co  = info.company_name  ? esc(info.company_name)  : '<span style="color:#aaa;font-style:italic;">[companyname]</span>';
    var msg = info.alert_message ? esc(info.alert_message) : '<span style="color:#aaa;font-style:italic;">[alert text]</span>';

    var logoSm = '';
    var logoLg = '';
    if (info.company_logo) {
      logoSm = '<img src="' + esc(info.company_logo) + '" style="max-height:70px;max-width:200px;object-fit:contain;display:block;margin:0 auto;"/>';
      logoLg = '<img src="' + esc(info.company_logo) + '" style="max-height:130px;max-width:90%;width:auto;object-fit:contain;display:block;margin:0 auto;"/>';
    } else {
      logoSm = '<span style="color:#aaa;font-style:italic;font-size:14px;">[your logo fills header here]</span>';
      logoLg = '<span style="color:#aaa;font-style:italic;font-size:16px;">[your logo fills header here]</span>';
    }

    var tyFull = '';
    if (layout === 'simple' || layout === 'brand' || layout === 'namebanner') {
      tyFull = '<div style="background:' + c.fbg + ';border-top:1px solid ' + c.fbd + ';padding:22px 40px;text-align:center;">' +
        '<div style="font-size:14px;font-weight:700;color:' + c.ftx + ';">Thank you for your business!</div>' +
      '</div>';
    } else {
      tyFull = '<div style="background:' + c.fbg + ';border-top:2px solid ' + c.fbd + ';padding:22px 40px;text-align:center;">' +
        '<div style="font-size:14px;font-weight:700;color:' + c.ftx + ';">Thank you for your business!</div>' +
      '</div>';
    }

    var html = '';
    if (layout === 'namebanner') {
      html =
        '<div style="background:#fff;font-family:Arial,sans-serif;">' +
          '<div style="background:' + c.hbg + ';padding:36px 40px;text-align:center;">' +
            '<div style="font-size:28px;font-weight:800;color:' + c.co + ';letter-spacing:.01em;">' + co + '</div>' +
          '</div>' +
          '<div style="padding:28px 40px;font-size:15px;color:#444;line-height:1.8;white-space:pre-wrap;">' + msg + '</div>' +
          tyFull +
        '</div>';
    } else if (layout === 'simple') {
      html =
        '<div style="background:#fff;font-family:Arial,sans-serif;">' +
          '<div style="text-align:center;padding:32px 20px 8px;">' + logoSm + '</div>' +
          '<div style="text-align:center;font-size:20px;font-weight:700;color:' + c.co + ';padding-bottom:20px;">' + co + '</div>' +
          '<div style="height:2px;background:' + c.div + ';margin:0 40px 24px;"></div>' +
          '<div style="padding:0 40px 28px;font-size:15px;color:#444;line-height:1.8;white-space:pre-wrap;">' + msg + '</div>' +
          tyFull +
        '</div>';
    } else if (layout === 'darkpro') {
      html =
        '<div style="background:' + c.wbg + ';font-family:Arial,sans-serif;">' +
          '<div style="background:' + c.hbg + ';padding:30px 20px 22px;text-align:center;border-bottom:2px solid ' + c.hacc + ';">' +
            '<div style="margin-bottom:10px;">' + logoSm + '</div>' +
            '<div style="font-size:22px;font-weight:700;color:' + c.co + ';">' + co + '</div>' +
          '</div>' +
          '<div style="padding:28px 40px;font-size:15px;color:#ddd;line-height:1.8;white-space:pre-wrap;">' + msg + '</div>' +
          tyFull +
        '</div>';
    } else if (layout === 'brand') {
      html =
        '<div style="background:#fff;font-family:Arial,sans-serif;">' +
          '<div style="background:linear-gradient(135deg,' + c.hg1 + ',' + c.hg2 + ');padding:32px 20px 24px;text-align:center;">' +
            '<div style="margin-bottom:10px;">' + logoSm + '</div>' +
            '<div style="font-size:22px;font-weight:700;color:#fff;">' + co + '</div>' +
          '</div>' +
          '<div style="padding:30px 40px 24px;font-size:15px;color:#333;line-height:1.8;white-space:pre-wrap;">' + msg + '</div>' +
          tyFull +
        '</div>';
    } else {
      html =
        '<div style="background:' + c.wbg + ';font-family:Arial,sans-serif;">' +
          '<div style="background:' + c.hbg + ';padding:24px 20px;text-align:center;border-bottom:2px solid ' + c.hacc + ';">' +
            logoLg +
          '</div>' +
          '<div style="padding:28px 40px;font-size:15px;color:#ddd;line-height:1.8;white-space:pre-wrap;">' + msg + '</div>' +
          tyFull +
        '</div>';
    }
    document.getElementById('preview-outer').innerHTML = html;
  }

  async function saveStyle() {
    var { data: sess } = await sb.auth.getSession();
    var uid = sess && sess.session ? sess.session.user.id : null;
    if (!uid) return;
    var { error } = await sb.from('alert_email_settings').upsert({ user_id: uid, template_style: chosenStyle }, { onConflict: 'user_id' });
    if (error) { alert('Error saving: ' + error.message); return; }
    var el = document.getElementById('save-msg');
    el.classList.add('show');
    setTimeout(function() {
      el.classList.remove('show');
      if (window.parent && window.parent.loadPage) window.parent.loadPage('emailalerttemplateslist');
      else window.history.back();
    }, 1500);
  }

  async function init() {
    buildGrid();
    var { data: sess } = await sb.auth.getSession();
    var uid = sess && sess.session ? sess.session.user.id : null;
    if (!uid) return;

    var { data } = await sb.from('alert_email_settings').select('*').eq('user_id', uid).single();
    if (data) {
      info = data;
      if (data.template_style) {
        chosenStyle = data.template_style;
        // highlight selected card
        var allCards = document.querySelectorAll('.tmpl-card');
        allCards.forEach(function(card) {
          if (parseInt(card.getAttribute('data-style')) === chosenStyle) card.classList.add('active');
        });
        document.getElementById('picker-step').style.display = 'none';
        document.getElementById('preview-step').style.display = 'block';
        renderPreview();
      }
    }
  }

  init();
</script>
</body>
</html>
