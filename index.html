<html>
<head>
  <title>SprayBossPro Login</title>
<link rel="stylesheet" href="login.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      background: #fff;
      border: 2px solid #c050f0;
      border-radius: 12px;
      box-shadow: 0 0 0 1px #c050f0, 0 0 20px 6px rgba(192,80,240,.8), 0 0 50px 14px rgba(192,80,240,.4), 0 0 80px 20px rgba(192,80,240,.2);
      width: 440px;
      overflow: hidden;
    }
    .login-container h1 {
      background: linear-gradient(135deg, #1a0820 0%, #4a1060 100%);
      color: #ffffff;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      padding: 28px 0 24px;
      letter-spacing: 1px;
    }
    .login-fields {
      padding: 36px 36px 30px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-container input {
      width: 100%;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 13px 14px;
      font-size: 16px;
      font-family: inherit;
      color: #333;
    }
    .login-container input::placeholder { color: #aaa; }
    .login-container input:focus {
      outline: none;
      border-color: #6b2080;
      box-shadow: 0 0 0 2px rgba(107,32,128,.2);
    }
    .login-container button {
      width: 100%;
      background: #e07820;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-size: 17px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-container button:hover { background: #c96a15; }
    @media (max-width: 768px) {
      .login-container { width: 92vw; }
      .login-fields { padding: 28px 24px 24px; }
    }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>
  <div class="login-container">
    <h1>
      <span style="display:block;font-size:40px;margin-bottom:6px">&#127807;</span>
      SprayBossPro
    </h1>
    <div class="login-fields">
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button onclick="login()">Log In</button>
      <div style="text-align:center; margin-top:4px;">
        <a href="#" onclick="showForgot(event)" style="color:#e07820; font-size:14px; text-decoration:none;">Forgot Password?</a>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgot-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1000; display:none; align-items:center; justify-content:center;">
    <div style="background:#fff; border:1px solid #6b2080; border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,.5); width:400px; max-width:92vw; overflow:hidden;">
      <div style="background:linear-gradient(135deg,#1a0820,#4a1060); color:#fff; padding:18px 24px; font-size:18px; font-weight:700;">Reset Password</div>
      <div style="padding:28px 28px 24px; display:flex; flex-direction:column; gap:14px;">
        <p style="color:#555; font-size:14px;">Enter your email and we'll send you a link to reset your password.</p>
        <input id="forgot-email" type="email" placeholder="Email" style="width:100%; background:#fff; border:1px solid #ccc; border-radius:6px; padding:12px 14px; font-size:15px; font-family:inherit; color:#333;">
        <button onclick="sendReset()" style="width:100%; background:#e07820; color:#fff; border:none; border-radius:6px; padding:13px; font-size:16px; font-weight:700; cursor:pointer;">Send Reset Link</button>
        <div style="text-align:center;"><a href="#" onclick="hideForgot(event)" style="color:#888; font-size:13px;">Cancel</a></div>
        <div id="forgot-msg" style="display:none; text-align:center; font-size:14px; color:#7dcc7d; font-weight:600;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="Login.js"></script>
</body>
</html>
