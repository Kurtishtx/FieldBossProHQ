<html>
<head>
  <title>SprayBossPro Login</title>
<link rel="stylesheet" href="login.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ebebeb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      width: 440px;
      overflow: hidden;
    }
    .login-container h1 {
      background: #1a2b3c;
      color: #ffffff;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      padding: 28px 0 24px;
      letter-spacing: 1px;
    }
    .login-fields {
      padding: 36px 36px 30px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .login-container input {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 13px 14px;
      font-size: 16px;
      font-family: inherit;
      color: #333;
    }
    .login-container input:focus {
      outline: none;
      border-color: #f5c800;
      box-shadow: 0 0 0 2px rgba(245,200,0,.2);
    }
    .login-container button {
      width: 100%;
      background: #e07820;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-size: 17px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-container button:hover { background: #c96a15; }
    @media (max-width: 768px) {
      .login-container { width: 92vw; }
      .login-fields { padding: 28px 24px 24px; }
    }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>
  <div class="login-container">
    <h1>
      <span style="display:block;font-size:40px;margin-bottom:6px">&#127807;</span>
      SprayBossPro
    </h1>
    <div class="login-fields">
      <input id="email" type="email" placeholder="Email">
      <div style="display:flex;align-items:center;border:1px solid #ccc;border-radius:4px;background:#fff;">
        <input id="password" type="password" placeholder="Password" style="flex:1;width:auto !important;min-width:0;border:none;outline:none;padding:13px 14px;font-size:16px;font-family:inherit;color:#333;background:transparent;">
        <button type="button" onclick="var p=document.getElementById('password');p.type=p.type==='password'?'text':'password';this.querySelector('svg').style.stroke=p.type==='text'?'#e07820':'#555';" style="background:none;border:none;cursor:pointer;padding:0 14px;display:flex;align-items:center;flex-shrink:0;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
      <button onclick="login()">Log In</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="Login.js"></script>
</body>
</html>
