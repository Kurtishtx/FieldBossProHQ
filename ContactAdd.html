<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Add Contact</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f5f5f5; color: #222; overflow: hidden; }

    .dialog { max-width: 1100px; margin: 30px auto; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,.15); background: #fff; }
    .dialog-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .dialog-header h1 { font-size: 20px; font-weight: 700; color: #111; }
    .close-btn { background: none; border: 1px solid #bbb; padding: 2px 7px; font-size: 13px; cursor: pointer; color: #555; border-radius: 2px; }
    .close-btn:hover { background: #f0f0f0; }

    .dialog-body { padding: 20px 24px 8px; }

    .section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; padding: 16px 0 10px; border-top: 1px solid #eee; margin-top: 8px; }
    .section-label:first-child { border-top: none; padding-top: 0; }

    .field-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .field-row label { width: 160px; font-weight: 700; font-size: 13px; color: #333; flex-shrink: 0; padding-top: 8px; }
    .field-row input[type="text"],
    .field-row input[type="tel"],
    .field-row input[type="email"],
    .field-row input[type="date"],
    .field-row select,
    .field-row textarea {
      flex: 1; width: 100%; border: 1px solid #ccc; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; border-radius: 2px;
    }
    .field-row input:focus, .field-row select:focus, .field-row textarea:focus { border-color: #e07820; }

    .dialog-footer { padding: 16px 24px 24px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; margin-top: 16px; }
    .btn-save { background: #e07820; color: #fff; border: none; padding: 9px 28px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save:hover { background: #c96a10; }
    .btn-cancel { color: #555; font-size: 13px; cursor: pointer; margin-left: 4px; }
    .btn-cancel:hover { text-decoration: underline; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="dialog">
  <div class="dialog-header">
    <h1 id="form-title">Add Contact</h1>
    <button class="close-btn" onclick="cancelEdit()">&#10005;</button>
  </div>

  <div class="dialog-body">

    <div class="section-label">Contact Info</div>

    <div class="field-row">
      <label for="first-name">First Name</label>
      <div style="flex:1;">
        <input type="text" id="first-name"/>
      </div>
    </div>
    <div class="field-row">
      <label for="last-name">Last Name</label>
      <div style="flex:1;">
        <input type="text" id="last-name"/>
      </div>
    </div>
    <div class="field-row">
      <label for="nickname">Nickname</label>
      <div style="flex:1;">
        <input type="text" id="nickname"/>
      </div>
    </div>
    <div class="field-row">
      <label for="contact-type">Contact Type</label>
      <div style="flex:1;">
        <select id="contact-type">
          <option value="">Select options</option>
          <option>Spouse</option>
          <option>Partner</option>
          <option>Manager</option>
          <option>Assistant</option>
          <option>Other</option>
        </select>
      </div>
    </div>

    <div class="section-label">Contact Details</div>

    <div class="field-row">
      <label for="email">Email</label>
      <div style="flex:1;">
        <input type="email" id="email"/>
      </div>
    </div>
    <div class="field-row">
      <label for="home-phone">Home Phone</label>
      <div style="flex:1;">
        <input type="tel" id="home-phone"/>
      </div>
    </div>
    <div class="field-row">
      <label for="work-phone">Work Phone</label>
      <div style="flex:1;">
        <input type="tel" id="work-phone"/>
      </div>
    </div>
    <div class="field-row">
      <label for="cell-phone">Cell Phone</label>
      <div style="flex:1;">
        <input type="tel" id="cell-phone"/>
      </div>
    </div>

  </div>

  <div class="dialog-footer">
    <button class="btn-save" onclick="saveContact()">Save</button>
    <span class="btn-cancel" onclick="cancelEdit()">Cancel</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var params     = new URLSearchParams(window.location.search);
  var editId     = params.get('id');
  var entityId   = params.get('entityId');
  var entityType = params.get('entityType'); // 'client' or 'lead'

  if (editId) {
    document.getElementById('form-title').textContent = 'Edit Contact';
    (async function() {
      var { data: c } = await sb.from('Contacts').select('*').eq('id', editId).single();
      if (!c) return;
      function set(id, val) { var el = document.getElementById(id); if (el) el.value = val || ''; }
      set('first-name',      c.first_name);
      set('last-name',       c.last_name);
      set('nickname',        c.nickname);
      set('contact-type',    c.contact_type);
      set('email',           c.email);
      set('home-phone',      c.home_phone);
      set('work-phone',      c.work_phone);
      set('cell-phone',      c.cell_phone);
    })();
  }

  async function saveContact() {
    var firstName = document.getElementById('first-name').value.trim();
    var lastName  = document.getElementById('last-name').value.trim();
    if (!firstName && !lastName) {
      alert('Please enter at least a first or last name.');
      document.getElementById('first-name').focus();
      return;
    }

    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    var record = {
      first_name:      firstName,
      last_name:       lastName,
      name:            (firstName + ' ' + lastName).trim(),
      nickname:        document.getElementById('nickname').value.trim(),
      contact_type:    document.getElementById('contact-type').value,
      email:           document.getElementById('email').value.trim(),
      home_phone:      document.getElementById('home-phone').value.trim(),
      work_phone:      document.getElementById('work-phone').value.trim(),
      cell_phone:      document.getElementById('cell-phone').value.trim(),
      entity_type:     entityType || null,
      entity_id:       entityId   || null,
      user_id:         uid,
    };

    var error;
    if (editId) {
      var result = await sb.from('Contacts').update(record).eq('id', editId);
      error = result.error;
    } else {
      var result = await sb.from('Contacts').insert(record);
      error = result.error;
    }

    if (error) { alert('Error saving contact: ' + error.message); return; }

    if (window.parent !== window) {
      window.parent.closeContactModal(true);
    } else {
      window.history.back();
    }
  }

  function cancelEdit(e) {
    if (e) e.preventDefault();
    if (window.parent !== window) {
      window.parent.closeContactModal(false);
    } else {
      window.history.back();
    }
  }
</script>
</body>
</html>
