<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Package Plans</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #d4cfe0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Page header ── */
    .page-header { padding: 10px 20px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 800;
      color: #111;
    }
    .showing-count { font-size: 14px; font-weight: 400; color: #555; margin-left: 6px; }
        .btn-orange-filled {
      background: #e07820;
      border: 3px solid #111;
      color: #fff;
      font-weight: 700;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13.5px;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn-orange-filled:hover { background: #c96a15; border-color: #111; }

    /* ── Toolbar ── */
    .toolbar {
      background: #130520;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 6px;
    }
    .actions-split { display: flex; align-items: stretch; position: relative; }
    .btn-green-main { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none; border-radius: 3px 0 0 3px; padding: 5px 14px; font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer; }
    .btn-green-main:hover { background: #d4ae00; }
    .btn-green-caret { background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15); border-radius: 0 3px 3px 0; padding: 5px 8px; font-size: 12px; cursor: pointer; }
    .btn-green-caret:hover { background: #d4ae00; }
    .actions-dropdown {
      display: none; position: absolute; top: calc(100% + 4px); left: 0;
      background: #fff; border: 1px solid #ccc; border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,.18); z-index: 200; min-width: 180px; padding: 4px 0;
    }
    .actions-dropdown.open { display: block; }
    .dropdown-header { font-size: 13px; font-weight: 700; color: #222; padding: 7px 16px 5px; border-bottom: 1px solid #eee; margin-bottom: 3px; }
    .dropdown-item { display: block; width: 100%; background: none; border: none; text-align: left; padding: 7px 16px; font-size: 13.5px; font-family: inherit; color: #333; cursor: pointer; }
    .dropdown-item:hover { background: #f5f5f5; }

    /* ── Tabs ── */
    .tabs-bar {
      background: #130520;
      padding: 0 10px;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
      border-top: 1px solid #0d0318;
    }
    .tab-btn {
      background: #bbb;
      color: #111;
      border: none;
      border-radius: 4px 4px 0 0;
      padding: 5px 16px;
      font-size: 12.5px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .tab-btn.active { background: #fff; color: #111; font-weight: 700; }
    .tab-btn:hover:not(.active) { background: #aaa; color: #111; }

    /* ── Table ── */
    .table-container {
      flex: 1;
      overflow-y: auto;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 8px 14px;
      text-align: left;
      font-weight: 600;
      color: #555;
      white-space: nowrap;
      font-size: 12.5px;
    }
    thead th:first-child { width: 36px; text-align: center; }

    tbody tr { border-bottom: 1px solid #eee; }
    tbody tr:hover { background: #fdfbe8; }
    tbody tr.expired { background: #fde8e8; }
    tbody tr.expired:hover { background: #fad5d5; }

    tbody td { padding: 9px 14px; color: #333; vertical-align: middle; }
    tbody td:first-child { text-align: center; }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: #888888;
    }
    .pkg-link {
      color: #444;
      text-decoration: none;
      cursor: pointer;
    }
    .pkg-link:hover { text-decoration: underline; color: #111; }

    /* ── Footer bar ── */
    .footer-bar {
      background: #0d0318;
      height: 22px;
      flex-shrink: 0;
    }

    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<!-- Page header -->
<div class="page-header">
    <span class="showing-count" id="results-count"></span>
  <button class="btn-orange-filled" onclick="window.location.href='PackagePlansAdd.html'">Add Package</button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="actions-split">
    <button class="btn-green-main">Actions</button>
    <button class="btn-green-caret" onclick="toggleDropdown(event)">&#9660;</button>
    <div class="actions-dropdown" id="actions-dropdown">
      <div class="dropdown-header">Actions</div>
      <button class="dropdown-item" onclick="window.location.href='PackagePlansAdd.html'">Add Package Plan</button>
      <button class="dropdown-item" onclick="copySelected()">Copy</button>
      <button class="dropdown-item" onclick="deleteSelected()">Delete</button>
      <button class="dropdown-item" onclick="setSelectedInactive()">Inactivate</button>
      <button class="dropdown-item" onclick="setSelectedActive()">Activate</button>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="setTab(this,'active')">Active</button>
  <button class="tab-btn" onclick="setTab(this,'inactive')">Inactive</button>
  <button class="tab-btn" onclick="setTab(this,'all')">All</button>
</div>

<!-- Table -->
<div class="table-container">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="select-all" onchange="toggleAll(this)"/></th>
        <th>Package Name</th>
        <th>Description</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Renewal Date</th>
        <th>Active</th>
        <th>Subscribers</th>
        <th id="renew-th" style="display:none;">Renew</th>
      </tr>
    </thead>
    <tbody id="pkg-tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty-msg">No package plans found.</div>
</div>
<div style="height:28px;background:#130520;"></div>

<!-- Subscribers modal -->
<div id="sub-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;width:96vw;max-width:700px;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.4);overflow:hidden;max-height:80vh;display:flex;flex-direction:column;">
    <div style="background:#130520;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span id="sub-title" style="font-size:15px;font-weight:700;">Subscribers</span>
      <button onclick="closeSubModal()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;">&#10005;</button>
    </div>
    <div style="overflow-y:auto;flex:1;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr style="background:#f5f5f5;border-bottom:2px solid #ddd;">
          <th style="padding:9px 14px;text-align:left;font-weight:600;color:#555;">Client</th>
          <th style="padding:9px 14px;text-align:left;font-weight:600;color:#555;">Address</th>
          <th style="padding:9px 14px;text-align:left;font-weight:600;color:#555;">Services</th>
        </tr></thead>
        <tbody id="sub-tbody"></tbody>
      </table>
      <div id="sub-empty" style="display:none;padding:24px;color:#aaa;text-align:center;font-style:italic;">No subscribers found.</div>
    </div>
  </div>
</div>

<!-- Footer bar -->
<div class="footer-bar"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  /* ── Tabs ── */
  var currentTab = 'active';
  function setTab(btn, tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentTab = tab;
    renderTable();
  }

  /* ── Dropdown ── */
  function toggleDropdown(e) {
    e.stopPropagation();
    document.getElementById('actions-dropdown').classList.toggle('open');
  }
  document.addEventListener('click', function() {
    document.getElementById('actions-dropdown').classList.remove('open');
  });

  /* ── Data ── */
  var packages = [];
  var subscriberCounts = {}; /* pkgId -> count of distinct properties */

  /* show renew column Dec 30+ */
  var _now = new Date();
  var isRenewalSeason = (_now.getMonth() === 11 && _now.getDate() >= 30);
  if (isRenewalSeason) document.getElementById('renew-th').style.display = '';

  async function loadPackages() {
    var { data, error } = await sb.from('Packages').select('*').order('name', { ascending: true });
    if (error) {
      document.getElementById('empty-msg').textContent = 'Error loading packages: ' + error.message;
      return;
    }
    packages = data || [];

    /* load subscriber counts: get all package_services, then count distinct property_ids in Services */
    var pkgIds = packages.map(function(p) { return p.id; });
    if (pkgIds.length) {
      var { data: psRows } = await sb.from('package_services').select('id, package_id').in('package_id', pkgIds);
      var psIds = (psRows || []).map(function(r) { return r.id; });
      var psPackageMap = {};
      (psRows || []).forEach(function(r) { psPackageMap[r.id] = r.package_id; });
      if (psIds.length) {
        var { data: svcRows } = await sb.from('Services').select('package_service_id, property_id').in('package_service_id', psIds).not('property_id', 'is', null);
        var seen = {};
        (svcRows || []).forEach(function(r) {
          var pkgId = psPackageMap[r.package_service_id];
          if (!pkgId || !r.property_id) return;
          var key = pkgId + '_' + r.property_id;
          if (!seen[key]) { seen[key] = true; subscriberCounts[pkgId] = (subscriberCounts[pkgId] || 0) + 1; }
        });
      }
    }
    renderTable();
  }

  /* ── Render ── */
  function renderTable() {
    var tbody    = document.getElementById('pkg-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    tbody.innerHTML = '';

    var filtered = packages.filter(function(p) {
      if (currentTab === 'active')   return p.active !== false;
      if (currentTab === 'inactive') return p.active === false;
      return true;
    });

    if (filtered.length === 0) {
      emptyMsg.style.display = '';
      return;
    }
    emptyMsg.style.display = 'none';

    var today = new Date();
    filtered.forEach(function(p) {
      var tr = document.createElement('tr');
      tr.dataset.pkgId = p.id;
      tr.style.cursor = 'pointer';
      var endDate = p.end_date ? new Date(p.end_date) : null;
      if (endDate && endDate < today) tr.classList.add('expired');

      var subCount = subscriberCounts[p.id] || 0;
      tr.innerHTML =
        '<td><input type="checkbox" onclick="event.stopPropagation()"/></td>' +
        '<td><a class="pkg-link">' + (p.name || '') + '</a></td>' +
        '<td>' + (p.description || '') + '</td>' +
        '<td>' + (p.start_date || '') + '</td>' +
        '<td>' + (p.end_date || '') + '</td>' +
        '<td>' + (p.renewal_date || '') + '</td>' +
        '<td>' + (p.active ? 'Active' : 'Inactive') + '</td>' +
        '<td><button onclick="event.stopPropagation();openSubModal(\'' + p.id + '\',\'' + (p.name||'').replace(/'/g,"\\'") + '\')" style="background:#e07820;color:#fff;border:none;border-radius:3px;padding:3px 12px;font-size:12.5px;font-weight:700;cursor:pointer;">' + subCount + ' ' + (subCount === 1 ? 'Client' : 'Clients') + '</button></td>' +
        '<td style="display:' + (isRenewalSeason ? '' : 'none') + ';"><button id="renew-btn-' + p.id + '" onclick="event.stopPropagation();renewPackage(\'' + p.id + '\',\'' + (p.name||'').replace(/'/g,"\\'") + '\')" style="background:#e8c000;color:#000;border:2px solid #000;border-radius:3px;padding:3px 14px;font-size:12.5px;font-weight:700;cursor:pointer;">Renew</button></td>';
      tr.addEventListener('click', function(e) {
        if (e.target.type === 'checkbox') return;
        window.location.href = 'PackagePlansAdd.html?id=' + p.id;
      });
      tbody.appendChild(tr);
    });
  }

  function toggleAll(cb) {
    document.querySelectorAll('#pkg-tbody input[type="checkbox"]')
      .forEach(function(c) { c.checked = cb.checked; });
  }

  function getSelectedIds() {
    var ids = [];
    document.querySelectorAll('#pkg-tbody tr').forEach(function(tr) {
      var cb = tr.querySelector('input[type="checkbox"]');
      if (cb && cb.checked) ids.push(tr.dataset.pkgId);
    });
    return ids;
  }

  async function deleteSelected() {
    var ids = getSelectedIds();
    if (!ids.length) { alert('Select at least one package first.'); return; }
    if (!confirm('Delete ' + ids.length + ' package(s)? This cannot be undone.')) return;
    await sb.from('package_services').delete().in('package_id', ids);
    var { error } = await sb.from('Packages').delete().in('id', ids);
    if (error) { alert('Error deleting: ' + error.message); return; }
    packages = packages.filter(function(p) { return ids.indexOf(String(p.id)) === -1; });
    document.getElementById('select-all').checked = false;
    renderTable();
  }

  async function setSelectedActive() {
    var ids = getSelectedIds();
    if (!ids.length) { alert('Select at least one package first.'); return; }
    if (!confirm('Activate ' + ids.length + ' package(s)?')) return;
    var { error } = await sb.from('Packages').update({ active: true }).in('id', ids);
    if (error) { alert('Error updating: ' + error.message); return; }
    packages.forEach(function(p) { if (ids.indexOf(String(p.id)) !== -1) p.active = true; });
    document.getElementById('select-all').checked = false;
    renderTable();
  }

  async function setSelectedInactive() {
    var ids = getSelectedIds();
    if (!ids.length) { alert('Select at least one package first.'); return; }
    if (!confirm('Inactivate ' + ids.length + ' package(s)?')) return;
    var { error } = await sb.from('Packages').update({ active: false }).in('id', ids);
    if (error) { alert('Error updating: ' + error.message); return; }
    packages.forEach(function(p) { if (ids.indexOf(String(p.id)) !== -1) p.active = false; });
    document.getElementById('select-all').checked = false;
    renderTable();
  }

  async function copySelected() {
    var ids = getSelectedIds();
    if (!ids.length) { alert('Select at least one package first.'); return; }
    if (!confirm('Copy ' + ids.length + ' package(s)?')) return;
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    for (var i = 0; i < ids.length; i++) {
      var pkg = packages.find(function(p) { return String(p.id) === ids[i]; });
      if (!pkg) continue;
      var { data: inserted } = await sb.from('Packages').insert({
        user_id:     uid,
        name:        (pkg.name || '') + ' (Copy)',
        description: pkg.description || null,
        active:      pkg.active
      }).select('id').single();
      if (inserted) {
        var { data: rows } = await sb.from('package_services').select('*').eq('package_id', pkg.id);
        if (rows && rows.length) {
          var newRows = rows.map(function(r) {
            return { user_id: uid, package_id: inserted.id, name: r.name, service_id: r.service_id, service_name: r.service_name,
              start_date: r.start_date, end_date: r.end_date, min_days: r.min_days,
              default_hours: r.default_hours, default_rate: r.default_rate };
          });
          await sb.from('package_services').insert(newRows);
        }
      }
    }
    loadPackages();
  }

  async function openSubModal(pkgId, pkgName) {
    document.getElementById('sub-title').textContent = pkgName + ' — Subscribers';
    document.getElementById('sub-overlay').style.display = 'flex';
    document.getElementById('sub-empty').style.display = 'none';
    var tbody = document.getElementById('sub-tbody');
    tbody.innerHTML = '<tr><td colspan="3" style="padding:16px;color:#aaa;">Loading...</td></tr>';

    var { data: psRows } = await sb.from('package_services').select('id').eq('package_id', pkgId);
    var psIds = (psRows || []).map(function(r) { return r.id; });
    if (!psIds.length) { tbody.innerHTML = ''; document.getElementById('sub-empty').style.display = ''; return; }

    var { data: svcRows } = await sb.from('Services')
      .select('property_id, client_name, address')
      .in('package_service_id', psIds)
      .not('property_id', 'is', null);

    var seen = {}, rows = [], svcCountMap = {};
    (svcRows || []).forEach(function(r) {
      svcCountMap[r.property_id] = (svcCountMap[r.property_id] || 0) + 1;
      if (!seen[r.property_id]) { seen[r.property_id] = true; rows.push(r); }
    });

    if (!rows.length) { tbody.innerHTML = ''; document.getElementById('sub-empty').style.display = ''; return; }

    tbody.innerHTML = rows.map(function(r) {
      return '<tr style="border-bottom:1px solid #eee;">' +
        '<td style="padding:9px 14px;">' + (r.client_name || '—') + '</td>' +
        '<td style="padding:9px 14px;">' + (r.address || '—') + '</td>' +
        '<td style="padding:9px 14px;text-align:center;">' + (svcCountMap[r.property_id] || 0) + ' services</td>' +
      '</tr>';
    }).join('');
  }

  function closeSubModal() { document.getElementById('sub-overlay').style.display = 'none'; }
  document.getElementById('sub-overlay').addEventListener('click', function(e) { if (e.target === this) closeSubModal(); });

  async function renewPackage(pkgId, pkgName) {
    var nextYear = new Date().getFullYear() + 1;
    if (!confirm('Renew "' + pkgName + '" for ' + nextYear + '? This will create new service records for all subscribed properties with dates moved forward one year.')) return;

    var btn = document.getElementById('renew-btn-' + pkgId);
    if (btn) { btn.textContent = 'Working…'; btn.disabled = true; }

    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;

    var { data: psRows } = await sb.from('package_services').select('id, name, service_name, min_days, default_rate, start_date, end_date').eq('package_id', pkgId);
    if (!psRows || !psRows.length) { alert('No services found in this package.'); if (btn) { btn.textContent = 'Renew'; btn.disabled = false; } return; }

    var psIds = psRows.map(function(r) { return r.id; });
    var psMap = {};
    psRows.forEach(function(r) { psMap[r.id] = r; });

    var { data: svcRows } = await sb.from('Services')
      .select('id, property_id, customer_id, client_name, address, service, amount, min_days, package_service_id, start_date, end_date, truck_id, assigned_to')
      .in('package_service_id', psIds)
      .not('property_id', 'is', null);
    if (!svcRows || !svcRows.length) { alert('No subscribers found for this package.'); if (btn) { btn.textContent = 'Renew'; btn.disabled = false; } return; }

    var alreadyRenewed = svcRows.some(function(s) { return s.start_date && s.start_date.startsWith(String(nextYear)); });
    if (alreadyRenewed) {
      alert('This package has already been renewed for ' + nextYear + '.');
      if (btn) { btn.textContent = 'Renewed ✓'; btn.style.background = '#aaa'; btn.disabled = true; }
      return;
    }

    function bumpYear(dateStr) {
      if (!dateStr) return null;
      var parts = dateStr.split('-');
      return parts.length === 3 ? (parseInt(parts[0]) + 1) + '-' + parts[1] + '-' + parts[2] : null;
    }

    var seen = {}, inserts = [];
    svcRows.forEach(function(s) {
      var key = s.property_id + '_' + s.package_service_id;
      if (seen[key]) return;
      seen[key] = true;
      var tmpl = psMap[s.package_service_id] || {};
      inserts.push({
        user_id: uid, property_id: s.property_id, customer_id: s.customer_id || null,
        client_name: s.client_name || '', address: s.address || '',
        service: s.service || tmpl.service_name || tmpl.name || '',
        amount: s.amount != null ? s.amount : (tmpl.default_rate || 0),
        min_days: s.min_days != null ? s.min_days : (tmpl.min_days || 0),
        package_service_id: s.package_service_id,
        start_date: bumpYear(s.start_date || tmpl.start_date),
        end_date:   bumpYear(s.end_date   || tmpl.end_date),
        dispatched: false, status: 'pending',
        truck_id: s.truck_id || null, assigned_to: s.assigned_to || null
      });
    });

    var { error } = await sb.from('Services').insert(inserts);
    if (error) { alert('Error renewing: ' + error.message); if (btn) { btn.textContent = 'Renew'; btn.disabled = false; } return; }
    if (btn) { btn.textContent = 'Renewed ✓'; btn.style.background = '#aaa'; btn.disabled = true; }
    alert('"' + pkgName + '" renewed for ' + nextYear + ' — ' + inserts.length + ' service records created.');
  }

  loadPackages();
</script>
</body>
</html>
