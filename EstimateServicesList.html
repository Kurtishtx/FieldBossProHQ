<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estimate Services / Packages</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #d4cfe0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .page-header { padding: 10px 20px 6px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: #fff; border-bottom: 1px solid #ddd; }
    .page-header h1 { font-size: 22px; font-weight: 800; color: #111; }
    .showing-count { font-size: 14px; font-weight: 400; color: #555; margin-left: 6px; }
    .btn-add { background: #130520; border: 2px solid #e07820; color: #fff; font-weight: 700; border-radius: 6px; padding: 7px 16px; font-size: 13.5px; font-family: inherit; cursor: pointer; }
    .btn-add:hover { background: #1e0a35; }

    .toolbar { background: #130520; padding: 7px 14px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .btn-actions { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none; border-radius: 3px 0 0 3px; padding: 5px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-actions:hover { background: #d4ae00; }
    .btn-actions-caret { background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15); border-radius: 0 3px 3px 0; padding: 5px 8px; font-size: 12px; cursor: pointer; }
    .dd-wrap { position: relative; display: inline-flex; }
    .dd-menu { display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 300; background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 12px rgba(0,0,0,.2); min-width: 180px; padding: 4px 0; }
    .dd-menu.show { display: block; }
    .dd-menu a { display: block; padding: 8px 14px; color: #444; font-size: 13px; cursor: pointer; }
    .dd-menu a:hover { background: #f5f5f5; }

    .toolbar-tabs { display: flex; gap: 0; }
    .tab-btn { padding: 5px 16px; border: none; cursor: pointer; font-size: 12.5px; font-weight: 600; font-family: inherit; background: #555; color: #bbb; }
    .tab-btn:first-child { border-radius: 3px 0 0 3px; }
    .tab-btn:last-child  { border-radius: 0 3px 3px 0; }
    .tab-btn.active { background: #fff; color: #222; }
    .tab-btn:hover:not(.active) { background: #666; }

    .table-container { flex: 1; overflow-y: auto; background: #fff; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 10px 14px; text-align: left; font-size: 12.5px; font-weight: 700; color: #555; border-bottom: 2px solid #ddd; background: #fafafa; white-space: nowrap; }
    thead th:first-child { width: 40px; text-align: center; }
    tbody tr { border-bottom: 1px solid #eee; cursor: pointer; }
    tbody tr:hover { background: #f9f9f9; }
    tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }
    tbody td:first-child { text-align: center; }
    .name-link { color: #2272c3; text-decoration: underline; font-weight: 600; }
    .badge-active   { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
    .badge-inactive { background: #f0f0f0; color: #666; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    .empty-msg { padding: 40px; text-align: center; color: #888; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="page-header">
    <span class="showing-count" id="showing-count"></span>
  <button class="btn-add" onclick="navigate('estimateservicesadd')">+ Add Service / Package</button>
</div>

<div class="toolbar">
  <div class="dd-wrap">
    <button class="btn-actions">Actions</button>
    <button class="btn-actions-caret" onclick="toggleDD(event)">&#9660;</button>
    <div class="dd-menu" id="actions-dd">
      <a onclick="setActiveSelected(true)">Activate Selected</a>
      <a onclick="setActiveSelected(false)">Deactivate Selected</a>
      <a onclick="deleteSelected()">Delete Selected</a>
    </div>
  </div>
  <div class="toolbar-tabs">
    <button class="tab-btn active" onclick="setFilter('active',this)">Active</button>
    <button class="tab-btn" onclick="setFilter('inactive',this)">Inactive</button>
    <button class="tab-btn" onclick="setFilter('all',this)">All</button>
  </div>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"/></th>
        <th>Service Name</th>
        <th>Description</th>
        <th>Default Price</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="svc-tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty-msg" style="display:none;">No estimate services / packages found. Add one to get started.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var services = [];
  var filter = 'active';

  function navigate(page, params) {
    var url = params ? page + '?' + params : page;
    if (window.parent && window.parent.loadPage) window.parent.loadPage(url);
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(n) { return '$' + (parseFloat(n)||0).toFixed(2); }

  function toggleDD(e) { e.stopPropagation(); document.getElementById('actions-dd').classList.toggle('show'); }
  document.addEventListener('click', function() { document.getElementById('actions-dd').classList.remove('show'); });

  function toggleAll(checked) { document.querySelectorAll('.row-cb').forEach(function(cb){ cb.checked = checked; }); }
  function setFilter(f, btn) { filter = f; document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); }); btn.classList.add('active'); renderTable(); }

  function getSelected() {
    return Array.from(document.querySelectorAll('.row-cb:checked')).map(function(cb){ return cb.dataset.id; });
  }

  async function deleteSelected() {
    var ids = getSelected(); if (!ids.length) return;
    if (!confirm('Delete ' + ids.length + ' service(s)?')) return;
    await sb.from('estimate_services').delete().in('id', ids);
    services = services.filter(function(s){ return !ids.includes(s.id); });
    renderTable();
  }

  async function setActiveSelected(active) {
    var ids = getSelected(); if (!ids.length) return;
    await sb.from('estimate_services').update({ active: active }).in('id', ids);
    services.forEach(function(s){ if (ids.includes(s.id)) s.active = active; });
    renderTable();
  }

  function renderTable() {
    var tbody = document.getElementById('svc-tbody');
    var filtered = services.filter(function(s){
      if (filter === 'active')   return s.active !== false;
      if (filter === 'inactive') return s.active === false;
      return true;
    });
    document.getElementById('showing-count').textContent = '(' + filtered.length + ')';
    document.getElementById('empty-msg').style.display = filtered.length ? 'none' : '';
    tbody.innerHTML = '';
    filtered.forEach(function(s) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><input type="checkbox" class="row-cb" data-id="' + s.id + '" onclick="event.stopPropagation()"/></td>' +
        '<td><span class="name-link">' + esc(s.name) + '</span></td>' +
        '<td style="color:#666;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(s.description||'') + '</td>' +
        '<td style="font-weight:700;">' + fmt(s.default_price) + '</td>' +
        '<td><span class="' + (s.active !== false ? 'badge-active' : 'badge-inactive') + '">' + (s.active !== false ? 'Active' : 'Inactive') + '</span></td>';
      tr.addEventListener('click', function(e){ if (e.target.type === 'checkbox') return; navigate('estimateservicesadd', 'id=' + s.id); });
      tbody.appendChild(tr);
    });
  }

  async function load() {
    var { data } = await sb.from('estimate_services').select('*').order('name');
    services = data || [];
    renderTable();
  }

  load();
</script>
</body>
</html>
