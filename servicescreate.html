<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Service</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #ede5d8; }

    .dialog { max-width: 640px; margin: 30px auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,.15); overflow: hidden; }

    .dialog-hdr { background: #1e1208; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .dialog-hdr h1 { font-size: 18px; font-weight: 700; }

    .section { padding: 18px 24px; border-bottom: 1px solid #f0ece6; }
    .section-title { font-size: 11px; font-weight: 700; color: #8a5518; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 14px; }

    .field-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-row label { width: 130px; min-width: 130px; font-size: 13px; font-weight: 600; color: #555; }
    .field-row input[type="text"],
    .field-row input[type="number"],
    .field-row select,
    .field-row textarea {
      flex: 1; border: 1px solid #ccc; border-radius: 4px;
      padding: 8px 10px; font-size: 13px; font-family: inherit; outline: none; color: #222;
    }
    .field-row input:focus, .field-row select:focus, .field-row textarea:focus { border-color: #c47d0a; }
    .field-row textarea { resize: vertical; min-height: 64px; }

    /* Category pills */
    .cat-pills { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
    .cat-pill {
      padding: 6px 16px; border: 2px solid #ddd; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer; background: #f8f8f8;
      color: #555; font-family: inherit; transition: all .15s;
    }
    .cat-pill:hover { border-color: #c47d0a; color: #c47d0a; }
    .cat-pill.selected { border-color: #1e1208; background: #1e1208; color: #fff; }
    .cat-pill.sel-mowing     { border-color: #27a567; background: #27a567; color: #fff; }
    .cat-pill.sel-landscape  { border-color: #17a2b8; background: #17a2b8; color: #fff; }
    .cat-pill.sel-irrigation { border-color: #007bff; background: #007bff; color: #fff; }
    .cat-pill.sel-snow       { border-color: #6c8ebf; background: #6c8ebf; color: #fff; }
    .cat-pill.sel-other      { border-color: #8a5518; background: #8a5518; color: #fff; }

    .toggle-row { display: flex; align-items: center; gap: 10px; }
    .toggle-label { font-size: 13px; color: #555; }
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; cursor: pointer; transition: .2s; }
    .slider:before { position: absolute; content: ''; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #27a567; }
    input:checked + .slider:before { transform: translateX(18px); }

    /* Chemical-only section */
    #chem-section { display: none; }

    /* Product/mix rows */
    .pm-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .pm-row select { flex: 2; border: 1px solid #ccc; border-radius: 4px; padding: 7px 8px; font-size: 13px; font-family: inherit; }
    .pm-row input[type="date"] { flex: 1; border: 1px solid #ccc; border-radius: 4px; padding: 7px 8px; font-size: 13px; font-family: inherit; }
    .pm-row label { font-size: 12px; color: #888; flex-shrink: 0; }
    .btn-del-pm { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 18px; line-height: 1; flex-shrink: 0; }

    .footer { padding: 16px 24px; display: flex; gap: 10px; align-items: center; }
    .btn-save { background: #c47d0a; color: #fff; border: none; padding: 10px 28px; font-size: 14px; font-weight: 700; border-radius: 5px; cursor: pointer; font-family: inherit; }
    .btn-save:hover { background: #a86808; }
    .btn-save-new { background: #1e1208; color: #fff; border: 1px solid #c47d0a; padding: 10px 18px; font-size: 13px; font-weight: 600; border-radius: 5px; cursor: pointer; font-family: inherit; }
    .btn-save-new:hover { background: #3d2510; }
    .btn-cancel { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; font-family: inherit; margin-left: 4px; }
    .btn-cancel:hover { text-decoration: underline; color: #555; }
    .del-btn { margin-left: auto; background: none; border: 1px solid #c0392b; color: #c0392b; padding: 9px 16px; font-size: 13px; border-radius: 5px; cursor: pointer; font-family: inherit; }
    .del-btn:hover { background: #fdf0ef; }

    .status-msg { font-size: 13px; padding: 8px 24px; background: #e8f5e9; color: #27a567; border-left: 3px solid #27a567; display: none; }
    .status-msg.err { background: #fdf0ef; color: #c0392b; border-color: #c0392b; }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="dialog">
  <div class="dialog-hdr">
    <h1 id="form-title">Add Service</h1>
  </div>

  <!-- Category -->
  <div class="section">
    <div class="section-title">Service Category</div>
    <div class="field-row" style="align-items:flex-start;">
      <label style="padding-top:6px;">Category</label>
      <div class="cat-pills">
        <button class="cat-pill" data-cat="chemical"   onclick="selectCat('chemical',   this)">&#9879; Chemical</button>
        <button class="cat-pill" data-cat="mowing"     onclick="selectCat('mowing',     this)">&#128118; Mowing</button>
        <button class="cat-pill" data-cat="landscape"  onclick="selectCat('landscape',  this)">&#127795; Landscape</button>
        <button class="cat-pill" data-cat="irrigation" onclick="selectCat('irrigation', this)">&#128167; Irrigation</button>
        <button class="cat-pill" data-cat="snow"       onclick="selectCat('snow',       this)">&#10052; Snow</button>
        <button class="cat-pill" data-cat="other"      onclick="selectCat('other',      this)">&#128295; Other</button>
      </div>
    </div>
    <input type="hidden" id="service-category" value=""/>
    <div id="cat-hint" style="font-size:12px;color:#888;margin-top:8px;padding-left:142px;">
      Select a category — Chemical goes to Waiting List, all others go to Job Board.
    </div>
  </div>

  <!-- Service Info -->
  <div class="section">
    <div class="section-title">Service Info</div>
    <div class="field-row">
      <label for="service-name">Service Name <span style="color:#c0392b">*</span></label>
      <input type="text" id="service-name" placeholder="e.g. Lawn Mowing, Fertilizer App 1" autocomplete="off"/>
    </div>
    <div class="field-row" id="invoice-name-row">
      <label for="invoice-name">Name on Invoice</label>
      <input type="text" id="invoice-name" placeholder="If different from service name" autocomplete="off"/>
    </div>
    <div class="field-row">
      <label for="service-code">Code</label>
      <input type="text" id="service-code" placeholder="Optional short code" style="max-width:160px;" autocomplete="off"/>
    </div>
    <div class="field-row">
      <label for="default-rate">Default Rate ($)</label>
      <input type="number" id="default-rate" value="0.00" step="0.01" min="0" style="max-width:140px;"/>
    </div>
    <div class="field-row">
      <label for="service-notes">Notes</label>
      <textarea id="service-notes" placeholder="Optional notes or description…"></textarea>
    </div>
    <div class="field-row">
      <label>Active</label>
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="active-toggle" checked/>
          <span class="slider"></span>
        </label>
        <span class="toggle-label" id="active-label">Active</span>
      </div>
    </div>
  </div>

  <!-- Chemical-only: Associated Area + Products/Mixes -->
  <div id="chem-section">
    <div class="section">
      <div class="section-title">Associated Area <span style="font-weight:400;color:#aaa;font-size:10px;">(Chemical only)</span></div>
      <div class="field-row">
        <label for="area-select">Area Type</label>
        <select id="area-select">
          <option value="">— None —</option>
          <option value="lawn_care">Lawn Sq Ft</option>
          <option value="lawn_insect">Lawn Insect Sq Ft</option>
          <option value="flower_beds">Flower Bed(s) Sq Ft</option>
          <option value="mosquito">Mosquito Control Sq Ft</option>
          <option value="mosquito_linear_ft">Mosquito Control Linear Ft</option>
          <option value="pest_control">Pest Control Sq Ft</option>
          <option value="pest_control_linear_ft">Pest Control Linear Ft</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Products &amp; Mixes <span style="font-weight:400;color:#aaa;font-size:10px;">(Chemical only)</span></div>
      <div id="pm-rows"></div>
      <button onclick="addPmRow()" style="background:#f5f0e8;border:1px solid #c8a060;color:#5a3a10;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;font-family:inherit;margin-top:4px;">+ Add Product / Mix</button>
    </div>
  </div>

  <div class="status-msg" id="status-msg"></div>

  <div class="footer">
    <button class="btn-save" onclick="saveService(false)">Save</button>
    <button class="btn-save-new" onclick="saveService(true)">Save &amp; New</button>
    <button class="btn-cancel" onclick="goBack()">Cancel</button>
    <button class="del-btn" id="del-btn" style="display:none;" onclick="deleteService()">Delete</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var sb = supabase.createClient(
    'https://knjdbgroiyhvqwrpqzcx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g',
    { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var params     = new URLSearchParams(window.location.search);
  var serviceId  = params.get('id');
  var uid        = null;
  var existing   = null;
  var mixOptions = '';

  var CAT_COLORS = {
    chemical:   'selected',
    mowing:     'sel-mowing',
    landscape:  'sel-landscape',
    irrigation: 'sel-irrigation',
    snow:       'sel-snow',
    other:      'sel-other',
  };

  function selectCat(cat, btn) {
    document.querySelectorAll('.cat-pill').forEach(function(p) {
      p.className = 'cat-pill';
    });
    btn.classList.add(CAT_COLORS[cat] || 'selected');
    document.getElementById('service-category').value = cat;
    document.getElementById('chem-section').style.display = cat === 'chemical' ? '' : 'none';
    document.getElementById('cat-hint').style.display = 'none';
  }

  document.getElementById('active-toggle').addEventListener('change', function() {
    document.getElementById('active-label').textContent = this.checked ? 'Active' : 'Inactive';
  });

  /* ── Product/Mix rows ── */
  async function loadMixes() {
    var { data } = await sb.from('Product Mixes').select('id, name').order('name');
    mixOptions = '<option value="">— Select Mix —</option>' +
      (data || []).map(function(m) {
        return '<option value="' + m.id + '">' + esc(m.name || '') + '</option>';
      }).join('');
  }

  function addPmRow(mix_id, start_date, end_date) {
    var row = document.createElement('div');
    row.className = 'pm-row';
    row.innerHTML =
      '<select>' + mixOptions + '</select>' +
      '<label>Start</label><input type="date" class="pm-start"/>' +
      '<label>End</label><input type="date" class="pm-end"/>' +
      '<button class="btn-del-pm" onclick="this.closest(\'.pm-row\').remove()" title="Remove">&#10005;</button>';
    document.getElementById('pm-rows').appendChild(row);
    if (mix_id) row.querySelector('select').value = mix_id;
    if (start_date) row.querySelector('.pm-start').value = start_date;
    if (end_date)   row.querySelector('.pm-end').value   = end_date;
  }

  function collectPmRows() {
    var rows = [];
    document.querySelectorAll('#pm-rows .pm-row').forEach(function(row) {
      var mix_id = row.querySelector('select').value;
      var start  = row.querySelector('.pm-start').value;
      var end    = row.querySelector('.pm-end').value;
      if (mix_id) rows.push({ mix_id: mix_id, start_date: start || null, end_date: end || null });
    });
    return rows;
  }

  /* ── Init / load existing ── */
  async function init() {
    var { data: s } = await sb.auth.getSession();
    uid = s && s.session ? s.session.user.id : null;

    await loadMixes();

    if (!serviceId) return;

    document.getElementById('form-title').textContent = 'Edit Service';
    document.getElementById('del-btn').style.display = '';

    var { data } = await sb.from('Services').select('*').eq('id', serviceId).single();
    if (!data) return;
    existing = data;

    var cat = (data.service_category || 'chemical').toLowerCase();
    var btn = document.querySelector('.cat-pill[data-cat="' + cat + '"]');
    if (btn) selectCat(cat, btn);

    document.getElementById('service-name').value    = data.name || '';
    document.getElementById('invoice-name').value    = data.invoice_name || '';
    document.getElementById('service-code').value    = data.code || '';
    document.getElementById('default-rate').value    = data.default_rate != null ? data.default_rate : '0.00';
    document.getElementById('service-notes').value   = data.notes || '';
    document.getElementById('active-toggle').checked = data.active !== false;
    document.getElementById('active-label').textContent = data.active !== false ? 'Active' : 'Inactive';

    if (cat === 'chemical') {
      var aa = data.associated_areas || {};
      var areaKey = Object.keys(aa).find(function(k) { return aa[k]; }) || '';
      document.getElementById('area-select').value = areaKey;
      (data.service_mixes || []).forEach(function(m) { addPmRow(m.mix_id, m.start_date, m.end_date); });
    }
  }

  /* ── Save ── */
  async function saveService(saveAndNew) {
    var cat  = document.getElementById('service-category').value;
    var name = document.getElementById('service-name').value.trim();
    if (!cat)  { showMsg('Please select a category.', true); return; }
    if (!name) { showMsg('Please enter a service name.', true); return; }

    var record = {
      name:              name,
      invoice_name:      document.getElementById('invoice-name').value.trim() || null,
      code:              document.getElementById('service-code').value.trim() || null,
      default_rate:      parseFloat(document.getElementById('default-rate').value) || 0,
      notes:             document.getElementById('service-notes').value.trim() || null,
      active:            document.getElementById('active-toggle').checked,
      service_category:  cat,
      user_id:           uid,
    };

    if (cat === 'chemical') {
      var areaKey = document.getElementById('area-select').value;
      var areaObj = { lawn_care: false, lawn_insect: false, flower_beds: false, mosquito: false, mosquito_linear_ft: false, pest_control: false, pest_control_linear_ft: false };
      if (areaKey) areaObj[areaKey] = true;
      record.associated_areas = areaObj;
      record.service_mixes    = collectPmRows();
    }

    var error;
    if (existing) {
      var res = await sb.from('Services').update(record).eq('id', existing.id);
      error = res.error;
    } else {
      var res = await sb.from('Services').insert(record);
      error = res.error;
    }

    if (error) { showMsg('Error: ' + error.message, true); return; }

    if (saveAndNew) {
      document.getElementById('service-name').value  = '';
      document.getElementById('invoice-name').value  = '';
      document.getElementById('service-code').value  = '';
      document.getElementById('default-rate').value  = '0.00';
      document.getElementById('service-notes').value = '';
      document.querySelectorAll('.cat-pill').forEach(function(p) { p.className = 'cat-pill'; });
      document.getElementById('service-category').value = '';
      document.getElementById('chem-section').style.display = 'none';
      document.getElementById('pm-rows').innerHTML = '';
      existing = null;
      serviceId = null;
      document.getElementById('form-title').textContent = 'Add Service';
      document.getElementById('del-btn').style.display = 'none';
      document.getElementById('cat-hint').style.display = '';
      showMsg('Saved! Add another service.', false);
      return;
    }

    goBack();
  }

  async function deleteService() {
    if (!existing) return;
    if (!confirm('Delete "' + (existing.name || 'this service') + '"? This cannot be undone.')) return;
    var { error } = await sb.from('Services').delete().eq('id', existing.id);
    if (error) { showMsg('Error: ' + error.message, true); return; }
    goBack();
  }

  function goBack() {
    if (window.parent && window.parent.loadPage) window.parent.loadPage('services');
    else window.location.href = 'services.html';
  }

  function showMsg(msg, isErr) {
    var el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = 'status-msg' + (isErr ? ' err' : '');
    el.style.display = 'block';
    if (!isErr) setTimeout(function() { el.style.display = 'none'; }, 3000);
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  init();
</script>
</body>
</html>
