<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Service</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f5f5f5; color: #222; }

    .dialog { max-width: 1100px; margin: 30px auto; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,.15); background: #fff; }
    .dialog-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .dialog-header h1 { font-size: 20px; font-weight: 700; color: #111; }
    .close-btn { background: none; border: 1px solid #bbb; padding: 2px 7px; font-size: 13px; cursor: pointer; color: #555; border-radius: 2px; }
    .close-btn:hover { background: #f0f0f0; }

    .tabs { display: flex; gap: 4px; align-items: center; padding: 10px 20px 0; border-bottom: 2px solid #eee; background: #fafafa; }
    .tab-btn { background: #e0e0e0; color: #444; border: none; border-radius: 4px 4px 0 0; padding: 7px 18px; font-size: 13.5px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .tab-btn:hover { background: #ccc; }
    .tab-btn.tab-active { background: #130520; color: #fff; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Products & Mixes tab */
    .pm-section-header { background: #5a5a5a; color: #fff; padding: 8px 16px; font-size: 13.5px; font-weight: 600; margin: 0 0 0 0; }
    .pm-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #eee; }
    .pm-label { font-size: 13px; color: #555; width: 100px; flex-shrink: 0; }
    .pm-mix-select { flex: 2; border: 1px solid #ccc; border-radius: 2px; padding: 6px 8px; font-size: 13px; font-family: inherit; }
    .pm-date { width: 130px; border: 1px solid #ccc; border-radius: 2px; padding: 6px 8px; font-size: 13px; font-family: inherit; }
    .pm-date-label { font-size: 13px; color: #555; flex-shrink: 0; }
    .pm-del-btn { background: none; border: none; cursor: pointer; color: #c0392b; font-size: 18px; line-height: 1; padding: 0 4px; flex-shrink: 0; }
    .pm-del-btn:hover { color: #922b21; }
    .btn-add-pm { background: #f0f0f0; border: 1px solid #bbb; padding: 6px 14px; font-size: 13px; font-family: inherit; cursor: pointer; border-radius: 3px; margin: 12px 16px; }
    .btn-add-pm:hover { background: #e0e0e0; }

    .dialog-body { padding: 20px 24px 8px; }
    .section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; padding: 16px 0 10px; border-top: 1px solid #eee; margin-top: 8px; }
    .section-label:first-child { border-top: none; padding-top: 0; }

    .field-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .field-row label { width: 160px; font-weight: 700; font-size: 13px; color: #333; flex-shrink: 0; padding-top: 8px; }
    .field-row input[type="text"], .field-row input[type="number"], .field-row select { flex: 1; width: 100%; border: 1px solid #ccc; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; border-radius: 2px; }
    .field-row input:focus, .field-row select:focus { border-color: #e07820; }

    .check-grid { display: flex; flex-wrap: wrap; gap: 8px 24px; margin-top: 4px; }
    .check-grid label { display: flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; font-weight: 400; width: auto; padding-top: 0; }
    .check-grid input[type="checkbox"] { width: 15px; height: 15px; accent-color: #e07820; cursor: pointer; flex-shrink: 0; }

    .std-select { width: 100%; border: 1px solid #ccc; border-radius: 2px; padding: 7px 10px; font-size: 13px; font-family: inherit; color: #333; }
    .std-select:focus { outline: none; border-color: #e07820; }

    .dialog-footer { padding: 16px 24px 24px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; margin-top: 16px; }
    .btn-save, .btn-save-new { background: #e07820; color: #fff; border: none; padding: 9px 28px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; font-family: inherit; }
    .btn-save:hover, .btn-save-new:hover { background: #c96a10; }
    .btn-cancel { color: #555; font-size: 13px; cursor: pointer; margin-left: 4px; background: none; border: none; font-family: inherit; }
    .btn-cancel:hover { text-decoration: underline; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
</head>
<body>

<div class="dialog">
  <div class="dialog-header">
    <h1>Add Service</h1>
    <button class="close-btn" onclick="history.back()">&#10005;</button>
  </div>

  <div class="tabs">
    <button class="tab-btn tab-active" onclick="switchTab('details')">Details</button>
    <button class="tab-btn" onclick="switchTab('products')">Products &amp; Mixes</button>
  </div>

  <!-- Details tab -->
  <div class="tab-panel active" id="panel-details">
  <div class="dialog-body">
    <div class="section-label">Service Info</div>

    <div class="field-row">
      <label for="invoice-name">Name on Invoice</label>
      <div style="flex:1;"><input type="text" id="invoice-name" autocomplete="off"/></div>
    </div>

    <div class="field-row">
      <label for="service-name">Service Name</label>
      <div style="flex:1;"><input type="text" id="service-name" autocomplete="off"/></div>
    </div>


    <div class="field-row">
      <label for="default-rate">Default Rate</label>
      <div style="flex:1;"><input type="number" id="default-rate" value="0.00" step="0.01" min="0"/></div>
    </div>

    <div class="field-row">
      <label for="assigned-to">Assigned To</label>
      <div style="flex:1;"><select class="std-select" id="assigned-to"><option value="">— Unassigned —</option></select></div>
    </div>

    <div class="section-label">Associated Areas</div>

    <div class="field-row">
      <label for="area-select">Associated Area</label>
      <div style="flex:1;">
        <select class="std-select" id="area-select">
          <option value="">— None —</option>
          <option value="lawn_care">Lawn Sq Ft</option>
          <option value="lawn_insect">Lawn Insect Sq Ft</option>
          <option value="flower_beds">Flower Bed(s) Sq Ft</option>
          <option value="mosquito">Mosquito Control Sq Ft</option>
          <option value="mosquito_linear_ft">Mosquito Control Linear Ft</option>
          <option value="pest_control">Pest Control Sq Ft</option>
          <option value="pest_control_linear_ft">Pest Control Linear Ft</option>
        </select>
      </div>
    </div>
  </div>
  </div><!-- /panel-details -->

  <!-- Products & Mixes tab -->
  <div class="tab-panel" id="panel-products">
    <div class="pm-section-header">Products &amp; Mixes</div>
    <div id="pm-rows"></div>
    <button class="btn-add-pm" onclick="addPmRow()">Add Product/Mix</button>
  </div>

  <div class="dialog-footer">
    <button class="btn-save" onclick="saveService()">Save</button>
    <button class="btn-save-new" onclick="saveAndNew()">Save &amp; New</button>
    <button class="btn-cancel" onclick="history.back()">Cancel</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var serviceId = new URLSearchParams(window.location.search).get('id');
  var serviceCategory = new URLSearchParams(window.location.search).get('category') || 'package';
  var existing = null;
  var mixOptions = '';

  /* ── Tab switching ── */
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('tab-active'); });
    document.getElementById('panel-' + name).classList.add('active');
    event.currentTarget.classList.add('tab-active');
  }

  /* ── Products & Mixes ── */
  async function loadMixes() {
    var { data } = await sb.from('Product Mixes').select('id, name').order('name');
    mixOptions = '<option value="">— Select Mix —</option>' +
      (data || []).map(function(m) { return '<option value="' + m.id + '">' + (m.name || '') + '</option>'; }).join('');
  }

  function addPmRow(mix_id, start_date, end_date) {
    var row = document.createElement('div');
    row.className = 'pm-row';
    row.innerHTML =
      '<span class="pm-label">Product/Mix</span>' +
      '<select class="pm-mix-select">' + mixOptions + '</select>' +
      '<span class="pm-date-label">Start Date</span>' +
      '<input type="date" class="pm-date pm-start"/>' +
      '<span class="pm-date-label">End Date</span>' +
      '<input type="date" class="pm-date pm-end"/>' +
      '<button class="pm-del-btn" onclick="this.closest(\'.pm-row\').remove()" title="Remove">&#10005;</button>';
    document.getElementById('pm-rows').appendChild(row);
    if (mix_id) row.querySelector('.pm-mix-select').value = mix_id;
    if (start_date) row.querySelector('.pm-start').value = start_date;
    if (end_date) row.querySelector('.pm-end').value = end_date;
  }

  function collectPmRows() {
    var rows = [];
    document.querySelectorAll('#pm-rows .pm-row').forEach(function(row) {
      var mix_id = row.querySelector('.pm-mix-select').value;
      var start  = row.querySelector('.pm-start').value;
      var end    = row.querySelector('.pm-end').value;
      if (mix_id) rows.push({ mix_id: mix_id, start_date: start || null, end_date: end || null });
    });
    return rows;
  }




  async function initEdit() {
    await loadMixes();

    var { data: empList } = await sb.from('employees').select('id, first_name, last_name').eq('active', true).order('last_name');
    var assignSel = document.getElementById('assigned-to');
    (empList || []).forEach(function(e) {
      var opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.last_name + ', ' + e.first_name;
      assignSel.appendChild(opt);
    });

    if (!serviceId) return;
    var { data } = await sb.from('Services').select('*').eq('id', serviceId).single();
    if (data) {
      existing = data;
      document.getElementById('invoice-name').value  = data.invoice_name || '';
      document.getElementById('service-name').value  = data.name || '';
      document.getElementById('default-rate').value  = data.default_rate || '0.00';
      if (data.assigned_to) assignSel.value = data.assigned_to;
var aa = data.associated_areas || {};
      var areaKey = Object.keys(aa).find(function(k) { return aa[k]; }) || '';
      document.getElementById('area-select').value = areaKey;
      (data.service_mixes || []).forEach(function(m) { addPmRow(m.mix_id, m.start_date, m.end_date); });
    }
  }
  initEdit();

  /* ── Service Mode custom dropdown ── */
  function toggleSvcMode(e) {
    e.stopPropagation();
    document.getElementById('svc-mode-dropdown').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    if (!document.getElementById('svc-mode-wrap').contains(e.target)) {
      document.getElementById('svc-mode-dropdown').classList.remove('open');
    }
  });

  function selectSvcMode(val, el) {
    document.getElementById('svc-mode-label').textContent = val;
    document.querySelectorAll('#svc-mode-options .dropdown-option').forEach(function(o) {
      o.classList.remove('selected');
    });
    el.classList.add('selected');
    document.getElementById('svc-mode-dropdown').classList.remove('open');
    document.getElementById('svc-mode-filter').value = '';
    filterSvcMode('');
  }

  function filterSvcMode(kw) {
    kw = kw.toLowerCase();
    document.querySelectorAll('#svc-mode-options .dropdown-option').forEach(function(o) {
      o.style.display = o.textContent.toLowerCase().includes(kw) ? '' : 'none';
    });
  }

  function clearSvcFilter() {
    document.getElementById('svc-mode-filter').value = '';
    filterSvcMode('');
  }

  /* ── Task Color ── */
  function updateColor(hex) {
    var badge = document.getElementById('color-badge');
    badge.style.background = hex;
    badge.textContent = hex.toUpperCase();
    badge.style.color = isLight(hex) ? '#333' : '#fff';
  }

  function isLight(hex) {
    var r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
    return (r*299 + g*587 + b*114) / 1000 > 128;
  }

  /* ── Save actions ── */
  function collectService() {
    var name = document.getElementById('service-name').value.trim();
    if (!name) { alert('Please enter a service name.'); return null; }
    return {
      name:        name,
      invoiceName: document.getElementById('invoice-name').value.trim() || null,
      active:      true,
      defaultRate: parseFloat(document.getElementById('default-rate').value) || 0,
      associatedAreas: (function() {
        var key = document.getElementById('area-select').value;
        var obj = { lawn_care: false, lawn_insect: false, flower_beds: false, mosquito: false, mosquito_linear_ft: false, pest_control: false, pest_control_linear_ft: false };
        if (key) obj[key] = true;
        return obj;
      })(),
    };
  }

  async function saveService() {
    var svc = collectService();
    if (!svc) return;
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    var catMode = existing ? (existing.svc_mode || serviceCategory) : serviceCategory;
    var record = { name: svc.name, invoice_name: svc.invoiceName, active: svc.active, default_rate: svc.defaultRate, associated_areas: svc.associatedAreas, service_mixes: collectPmRows(), user_id: uid, assigned_to: document.getElementById('assigned-to').value || null, svc_mode: catMode };
    if (existing) {
      var { error } = await sb.from('Services').update(record).eq('id', existing.id);
    } else {
      var { error } = await sb.from('Services').insert(record);
    }
    if (error) { alert('Error: ' + error.message); return; }
    var dest = 'services?category=' + catMode;
    if (window.parent && window.parent.loadPage) { window.parent.loadPage(dest); } else { window.location.href = 'services.html?category=' + catMode; }
  }

  async function saveAndNew() {
    var svc = collectService();
    if (!svc) return;
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    var { error } = await sb.from('Services').insert({ name: svc.name, invoice_name: svc.invoiceName, active: svc.active, default_rate: svc.defaultRate, user_id: uid, assigned_to: document.getElementById('assigned-to').value || null, svc_mode: serviceCategory });
    if (error) { alert('Error: ' + error.message); return; }
    document.getElementById('service-name').value = '';
    document.getElementById('default-rate').value = '0.00';
    document.getElementById('service-name').focus();
    existing = null;
  }
</script>
</body>
</html>
