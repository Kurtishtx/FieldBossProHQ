<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Employee</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f5f5f5; color: #222; }

    .dialog { max-width: 1100px; margin: 30px auto; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,.15); background: #fff; }
    .dialog-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .dialog-header h1 { font-size: 20px; font-weight: 700; color: #111; }
    .close-btn { background: none; border: 1px solid #bbb; padding: 2px 7px; font-size: 13px; cursor: pointer; color: #555; border-radius: 2px; }
    .close-btn:hover { background: #f0f0f0; }

    .dialog-body { padding: 20px 24px 8px; }

    .section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; padding: 16px 0 10px; border-top: 1px solid #eee; margin-top: 8px; }
    .section-label:first-child { border-top: none; padding-top: 0; }

    .field-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .field-row label { width: 160px; font-weight: 700; font-size: 13px; color: #333; flex-shrink: 0; padding-top: 8px; }
    .field-row input[type="text"],
    .field-row input[type="email"],
    .field-row input[type="tel"],
    .field-row select,
    .field-row textarea {
      flex: 1; width: 100%; border: 1px solid #ccc; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; border-radius: 2px;
    }
    .field-row input:focus, .field-row select:focus, .field-row textarea:focus { border-color: #c47d0a; }

    .toggle-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .toggle-row label.lbl { width: 160px; font-weight: 700; font-size: 13px; color: #333; flex-shrink: 0; }
    .toggle { position: relative; width: 42px; height: 22px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; transition: .2s; }
    .toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: #c47d0a; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
    .toggle-label { font-size: 13px; color: #555; }

    .btn-add-truck {
      background: none; border: 1px dashed #c47d0a; color: #c47d0a;
      padding: 5px 10px; font-size: 12px; font-weight: 700; border-radius: 3px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .btn-add-truck:hover { background: #fff5ee; }

    .mini-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 600;
      align-items: center; justify-content: center;
    }
    .mini-modal-overlay.open { display: flex; }
    .mini-modal {
      background: #fff; border-radius: 6px; padding: 24px 28px;
      width: 320px; position: relative; box-shadow: 0 8px 40px rgba(0,0,0,.3);
    }
    .mini-modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #111; }
    .mini-modal-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: 1px solid #aaa; width: 24px; height: 24px;
      cursor: pointer; font-size: 12px; border-radius: 2px; line-height: 1;
    }
    .mini-modal input[type="text"] {
      width: 100%; border: 1px solid #ccc; padding: 7px 10px;
      font-size: 13px; font-family: inherit; border-radius: 2px; outline: none; margin-bottom: 14px;
    }
    .mini-modal input[type="text"]:focus { border-color: #c47d0a; }
    .mini-modal-footer { display: flex; gap: 10px; align-items: center; }
    .btn-mini-save { background: #c47d0a; color: #fff; border: none; padding: 8px 22px; font-size: 13px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-mini-save:hover { background: #a86808; }
    .btn-mini-cancel { color: #555; font-size: 13px; cursor: pointer; }
    .btn-mini-cancel:hover { text-decoration: underline; }

    .dialog-footer { padding: 16px 24px 24px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; margin-top: 16px; }
    .btn-save { background: #c47d0a; color: #fff; border: none; padding: 9px 28px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save:hover { background: #a86808; }
    .btn-cancel { color: #555; font-size: 13px; cursor: pointer; margin-left: 4px; }
    .btn-cancel:hover { text-decoration: underline; }
    .btn-delete { margin-left: auto; background: none; border: 1px solid #c0392b; color: #c0392b; padding: 7px 16px; font-size: 13px; border-radius: 4px; cursor: pointer; }
    .btn-delete:hover { background: #fdecea; }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="dialog">
  <div class="dialog-header">
    <h1 id="page-title">Add Employee</h1>
    <button class="close-btn" onclick="cancel()">&#10005;</button>
  </div>

  <div class="dialog-body">

    <div class="section-label">Employee Info</div>

    <div class="field-row">
      <label for="emp-first">First Name</label>
      <div style="flex:1;">
        <input type="text" id="emp-first" autocomplete="off"/>
      </div>
    </div>
    <div class="field-row">
      <label for="emp-last">Last Name</label>
      <div style="flex:1;">
        <input type="text" id="emp-last" autocomplete="off"/>
      </div>
    </div>
    <div class="field-row">
      <label for="emp-phone">Phone</label>
      <div style="flex:1;">
        <input type="tel" id="emp-phone" autocomplete="off" placeholder="555-555-5555"/>
      </div>
    </div>
    <div class="field-row">
      <label for="emp-email">Email</label>
      <div style="flex:1;">
        <input type="email" id="emp-email" autocomplete="off"/>
      </div>
    </div>

    <div class="section-label">Assignment</div>

    <div class="field-row">
      <label for="emp-truck">Default Truck</label>
      <div style="flex:1;">
        <select id="emp-truck">
          <option value="">— no truck assigned —</option>
        </select>
      </div>
      <button type="button" class="btn-add-truck" onclick="openAddTruck()">+ Truck</button>
    </div>

    <div class="section-label" id="active-section" style="display:none;">Status</div>
    <div class="toggle-row" id="active-row" style="display:none;">
      <label class="lbl">Active</label>
      <label class="toggle">
        <input type="checkbox" id="emp-active" checked/>
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label" id="active-label">Active</span>
    </div>

  </div>

  <div class="dialog-footer">
    <button class="btn-save" onclick="save()">Save</button>
    <span class="btn-cancel" onclick="cancel()">Cancel</span>
    <button class="btn-delete" id="btn-delete" style="display:none;" onclick="deleteEmployee()">Delete</button>
  </div>
</div>

<!-- Add Truck mini modal -->
<div class="mini-modal-overlay" id="add-truck-overlay">
  <div class="mini-modal">
    <button class="mini-modal-close" onclick="closeAddTruck()">&#10005;</button>
    <h3>Add Truck</h3>
    <input type="text" id="new-truck-name" placeholder="e.g. Truck 1" autocomplete="off"/>
    <div class="mini-modal-footer">
      <button class="btn-mini-save" onclick="saveTruck()">Save</button>
      <span class="btn-mini-cancel" onclick="closeAddTruck()">Cancel</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var editId = null;

  document.getElementById('emp-active').addEventListener('change', function() {
    document.getElementById('active-label').textContent = this.checked ? 'Active' : 'Inactive';
  });

  function openAddTruck() {
    document.getElementById('new-truck-name').value = '';
    document.getElementById('add-truck-overlay').classList.add('open');
    setTimeout(function() { document.getElementById('new-truck-name').focus(); }, 50);
  }
  function closeAddTruck() {
    document.getElementById('add-truck-overlay').classList.remove('open');
  }
  async function saveTruck() {
    var name = document.getElementById('new-truck-name').value.trim();
    if (!name) { alert('Please enter a truck name.'); return; }
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    var { data, error } = await sb.from('trucks').insert({ name: name, active: true, user_id: uid }).select('id, name').single();
    if (error) { alert('Error: ' + error.message); return; }
    closeAddTruck();
    var sel = document.getElementById('emp-truck');
    var opt = document.createElement('option');
    opt.value = data.id; opt.textContent = data.name;
    sel.appendChild(opt);
    sel.value = data.id;
  }

  async function loadTrucks() {
    var { data } = await sb.from('trucks').select('id, name').eq('active', true).order('name');
    var sel = document.getElementById('emp-truck');
    (data || []).forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
  }

  async function init() {
    await loadTrucks();
    var params = new URLSearchParams(window.location.search);
    editId = params.get('id') || null;
    if (editId) {
      document.getElementById('page-title').textContent = 'Edit Employee';
      document.getElementById('btn-delete').style.display = '';
      document.getElementById('active-section').style.display = '';
      document.getElementById('active-row').style.display = 'flex';
      var { data, error } = await sb.from('employees').select('*').eq('id', editId).single();
      if (error || !data) { alert('Employee not found.'); cancel(); return; }
      document.getElementById('emp-first').value  = data.first_name || '';
      document.getElementById('emp-last').value   = data.last_name  || '';
      document.getElementById('emp-phone').value  = data.phone      || '';
      document.getElementById('emp-email').value  = data.email      || '';
      document.getElementById('emp-truck').value  = data.truck_id   || '';
      var activeToggle = document.getElementById('emp-active');
      activeToggle.checked = data.active !== false;
      document.getElementById('active-label').textContent = activeToggle.checked ? 'Active' : 'Inactive';
    }
  }

  async function save() {
    var first = document.getElementById('emp-first').value.trim();
    var last  = document.getElementById('emp-last').value.trim();
    if (!first && !last) { alert('Please enter at least a first or last name.'); return; }
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    var payload = {
      first_name: first,
      last_name:  last,
      phone:      document.getElementById('emp-phone').value.trim() || null,
      email:      document.getElementById('emp-email').value.trim() || null,
      truck_id:   document.getElementById('emp-truck').value        || null,
    };
    if (editId) payload.active = document.getElementById('emp-active').checked;

    var error;
    if (editId) {
      ({ error } = await sb.from('employees').update(payload).eq('id', editId));
    } else {
      payload.user_id = uid;
      ({ error } = await sb.from('employees').insert(payload));
    }
    if (error) { alert('Error: ' + error.message); return; }
    cancel();
  }

  async function deleteEmployee() {
    if (!editId) return;
    if (!confirm('Delete this employee?')) return;
    var { error } = await sb.from('employees').delete().eq('id', editId);
    if (error) { alert('Error: ' + error.message); return; }
    cancel();
  }

  function cancel() {
    if (window.parent && window.parent.loadPage) {
      window.parent.loadPage('employeelist');
    } else {
      window.location.href = 'EmployeeList.html';
    }
  }

  init();
</script>
</body>
</html>
