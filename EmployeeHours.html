<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Hours</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #fff; color: #222; }

    .page-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 10px;
    }
    .page-topbar h1 { font-size: 20px; font-weight: 700; color: #111; }
    .btn-add {
      background: #130520; color: #fff; border: 2px solid #e07820;
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      border-radius: 6px; cursor: pointer;
    }
    .btn-add:hover { background: #1e0a35; }

    .filter-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; background: #f5f5f5; flex-wrap: wrap;
      margin: 2px 16px; border-radius: 8px;
    }
    .table-wrap { background: #fff; margin: 0 16px; }
    .filter-bar label { font-size: 13px; font-weight: 600; color: #444; }
    .filter-bar select, .filter-bar input[type="date"] {
      border: 1px solid #ccc; padding: 5px 8px; font-size: 13px;
      font-family: inherit; border-radius: 3px; outline: none;
    }
    .filter-bar select:focus, .filter-bar input[type="date"]:focus { border-color: #e07820; }
    .filter-bar select { min-width: 200px; }
    .btn-filter {
      background: #130520; color: #fff; border: none; padding: 6px 18px;
      font-size: 13px; font-weight: 600; border-radius: 3px; cursor: pointer;
    }
    .btn-filter:hover { background: #1a0828; }
    .quick-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .quick-link {
      border: 1px solid #bbb; background: #fff; padding: 4px 10px;
      font-size: 12px; cursor: pointer; border-radius: 2px; color: #444;
    }
    .quick-link:hover { background: #eee; }

    .summary-bar {
      display: flex; gap: 20px; padding: 10px 20px;
      background: #130520; color: #fff; flex-wrap: wrap;
    }
    .summary-item { display: flex; flex-direction: column; }
    .summary-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: .4px; }
    .summary-value { font-size: 18px; font-weight: 700; margin-top: 2px; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 9px 14px; text-align: left; font-size: 12.5px;
      font-weight: 600; color: #555; border-bottom: 2px solid #ddd;
      background: #fafafa;
    }
    tbody tr { border-bottom: 1px solid #eee; }
    tbody tr:hover { background: #f9f9f9; }
    tbody td { padding: 9px 14px; color: #333; vertical-align: middle; }
    .pill-active   { background: #d4edda; color: #155724; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
    .pill-complete { background: #d1ecf1; color: #0c5460; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
    .row-action { color: #2272c3; cursor: pointer; text-decoration: underline; font-size: 12px; }
    .row-action:hover { color: #1a5ea0; }

    .empty-msg { padding: 40px; text-align: center; color: #888; }

    .toolbar {
      background: #130520; display: flex; align-items: center;
      padding: 7px 14px; gap: 6px;
    }
    .btn-actions { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none;
      padding: 5px 14px; font-size: 13px; font-weight: 700;
      border-radius: 3px 0 0 3px; cursor: pointer;
    }
    .btn-actions:hover { background: #d4ae00; }
    .btn-actions-caret {
      background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15);
      border-radius: 0 3px 3px 0; padding: 5px 8px; font-size: 12px; cursor: pointer;
    }
    .btn-actions-caret:hover { background: #d4ae00; }
    .dd-wrap { position: relative; display: inline-flex; }
    .dd-menu {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
      background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 12px rgba(0,0,0,.2);
      min-width: 180px; padding: 4px 0;
    }
    .dd-menu.show { display: block; }
    .dd-menu a { display: block; padding: 8px 14px; color: #444; text-decoration: none; font-size: 13px; cursor: pointer; }
    .dd-menu a:hover { background: #f5f5f5; }
    thead th:first-child { width: 40px; text-align: center; }
    tbody td:first-child { text-align: center; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 6px; padding: 28px 32px;
      min-width: 380px; max-width: 440px; position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,.3);
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #111; }
    .modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: 1px solid #aaa; width: 26px; height: 26px;
      cursor: pointer; font-size: 13px; border-radius: 2px; line-height: 1;
    }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
    .modal-field select,
    .modal-field input[type="date"],
    .modal-field input[type="time"] {
      width: 100%; border: 1px solid #ccc; padding: 7px 10px;
      font-size: 13px; font-family: inherit; border-radius: 3px; outline: none;
    }
    .modal-field select:focus,
    .modal-field input:focus { border-color: #e07820; }
    .modal-footer { display: flex; align-items: center; gap: 10px; margin-top: 20px; }
    .btn-save { background: #130520; color: #fff; border: 2px solid #e07820; padding: 8px 24px; font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer; }
    .btn-save:hover { background: #1e0a35; }
    .btn-cancel-modal { color: #555; font-size: 13px; cursor: pointer; }
    .btn-cancel-modal:hover { text-decoration: underline; }
    .btn-delete-entry { margin-left: auto; background: none; border: 1px solid #c0392b; color: #c0392b; padding: 6px 14px; font-size: 12px; border-radius: 3px; cursor: pointer; }
    .btn-delete-entry:hover { background: #fdecea; }
  </style>
  <link rel="stylesheet" href="mobile.css"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="page-topbar">
  <div></div>
  <button class="btn-add" onclick="openModal()">+ Add Entry</button>
</div>

<div class="filter-bar">
  <label>Employee</label>
  <select id="emp-select" onchange="load()">
    <option value="">� All Employees �</option>
  </select>
  <label>From</label>
  <input type="date" id="date-from"/>
  <label>To</label>
  <input type="date" id="date-to"/>
  <div class="quick-links">
    <button class="quick-link" onclick="setRange('today')">Today</button>
    <button class="quick-link" onclick="setRange('week')">This Week</button>
    <button class="quick-link" onclick="setRange('month')">This Month</button>
  </div>
</div>

<!-- Delete confirmation bar -->
<div id="delete-confirm-bar" style="display:none;align-items:center;gap:12px;padding:10px 20px;background:#fff3cd;border-bottom:1px solid #f0c040;font-size:13px;position:sticky;top:0;z-index:500;">
  <span>Are you sure you want to delete <strong id="delete-confirm-count">0</strong> time entr<span id="delete-confirm-plural">ies</span>? This cannot be undone.</span>
  <button onclick="confirmDeleteEntries()" style="background:#c0392b;color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-weight:700;">Yes, Delete</button>
  <button onclick="document.getElementById('delete-confirm-bar').style.display='none'" style="background:none;border:1px solid #999;padding:6px 14px;border-radius:4px;cursor:pointer;">Cancel</button>
</div>

<div class="toolbar">
  <div class="dd-wrap">
    <button class="btn-actions">Actions</button>
    <button class="btn-actions-caret" onclick="toggleDD(event)">&#9660;</button>
    <div class="dd-menu" id="actions-dd">
      <a onclick="deleteSelected()">Delete Selected</a>
    </div>
  </div>
  <div style="margin-left:auto; display:flex; flex-direction:column; align-items:flex-end;">
    <span style="font-size:11px; color:#aaa; text-transform:uppercase; letter-spacing:.4px;">Total Hours</span>
    <span style="font-size:18px; font-weight:700; color:#fff;" id="sum-hours">�</span>
  </div>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"/></th>
      <th>Employee</th>
      <th>Date</th>
      <th>Clock In</th>
      <th>Clock Out</th>
      <th>Lunch</th>
      <th>Break</th>
      <th>Hours</th>
      <th>Status</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="hours-tbody"></tbody>
</table>
<div class="empty-msg" id="empty-msg" style="display:none;">No time entries found for the selected filters.</div>
</div>
<div style="height:28px; background:#130520; margin:0 16px 16px; border-radius:0 0 8px 8px;"></div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <h2 id="modal-title">Add Time Entry</h2>

    <div class="modal-field">
      <label>Employee</label>
      <select id="modal-emp"></select>
    </div>
    <div class="modal-field">
      <label>Date</label>
      <input type="date" id="modal-date"/>
    </div>
    <div class="modal-field">
      <label>Clock In</label>
      <input type="time" id="modal-in"/>
    </div>
    <div class="modal-field">
      <label>Clock Out</label>
      <input type="time" id="modal-out"/>
    </div>
    <div style="border-top:1px solid #eee; margin:14px 0 10px; font-size:11px; font-weight:700; color:#999; text-transform:uppercase; letter-spacing:.5px;">Lunch Break</div>
    <div style="display:flex; gap:10px;">
      <div class="modal-field" style="flex:1;">
        <label>Start</label>
        <input type="time" id="modal-lunch-start"/>
      </div>
      <div class="modal-field" style="flex:1;">
        <label>End</label>
        <input type="time" id="modal-lunch-end"/>
      </div>
    </div>
    <div style="border-top:1px solid #eee; margin:14px 0 10px; font-size:11px; font-weight:700; color:#999; text-transform:uppercase; letter-spacing:.5px;">Break</div>
    <div style="display:flex; gap:10px;">
      <div class="modal-field" style="flex:1;">
        <label>Start</label>
        <input type="time" id="modal-break-start"/>
      </div>
      <div class="modal-field" style="flex:1;">
        <label>End</label>
        <input type="time" id="modal-break-end"/>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-save" onclick="saveEntry()">Save</button>
      <span class="btn-cancel-modal" onclick="closeModal()">Cancel</span>
      <button class="btn-delete-entry" id="modal-delete-btn" style="display:none;" onclick="deleteEntry()">Delete</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var employees = [];
  var logs      = [];
  var editId    = null;

  function toggleDD(e) {
    e.stopPropagation();
    document.getElementById('actions-dd').classList.toggle('show');
  }
  document.addEventListener('click', function() { document.getElementById('actions-dd').classList.remove('show'); });

  function toggleAll(checked) {
    document.querySelectorAll('.row-cb').forEach(function(cb) { cb.checked = checked; });
  }

  function getSelected() {
    var ids = [];
    document.querySelectorAll('.row-cb:checked').forEach(function(cb) { ids.push(cb.dataset.id); });
    return ids;
  }

  function deleteSelected() {
    var ids = getSelected();
    if (!ids.length) { alert('Select at least one entry.'); return; }
    var bar = document.getElementById('delete-confirm-bar');
    document.getElementById('delete-confirm-count').textContent = ids.length;
    document.getElementById('delete-confirm-plural').textContent = ids.length === 1 ? 'y' : 'ies';
    bar.dataset.ids = JSON.stringify(ids);
    bar.style.display = 'flex';
  }

  async function confirmDeleteEntries() {
    var bar = document.getElementById('delete-confirm-bar');
    var ids = JSON.parse(bar.dataset.ids || '[]');
    bar.style.display = 'none';
    var { error } = await sb.from('employee_time_logs').delete().in('id', ids);
    if (error) { alert('Error: ' + error.message); return; }
    load();
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function toDateStr(d) {
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }

  function setRange(type) {
    var now   = new Date();
    var from, to = toDateStr(now);
    if (type === 'today') {
      from = to;
    } else if (type === 'week') {
      var day = now.getDay();
      var mon = new Date(now); mon.setDate(now.getDate() - day + (day === 0 ? -6 : 1));
      from = toDateStr(mon);
    } else if (type === 'month') {
      from = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-01';
    }
    document.getElementById('date-from').value = from;
    document.getElementById('date-to').value   = to;
    load();
  }

  function calcHours(inTs, outTs) {
    if (!inTs || !outTs) return null;
    var diff = (new Date(outTs) - new Date(inTs)) / 3600000;
    return diff > 0 ? diff : null;
  }

  function fmtHours(h) {
    if (h === null || h === undefined) return '�';
    var hrs = Math.floor(h);
    var min = Math.round((h - hrs) * 60);
    return hrs + 'h ' + pad(min) + 'm';
  }

  function fmtTime(ts) {
    if (!ts) return '�';
    var d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function fmtDate(ts) {
    if (!ts) return '�';
    var d = new Date(ts);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  async function loadEmployees() {
    var { data } = await sb.from('employees').select('id, first_name, last_name').eq('active', true).order('last_name');
    employees = data || [];
    var empSel = document.getElementById('emp-select');
    var modalSel = document.getElementById('modal-emp');
    employees.forEach(function(e) {
      var name = e.last_name + ', ' + e.first_name;
      var opt1 = document.createElement('option'); opt1.value = e.id; opt1.textContent = name; empSel.appendChild(opt1);
      var opt2 = document.createElement('option'); opt2.value = e.id; opt2.textContent = name; modalSel.appendChild(opt2);
    });
  }

  async function load() {
    var empId   = document.getElementById('emp-select').value;
    var dateFrom = document.getElementById('date-from').value;
    var dateTo   = document.getElementById('date-to').value;

    var query = sb.from('employee_time_logs')
      .select('id, employee_id, clock_in, clock_out, lunch_start, lunch_end, break_start, break_end')
      .order('clock_in', { ascending: false });

    if (empId)   query = query.eq('employee_id', empId);
    if (dateFrom) query = query.gte('clock_in', dateFrom + 'T00:00:00');
    if (dateTo)   query = query.lte('clock_in', dateTo   + 'T23:59:59');

    var { data, error } = await query;
    if (error) { console.error(error); return; }
    logs = data || [];
    renderTable();
  }

  function renderTable() {
    var tbody = document.getElementById('hours-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    tbody.innerHTML = '';

    var totalHours = 0, completedShifts = 0;
    logs.forEach(function(log) {
      var h = calcHours(log.clock_in, log.clock_out);
      if (h !== null) { totalHours += h; completedShifts++; }

      var empObj = employees.find(function(e) { return e.id === log.employee_id; });
      var emp = empObj ? (empObj.last_name + ', ' + empObj.first_name) : '�';
      var status = log.clock_out
        ? '<span class="pill-complete">Completed</span>'
        : '<span class="pill-active">Clocked In</span>';

      var lunchH  = calcHours(log.lunch_start, log.lunch_end);
      var breakH  = calcHours(log.break_start, log.break_end);
      var lunchCell = log.lunch_start ? (fmtTime(log.lunch_start) + (log.lunch_end ? ' � ' + fmtTime(log.lunch_end) + '<br><span style="font-size:11px;color:#888;">' + fmtHours(lunchH) + '</span>' : ' <span style="font-size:11px;color:#e07820;">out</span>')) : '�';
      var breakCell = log.break_start ? (fmtTime(log.break_start) + (log.break_end ? ' � ' + fmtTime(log.break_end) + '<br><span style="font-size:11px;color:#888;">' + fmtHours(breakH) + '</span>' : ' <span style="font-size:11px;color:#e07820;">out</span>')) : '�';

      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><input type="checkbox" class="row-cb" data-id="' + log.id + '" onclick="event.stopPropagation()"/></td>' +
        '<td>' + emp + '</td>' +
        '<td>' + fmtDate(log.clock_in) + '</td>' +
        '<td>' + fmtTime(log.clock_in) + '</td>' +
        '<td>' + fmtTime(log.clock_out) + '</td>' +
        '<td>' + lunchCell + '</td>' +
        '<td>' + breakCell + '</td>' +
        '<td>' + fmtHours(h) + '</td>' +
        '<td>' + status + '</td>' +
        '<td><span class="row-action" onclick="openModal(\'' + log.id + '\')">Edit</span></td>';
      tbody.appendChild(tr);
    });

    document.getElementById('sum-shifts').textContent = logs.length;
    document.getElementById('sum-hours').textContent  = fmtHours(totalHours);
    document.getElementById('sum-avg').textContent    = completedShifts ? fmtHours(totalHours / completedShifts) : '�';
    emptyMsg.style.display = logs.length ? 'none' : '';
  }

  function openModal(id) {
    editId = id || null;
    document.getElementById('modal-title').textContent = editId ? 'Edit Time Entry' : 'Add Time Entry';
    document.getElementById('modal-delete-btn').style.display = editId ? '' : 'none';
    document.getElementById('modal-emp').value         = '';
    document.getElementById('modal-date').value        = toDateStr(new Date());
    document.getElementById('modal-in').value          = '';
    document.getElementById('modal-out').value         = '';
    document.getElementById('modal-lunch-start').value = '';
    document.getElementById('modal-lunch-end').value   = '';
    document.getElementById('modal-break-start').value = '';
    document.getElementById('modal-break-end').value   = '';

    if (editId) {
      var log = logs.find(function(l) { return l.id === editId; });
      if (log) {
        document.getElementById('modal-emp').value = log.employee_id;
        if (log.clock_in) {
          var ci = new Date(log.clock_in);
          document.getElementById('modal-date').value = toDateStr(ci);
          document.getElementById('modal-in').value   = pad(ci.getHours()) + ':' + pad(ci.getMinutes());
        }
        if (log.clock_out) {
          var co = new Date(log.clock_out);
          document.getElementById('modal-out').value = pad(co.getHours()) + ':' + pad(co.getMinutes());
        }
        if (log.lunch_start) { var ls = new Date(log.lunch_start); document.getElementById('modal-lunch-start').value = pad(ls.getHours()) + ':' + pad(ls.getMinutes()); }
        if (log.lunch_end)   { var le = new Date(log.lunch_end);   document.getElementById('modal-lunch-end').value   = pad(le.getHours()) + ':' + pad(le.getMinutes()); }
        if (log.break_start) { var bs = new Date(log.break_start); document.getElementById('modal-break-start').value = pad(bs.getHours()) + ':' + pad(bs.getMinutes()); }
        if (log.break_end)   { var be = new Date(log.break_end);   document.getElementById('modal-break-end').value   = pad(be.getHours()) + ':' + pad(be.getMinutes()); }
      }
    }

    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editId = null;
  }

  async function saveEntry() {
    var empId   = document.getElementById('modal-emp').value;
    var date    = document.getElementById('modal-date').value;
    var inTime  = document.getElementById('modal-in').value;
    var outTime = document.getElementById('modal-out').value;

    if (!empId)  { alert('Please select an employee.'); return; }
    if (!date)   { alert('Please select a date.'); return; }
    if (!inTime) { alert('Please enter a clock-in time.'); return; }

    var saveBtn = document.querySelector('#modal-overlay .btn-save');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving�'; }

    var clockIn  = new Date(date + 'T' + inTime  + ':00').toISOString();
    var clockOut = outTime ? new Date(date + 'T' + outTime + ':00').toISOString() : null;

    var lunchStart = document.getElementById('modal-lunch-start').value;
    var lunchEnd   = document.getElementById('modal-lunch-end').value;
    var breakStart = document.getElementById('modal-break-start').value;
    var breakEnd   = document.getElementById('modal-break-end').value;

    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    var payload = {
      employee_id:  empId,
      clock_in:     clockIn,
      clock_out:    clockOut,
      lunch_start:  lunchStart ? new Date(date + 'T' + lunchStart + ':00').toISOString() : null,
      lunch_end:    lunchEnd   ? new Date(date + 'T' + lunchEnd   + ':00').toISOString() : null,
      break_start:  breakStart ? new Date(date + 'T' + breakStart + ':00').toISOString() : null,
      break_end:    breakEnd   ? new Date(date + 'T' + breakEnd   + ':00').toISOString() : null,
    };
    var error;
    if (editId) {
      ({ error } = await sb.from('employee_time_logs').update(payload).eq('id', editId));
    } else {
      payload.user_id = uid;
      ({ error } = await sb.from('employee_time_logs').insert(payload));
    }
    if (error) {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      alert('Error: ' + error.message); return;
    }
    closeModal();
    load();
  }

  async function deleteEntry() {
    if (!editId) return;
    if (!confirm('Delete this time entry?')) return;
    var { error } = await sb.from('employee_time_logs').delete().eq('id', editId);
    if (error) { alert('Error: ' + error.message); return; }
    closeModal();
    load();
  }

  async function init() {
    await loadEmployees();
    setRange('week');
  }

  init();
</script>
</body>
