<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #ede5d8; color: #222; }

    .page-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 10px;
    }
    .page-topbar-left .item-count { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 3px; }
    .btn-add {
      background: #1e1208 !important; color: #fff !important; border: 2px solid #c47d0a !important;
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      border-radius: 6px; cursor: pointer; white-space: nowrap;
    }
    .btn-add:hover { background: #2a1a0a !important; }

    .toolbar {
      background: #1e1208; display: flex; align-items: center;
      justify-content: space-between; padding: 7px 14px; gap: 6px;
    }
    .toolbar-left { display: flex; align-items: center; gap: 6px; }
    .btn-actions { background: #e8c000; color: #000; border: 2px solid #fff; border-right: none;
      padding: 5px 14px; font-size: 13px; font-weight: 700;
      border-radius: 3px 0 0 3px; cursor: pointer;
    }
    .btn-actions:hover { background: #d4ae00; }
    .btn-actions-caret {
      background: #e8c000; color: #000; border: 2px solid #fff; border-left: 1px solid rgba(0,0,0,.15);
      border-radius: 0 3px 3px 0; padding: 5px 8px; font-size: 12px; cursor: pointer;
    }
    .btn-actions-caret:hover { background: #d4ae00; }

    .dropdown { position: relative; display: inline-flex; }
    .dd-menu {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
      background: #fff; border: 1px solid #ccc; box-shadow: 0 4px 12px rgba(0,0,0,.2);
      min-width: 180px; padding: 4px 0;
    }
    .dd-menu.show { display: block; }
    .dd-menu button {
      display: block; width: 100%; padding: 8px 14px; color: #444;
      font-size: 13px; cursor: pointer; background: none; border: none;
      text-align: left; font-family: inherit;
    }
    .dd-menu button:hover { background: #f5f5f5; }

    .filter-tabs {
      display: flex; gap: 6px; padding: 8px 14px; flex-wrap: wrap;
      background: #241508; border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .ftab {
      padding: 5px 16px; border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06); font-size: 13px; font-family: inherit;
      cursor: pointer; border-radius: 20px; color: rgba(255,255,255,.6);
      transition: background .15s;
    }
    .ftab:hover { background: rgba(255,255,255,.12); color: #fff; }
    .ftab.active { background: #c47d0a; color: #fff; border-color: #c47d0a; font-weight: 700; }

    .table-wrap { background: #fff; margin: 0 16px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px; text-align: left; font-size: 12px;
      font-weight: 700; color: #fff; border-bottom: 2px solid #7a7098;
      background: #7a6040; text-transform: uppercase; letter-spacing: .4px;
    }
    thead th:first-child { width: 40px; text-align: center; }
    tbody tr { border-bottom: 1px solid #eee; cursor: pointer; background: #fff; }
    tbody tr:hover { background: #f5f3fa; }
    tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }
    tbody td:first-child { text-align: center; }
    .name-link { color: #8a5518; text-decoration: underline; font-size: 13px; }

    .empty-msg { padding: 32px; text-align: center; color: #888; }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="page-topbar">
  <div class="page-topbar-left">
    <div class="item-count" id="item-count">0 items</div>
  </div>
  <button class="btn-add" onclick="window.location.href='ProductsAdd.html'">Add Product</button>
</div>

<div id="delete-confirm-bar" style="display:none;align-items:center;gap:12px;padding:10px 20px;background:#c0392b;color:#fff;font-size:13px;margin:0 16px 4px;border-radius:6px;">
  <span>Delete <strong id="delete-confirm-count">0</strong> product(s)? This cannot be undone.</span>
  <button onclick="confirmDelete()" style="background:#fff;color:#c0392b;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-weight:700;">Yes, Delete</button>
  <button onclick="document.getElementById('delete-confirm-bar').style.display='none'" style="background:none;border:1px solid rgba(255,255,255,.5);color:#fff;padding:6px 14px;border-radius:4px;cursor:pointer;">Cancel</button>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="dropdown">
      <button class="btn-actions">Actions</button>
      <button class="btn-actions-caret" onclick="toggleDD(event)">&#9660;</button>
      <div class="dd-menu" id="actions-dd">
        <button onclick="window.location.href='ProductsAdd.html'">Add Product</button>
        <button onclick="makeProductsActive(true)">Make Active</button>
        <button onclick="makeProductsActive(false)">Make Inactive</button>
        <button onclick="deleteSelected()">Delete</button>
        <button onclick="exportProducts()">Export</button>
      </div>
    </div>
  </div>
  <div id="pagination-bar" style="display:none;align-items:center;gap:6px;font-size:13px;color:#ccc;">
    <button onclick="goPage(-1)" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:4px 10px;cursor:pointer;border-radius:3px;">&#9664;</button>
    <span>Page <strong id="pg-current-num" style="color:#e8c000;">1</strong> of <strong id="pg-total-num" style="color:#fff;">1</strong></span>
    <button onclick="goPage(1)" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:4px 10px;cursor:pointer;border-radius:3px;">&#9654;</button>
  </div>
</div>

<div class="filter-tabs">
  <button class="ftab active" onclick="setTab(this,'active')">Active</button>
  <button class="ftab" onclick="setTab(this,'inactive')">Inactive</button>
  <button class="ftab" onclick="setTab(this,'all')">All</button>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th><input type="checkbox" id="select-all" onchange="toggleAll(this)"/></th>
      <th>Name</th>
      <th>Part #</th>
      <th>Description</th>
      <th>Type</th>
      <th>Price</th>
      <th>Active</th>
    </tr>
  </thead>
  <tbody id="product-tbody"></tbody>
</table>
<div class="empty-msg" id="empty-msg" style="display:none;">No products found.</div>
</div>
<div style="height:28px; background:#1e1208; margin:0 16px 16px; border-radius:0 0 8px 8px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var products = [];
  var currentTab = 'active';
  var currentPage = 1, totalCount = 0, PAGE_SIZE = 1000;

  function toggleDD(e) {
    e.stopPropagation();
    document.getElementById('actions-dd').classList.toggle('show');
  }
  document.addEventListener('click', function() {
    document.getElementById('actions-dd').classList.remove('show');
  });

  function setTab(btn, tab) {
    document.querySelectorAll('.ftab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentTab = tab;
    renderTable();
  }

  function goPage(dir) {
    var totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
    loadProducts();
  }

  async function loadProducts() {
    var { count } = await sb.from('Products').select('*', { count: 'exact', head: true });
    totalCount = count || 0;
    var totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;
    var start = (currentPage - 1) * PAGE_SIZE;
    var { data, error } = await sb.from('Products').select('*').order('name', { ascending: true }).range(start, start + PAGE_SIZE - 1);
    document.getElementById('pagination-bar').style.display = totalCount > PAGE_SIZE ? 'flex' : 'none';
    document.getElementById('pg-current-num').textContent = currentPage;
    document.getElementById('pg-total-num').textContent = totalPages;
    if (error) { console.error(error); return; }
    products = data || [];
    renderTable();
  }

  function renderTable() {
    var tbody = document.getElementById('product-tbody');
    var emptyMsg = document.getElementById('empty-msg');
    tbody.innerHTML = '';
    var filtered = products.filter(function(p) {
      if (currentTab === 'active')   return p.active;
      if (currentTab === 'inactive') return !p.active;
      return true;
    });
    document.getElementById('item-count').textContent = filtered.length + ' item' + (filtered.length !== 1 ? 's' : '');
    if (filtered.length === 0) { emptyMsg.style.display = ''; return; }
    emptyMsg.style.display = 'none';
    filtered.forEach(function(p) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><input type="checkbox" class="row-cb" data-id="' + p.id + '" onclick="event.stopPropagation()"/></td>' +
        '<td><span class="name-link">' + (p.name || '') + '</span></td>' +
        '<td>' + (p.part_number || '') + '</td>' +
        '<td>' + (p.description || '') + '</td>' +
        '<td>' + (p.type || '') + '</td>' +
        '<td>' + (p.price != null ? parseFloat(p.price).toFixed(2) : '') + '</td>' +
        '<td>' + (p.active ? 'Active' : 'Inactive') + '</td>';
      tr.addEventListener('click', function(e) {
        if (e.target.type === 'checkbox') return;
        window.location.href = 'ProductsAdd.html?id=' + p.id;
      });
      tbody.appendChild(tr);
    });
  }

  function toggleAll(cb) {
    document.querySelectorAll('#product-tbody input[type="checkbox"]')
      .forEach(function(c) { c.checked = cb.checked; });
  }

  function getSelectedIds() {
    return Array.from(document.querySelectorAll('.row-cb:checked')).map(function(cb) { return cb.getAttribute('data-id'); });
  }

  function deleteSelected() {
    document.getElementById('actions-dd').classList.remove('show');
    var ids = getSelectedIds();
    if (!ids.length) { alert('Check the box next to each product you want to delete first.'); return; }
    document.getElementById('delete-confirm-count').textContent = ids.length;
    var bar = document.getElementById('delete-confirm-bar');
    bar.dataset.ids = JSON.stringify(ids);
    bar.style.display = 'flex';
  }

  async function confirmDelete() {
    var bar = document.getElementById('delete-confirm-bar');
    var ids = JSON.parse(bar.dataset.ids || '[]');
    bar.style.display = 'none';
    for (var i = 0; i < ids.length; i += 50) {
      var { error } = await sb.from('Products').delete().in('id', ids.slice(i, i + 50));
      if (error) { alert('Error deleting: ' + error.message); return; }
    }
    loadProducts();
  }

  async function makeProductsActive(active) {
    document.getElementById('actions-dd').classList.remove('show');
    var ids = getSelectedIds();
    if (!ids.length) { alert('Check the box next to each product you want to update first.'); return; }
    for (var i = 0; i < ids.length; i += 50) {
      var { error } = await sb.from('Products').update({ active: active }).in('id', ids.slice(i, i + 50));
      if (error) { alert('Update failed: ' + error.message); return; }
    }
    loadProducts();
  }

  function exportProducts() {
    document.getElementById('actions-dd').classList.remove('show');
    var rows = [['Name','Part #','Description','Type','Price','Active']];
    products.forEach(function(p) {
      rows.push([p.name||'', p.part_number||'', p.description||'', p.type||'',
        p.price != null ? parseFloat(p.price).toFixed(2) : '',
        p.active ? 'Active' : 'Inactive']);
    });
    var csv = rows.map(function(r) {
      return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(',');
    }).join('\n');
    var a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'products.csv';
    a.click();
  }

  loadProducts();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intro.js@7/introjs.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/intro.js@7/intro.min.js"></script>
<script src="tour.js"></script>
<style>.help-tour-btn{position:fixed;bottom:22px;right:22px;width:42px;height:42px;border-radius:50%;background:#e07820;color:#fff;border:none;font-size:20px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:999;display:flex;align-items:center;justify-content:center;line-height:1;} .help-tour-btn:hover{background:#c96a10;transform:scale(1.08);}</style>
<button class="help-tour-btn" data-tour-page="productslist" onclick="startTour('productslist')" title="Page walkthrough">?</button>
</body>
</html>
