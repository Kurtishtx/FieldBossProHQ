    .tab-btn {
      padding: 8px 22px; border: none; background: none; cursor: pointer;
      font-size: 13px; font-weight: 600; font-family: inherit; color: #888;
      border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap;
    }
    .tab-btn.active { color: #111; border-bottom-color: #111; }
    .tab-btn:hover:not(.active) { color: #444; }

    .tab-panel { display: none; padding: 16px 24px; flex-wrap: wrap; gap: 20px 14px; align-items: flex-start; }
    .tab-panel.active { display: flex; }

    .perm-group { flex: 0 0 calc(20% - 12px); min-width: 170px; }
    .perm-group-hdr {
      display: flex; align-items: flex-start; gap: 6px;
      font-weight: 700; font-size: 13px; color: #c47d0a;
      border-bottom: 1px solid #bbb; padding-bottom: 6px; margin-bottom: 6px;
    }
    .perm-group-hdr input[type="checkbox"] { margin-top: 2px; cursor: pointer; accent-color: #c47d0a; }
    .perm-group-hdr span { cursor: pointer; }

    .perm-item { display: flex; align-items: flex-start; gap: 5px; padding: 2px 0; }
    .perm-item input[type="checkbox"] { margin-top: 2px; cursor: pointer; accent-color: #c47d0a; flex-shrink: 0; }
    .perm-item label { cursor: pointer; font-size: 12.5px; color: #333; line-height: 1.4; }

    .perm-label-only { padding: 2px 0; font-size: 12.5px; color: #333; line-height: 1.6; }

    .radio-group { padding-left: 14px; }
    .radio-item { display: flex; align-items: center; gap: 5px; padding: 1px 0; }
    .radio-item input[type="radio"] { cursor: pointer; accent-color: #c47d0a; }
    .radio-item label { cursor: pointer; font-size: 12px; color: #888; }

    .footer {
      padding: 16px 24px; border-top: 1px solid #eee;
      display: flex; align-items: center; gap: 12px; justify-content: center;
      margin-top: 8px;
    }
    .btn-save {
      background: #c47d0a; color: #fff; border: none;
      padding: 10px 36px; font-size: 14px; font-weight: 700;
      border-radius: 4px; cursor: pointer;
    }
    .btn-save:hover { background: #a86808; }
    .btn-cancel { color: #c47d0a; text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-cancel:hover { text-decoration: underline; }

/* ── State ── */
var roleId = new URLSearchParams(window.location.search).get('id');
var existingRole = null;
var currentTabIdx = 0;

/* ── Build UI ── */
function buildUI() {
  var tabBar = document.getElementById('tab-bar');
  var panels = document.getElementById('tab-panels');

  TABS.forEach(function(tab, idx) {
    /* tab button */
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = tab.name;
    btn.addEventListener('click', function() { switchTab(idx); });
    tabBar.appendChild(btn);

    /* tab panel */
    var panel = document.createElement('div');
    panel.className = 'tab-panel' + (idx === 0 ? ' active' : '');
    panel.id = 'panel-' + idx;

    tab.groups.forEach(function(group) {
      var grpDiv = document.createElement('div');
      grpDiv.className = 'perm-group';

      /* group header */
      var hdr = document.createElement('div');
      hdr.className = 'perm-group-hdr';
      var grpCb = document.createElement('input');
      grpCb.type = 'checkbox';
      grpCb.id = 'grp_' + group.key;
      grpCb.addEventListener('change', function() { toggleGroup(group, this.checked); });
      var grpLbl = document.createElement('span');
      grpLbl.textContent = group.label;
      grpLbl.style.cursor = 'pointer';
      grpLbl.addEventListener('click', function() { grpCb.click(); });
      hdr.appendChild(grpCb);
      hdr.appendChild(grpLbl);
      grpDiv.appendChild(hdr);

      /* items */
      group.items.forEach(function(item) {
        renderItem(grpDiv, item, group.key);
      });

      panel.appendChild(grpDiv);
    });

    panels.appendChild(panel);
  });
}

function renderItem(container, item, groupKey) {
  if (item.radioOnly) {
    /* label-only row + radio group (e.g. Send Emails From) */
    var lblDiv = document.createElement('div');
    lblDiv.className = 'perm-label-only';
    lblDiv.textContent = item.l;
    container.appendChild(lblDiv);
    var rg = document.createElement('div');
    rg.className = 'radio-group';
    (item.children || []).forEach(function(opt) {
      var ri = document.createElement('div');
      ri.className = 'radio-item';
      var rb = document.createElement('input');
      rb.type = 'radio';
      rb.name = 'radio_' + item.k;
      rb.id = 'perm_' + opt.k;
      rb.value = opt.k;
      var rl = document.createElement('label');
      rl.htmlFor = 'perm_' + opt.k;
      rl.textContent = opt.l;
      ri.appendChild(rb);
      ri.appendChild(rl);
      rg.appendChild(ri);
    });
    container.appendChild(rg);
    return;
  }

  var row = document.createElement('div');
  row.className = 'perm-item';
  var cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.id = 'perm_' + item.k;
  cb.dataset.group = groupKey;
  cb.addEventListener('change', function() { updateGroupHeader(groupKey); });
  var lbl = document.createElement('label');
  lbl.htmlFor = 'perm_' + item.k;
  lbl.textContent = item.l;
  row.appendChild(cb);
  row.appendChild(lbl);
  container.appendChild(row);

  if (item.children) {
    var rg = document.createElement('div');
    rg.className = 'radio-group';
    item.children.forEach(function(opt) {
      var ri = document.createElement('div');
      ri.className = 'radio-item';
      var rb = document.createElement('input');
      rb.type = 'radio';
      rb.name = 'radio_' + item.k;
      rb.id = 'perm_' + opt.k;
      rb.value = opt.k;
      var rl = document.createElement('label');
      rl.htmlFor = 'perm_' + opt.k;
      rl.textContent = opt.l;
      ri.appendChild(rb);
      ri.appendChild(rl);
      rg.appendChild(ri);
    });
    container.appendChild(rg);
  }
}

/* ── Tab switching ── */
function switchTab(idx) {
  currentTabIdx = idx;
  document.querySelectorAll('.tab-btn').forEach(function(b, i){ b.classList.toggle('active', i === idx); });
  document.querySelectorAll('.tab-panel').forEach(function(p, i){ p.classList.toggle('active', i === idx); });
  updateSelectAllState();
}

/* ── Group checkbox helpers ── */
function toggleGroup(group, checked) {
  getAllGroupItems(group).forEach(function(cb){ cb.checked = checked; });
}

function getAllGroupItems(group) {
  var items = [];
  group.items.forEach(function(item) {
    if (!item.radioOnly) {
      var el = document.getElementById('perm_' + item.k);
      if (el) items.push(el);
    }
  });
  return items;
}

function updateGroupHeader(groupKey) {
  var allCbs = document.querySelectorAll('[data-group="' + groupKey + '"]');
  var grpCb = document.getElementById('grp_' + groupKey);
  if (!grpCb || !allCbs.length) return;
  var checkedCount = 0;
  allCbs.forEach(function(cb){ if (cb.checked) checkedCount++; });
  grpCb.checked = checkedCount === allCbs.length;
  grpCb.indeterminate = checkedCount > 0 && checkedCount < allCbs.length;
}

/* ── Select all on current tab ── */
function selectAllCurrentTab(checked) {
  var panel = document.getElementById('panel-' + currentTabIdx);
  if (!panel) return;
  panel.querySelectorAll('input[type="checkbox"]').forEach(function(cb){
    if (cb.id.startsWith('perm_')) cb.checked = checked;
  });
  panel.querySelectorAll('input[type="checkbox"][id^="grp_"]').forEach(function(cb){
    cb.checked = checked;
    cb.indeterminate = false;
  });
}

function updateSelectAllState() {
  var panel = document.getElementById('panel-' + currentTabIdx);
  var selectAllCb = document.getElementById('select-all-tab');
  if (!panel || !selectAllCb) return;
  var all = panel.querySelectorAll('input[type="checkbox"][id^="perm_"]');
  var checked = 0;
  all.forEach(function(cb){ if (cb.checked) checked++; });
  selectAllCb.checked = all.length > 0 && checked === all.length;
  selectAllCb.indeterminate = checked > 0 && checked < all.length;
}

/* ── Save ── */
async function saveRole() {
  var name = document.getElementById('role-name').value.trim();
  if (!name) { alert('Please enter a role name.'); document.getElementById('role-name').focus(); return; }

  var permissions = {};
  document.querySelectorAll('input[type="checkbox"][id^="perm_"]').forEach(function(cb){
    permissions[cb.id.replace('perm_', '')] = cb.checked;
  });

  var radioValues = {};
  document.querySelectorAll('input[type="radio"]:checked').forEach(function(rb){
    radioValues[rb.name.replace('radio_', '')] = rb.value;
  });

  var payload = {
    name:         name,
    description:  document.getElementById('role-desc').value.trim(),
    permissions:  permissions,
    radio_values: radioValues
  };

  var error;
  if (existingRole) {
    ({ error } = await sb.from('roles').update(payload).eq('id', existingRole.id));
  } else {
    payload.active = true;
    var { data: sessionData } = await sb.auth.getSession();
    var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
    payload.user_id = uid;
    ({ error } = await sb.from('roles').insert(payload));
  }
  if (error) { alert('Error: ' + error.message); return; }
  window.location.href = 'UserRoles.html';
}

/* ── Cancel ── */
function cancel() {
  window.location.href = 'UserRoles.html';
}

/* ── Populate existing role ── */
function populateRole(role) {
  document.getElementById('page-title').textContent = 'Edit Role';
  document.getElementById('role-name').value = role.name || '';
  document.getElementById('role-desc').value = role.description || '';

  var perms = role.permissions || {};
  Object.keys(perms).forEach(function(k) {
    var el = document.getElementById('perm_' + k);
    if (el && el.type === 'checkbox') el.checked = !!perms[k];
  });

  var radios = role.radioValues || {};
  Object.keys(radios).forEach(function(k) {
    var rb = document.querySelector('input[type="radio"][name="radio_' + k + '"][value="' + radios[k] + '"]');
    if (rb) rb.checked = true;
  });

  /* update all group headers */
  TABS.forEach(function(tab) {
    tab.groups.forEach(function(group) {
      updateGroupHeader(group.key);
    });
  });
}

/* ── Init ── */
buildUI();

(async function initRole() {
  if (!roleId) return;
  var { data } = await sb.from('roles').select('*').eq('id', roleId).single();
  if (!data) return;
  existingRole = data;
  if (data.radio_values) data.radioValues = data.radio_values;
  populateRole(data);
})();
</script>
