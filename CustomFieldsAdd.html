<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Fields</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; background: #f5f5f5; color: #222; }

    .dialog { max-width: 1100px; margin: 30px auto; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,.15); background: #fff; }
    .dialog-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px 14px; border-bottom: 1px solid #eee; }
    .dialog-header h1 { font-size: 20px; font-weight: 700; color: #111; }
    .close-btn { background: none; border: 1px solid #bbb; padding: 2px 7px; font-size: 13px; cursor: pointer; color: #555; border-radius: 2px; }
    .close-btn:hover { background: #f0f0f0; }

    .dialog-body { padding: 20px 24px 8px; }

    .section-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; padding: 16px 0 10px; border-top: 1px solid #eee; margin-top: 8px; }
    .section-label:first-child { border-top: none; padding-top: 0; }

    .field-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .field-row label { width: 160px; font-weight: 700; font-size: 13px; color: #333; flex-shrink: 0; padding-top: 8px; }
    .field-row input[type="text"],
    .field-row input[type="number"],
    .field-row select,
    .field-row textarea {
      flex: 1; width: 100%; border: 1px solid #ccc; padding: 7px 10px;
      font-size: 13px; font-family: inherit; outline: none; border-radius: 2px;
    }
    .field-row input:focus, .field-row select:focus, .field-row textarea:focus { border-color: #c47d0a; }
    .field-hint { font-size: 12px; color: #999; margin-top: 3px; }

    .dialog-footer { padding: 16px 24px 24px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; margin-top: 16px; }
    .btn-save { background: #c47d0a; color: #fff; border: none; padding: 9px 28px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save:hover { background: #a86808; }
    .btn-save-new { background: #c47d0a; color: #fff; border: none; padding: 9px 20px; font-size: 14px; font-weight: 700; border-radius: 4px; cursor: pointer; }
    .btn-save-new:hover { background: #a86808; }
    .btn-cancel { color: #555; font-size: 13px; cursor: pointer; margin-left: 4px; }
    .btn-cancel:hover { text-decoration: underline; }
  </style>
  <link rel="stylesheet" href="mobile.css?v=2"/>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>

<div class="dialog">
  <div class="dialog-header">
    <h1 id="page-title">Add Custom Field</h1>
    <button class="close-btn" onclick="cancel()">&#10007;</button>
  </div>

  <div class="dialog-body">

    <div class="section-label">Details</div>

    <div class="field-row">
      <label for="field-name">Name</label>
      <div style="flex:1;">
        <input type="text" id="field-name" autofocus/>
      </div>
    </div>

    <div class="field-row">
      <label for="field-desc">Description</label>
      <div style="flex:1;">
        <input type="text" id="field-desc"/>
      </div>
    </div>

    <div class="field-row">
      <label for="field-order">Display Order</label>
      <div style="flex:1;">
        <input type="number" id="field-order" value="0" min="0" style="max-width:120px;"/>
      </div>
    </div>

  </div>

  <div class="dialog-footer">
    <button class="btn-save" onclick="saveField(false)">Save</button>
    <button class="btn-save-new" onclick="saveField(true)">Save &amp; New</button>
    <span class="btn-cancel" onclick="cancel()">Cancel</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const sb = supabase.createClient(
    "https://knjdbgroiyhvqwrpqzcx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuamRiZ3JvaXlodnF3cnBxemN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTczMDMsImV4cCI6MjA5NTA3MzMwM30.zoExtkem-XZqU86S4yJjA_xOOaS1G0IPU2M9OAAza2g",
  { auth: { autoRefreshToken: false, detectSessionInUrl: false } }
  );

  var editId = new URLSearchParams(window.location.search).get('id');

  async function init() {
    if (!editId) return;
    document.getElementById('page-title').textContent = 'Edit Custom Field';
    var { data } = await sb.from('custom_fields').select('*').eq('id', editId).single();
    if (!data) return;
    document.getElementById('field-name').value  = data.name || '';
    document.getElementById('field-desc').value  = data.description || '';
    document.getElementById('field-order').value = data.display_order !== undefined ? data.display_order : 0;
    document.getElementById('field-assoc').value = data.applies_to || 'Customer';
  }
  init();

  async function saveField(andNew) {
    var name = document.getElementById('field-name').value.trim();
    if (!name) { alert('Please enter a field name.'); document.getElementById('field-name').focus(); return; }

    var payload = {
      name:          name,
      description:   document.getElementById('field-desc').value.trim(),
      applies_to:    'All',
      display_order: parseInt(document.getElementById('field-order').value) || 0,
      active:        true,
      key:           name.toLowerCase().replace(/[^a-z0-9]/g, '_')
    };

    var error;
    if (editId) {
      ({ error } = await sb.from('custom_fields').update(payload).eq('id', editId));
    } else {
      var { data: sessionData } = await sb.auth.getSession();
      var uid = sessionData && sessionData.session ? sessionData.session.user.id : null;
      payload.user_id = uid;
      ({ error } = await sb.from('custom_fields').insert(payload));
    }
    if (error) { alert('Error: ' + error.message); return; }

    if (andNew) {
      editId = null;
      document.getElementById('page-title').textContent = 'Add Custom Field';
      document.getElementById('field-name').value    = '';
      document.getElementById('field-desc').value    = '';
      document.getElementById('field-assoc').value   = 'Customer';
      document.getElementById('field-type').value    = 'Text';
      document.getElementById('field-order').value   = '0';
      document.getElementById('field-print').checked  = false;
      document.getElementById('field-export').checked = false;
      document.getElementById('field-name').focus();
    } else {
      window.history.back();
    }
  }

  function cancel() { window.history.back(); }
</script>
</body>
</html>
